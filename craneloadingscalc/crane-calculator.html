// ─── Section property functions ─────────────────────────────────────────────

// I-section (UB/UC): inputs mm, outputs in cm-based design units
function iProps({h,b,tw,tf}){
  const hw=h-2*tf;
  const Ix4=(b*h**3-(b-tw)*hw**3)/12;       // mm⁴
  const Iy4=(2*tf*b**3+hw*tw**3)/12;        // mm⁴ (weak axis)
  return {
    h,b,tw,tf,
    A:(2*b*tf+hw*tw)/100,                    // cm²
    Ix:Ix4/1e4,                              // cm⁴
    Wx:Ix4/(h/2)/1e3,                        // cm³
    Iy:Iy4/1e4,                              // cm⁴
    Wy:Iy4/(b/2)/1e3,                        // cm³
    Aweb:hw*tw/100,                          // cm²
  };
}

// Combined I + ∩ cap PFC
// PFC rotated 90°: web (h_pfc×tw_pfc) lies horizontal on UB top flange at y=D;
// two legs (b_pfc tall, tf_pfc thick) hang DOWN from y=D to y=D−b_pfc.
function combinedProps(main, pfc){
  const mp=iProps(main), pp=iProps(pfc);
  const D=main.h, hp=pfc.h, bp=pfc.b, twp=pfc.tw, tfp=pfc.tf;

  // Cap areas & centroids from UB base (y=0)
  const Aplate=hp*twp,       yplate=D+twp/2;
  const Alegs=2*bp*tfp,      ylegs=D-bp/2;
  const Acap=Aplate+Alegs;
  const ycap=(Aplate*yplate+Alegs*ylegs)/Acap;

  const Atot=mp.A*100+Acap;           // mm²
  const yc=(mp.A*100*(D/2)+Acap*ycap)/Atot;  // mm from UB base

  // Strong-axis Ixx
  const Imain=mp.Ix*1e4+mp.A*100*(yc-D/2)**2;
  const Iplate=hp*twp**3/12+Aplate*(yc-yplate)**2;
  const Ilegs=2*(tfp*bp**3/12+bp*tfp*(yc-ylegs)**2);
  const Ixx=Imain+Iplate+Ilegs;

  const Dtot=D+twp;
  const ytop=Dtot-yc;
  const Wx=Ixx/Math.max(yc,ytop)/1e3;   // governing fibre

  // Weak-axis Iyy  (cap centred on section axis)
  const Izzplate=twp*hp**3/12;
  const dleg=hp/2-tfp/2;
  const Izzlegs=2*(bp*tfp**3/12+bp*tfp*dleg**2);
  const Izz=mp.Iy*1e4+Izzplate+Izzlegs;
  const Wy=Izz/(hp/2)/1e3;

  const pfcFits=(hp-2*tfp)>=main.b;
  return {
    A:Atot/100, Ix:Ixx/1e4, Wx, Iy:Izz/1e4, Wy,
    Aweb:mp.Aweb,                            // shear: UB web only
    h:Dtot, b:hp,
    yc, Dtot, pfcFits,
    innerW:hp-2*tfp, mainFlange:main.b,
  };
}

// Box beam: all inputs mm
function boxProps({Bt,Tt,Bb,Tb,Hw,Tw,s}){
  const D=Tt+Hw+Tb;
  const dweb=Bt/2-s-Tw/2;             // web centroid from box CL
  const Atf=Bt*Tt, Abf=Bb*Tb, Aw=2*Tw*Hw;
  const A=Atf+Abf+Aw;
  const ytf=Tb+Hw+Tt/2, ybf=Tb/2, yw=Tb+Hw/2;
  const yc=(Atf*ytf+Abf*ybf+Aw*yw)/A;

  const Ixx=Bt*Tt**3/12+Atf*(yc-ytf)**2
           +Bb*Tb**3/12+Abf*(yc-ybf)**2
           +2*(Tw*Hw**3/12+Tw*Hw*(yc-yw)**2);
  const Wx=Ixx/Math.max(yc,D-yc)/1e3;

  const Iyy=Tt*Bt**3/12+Tb*Bb**3/12
           +2*(Hw*Tw**3/12+Hw*Tw*dweb**2);
  const Wy=Iyy/(Math.max(Bt,Bb)/2)/1e3;

  return {
    A:A/100, Ix:Ixx/1e4, Wx, Iy:Iyy/1e4, Wy,
    Aweb:2*Hw*Tw/100,
    h:D, b:Math.max(Bt,Bb),
  };
}

function getSectionLib(secType){
  if(secType==="UC"||secType==="UC+PFC") return UC;
  return UB;
}

function computeSection(secType,mainSec,pfcSec,box){
  if(secType==="Box") return boxProps(box);
  const lib=getSectionLib(secType);
  const m=lib.find(s=>s.n===mainSec)||lib[0];
  if(secType==="UB+PFC"||secType==="UC+PFC"){
    const p=PFC.find(s=>s.n===pfcSec)||PFC[0];
    return combinedProps(m,p);
  }
  const sp=iProps(m);
  return {...sp, pfcFits:true};
}

// Bottom flange dimensions for the transverse flange bending check.
// For UB+PFC, the check is on the main section's bottom flange, not the cap.
function bottomFlangeDims(secType, mainSec, box){
  if(secType==="Box") return {tf:box.Tb, tw:box.Tw, hw:box.Hw, b:box.Bb};
  const lib=getSectionLib(secType);
  const m=lib.find(s=>s.n===mainSec)||lib[0];
  return {tf:m.tf, tw:m.tw, hw:m.h-2*m.tf, b:m.b};
}

// Mass per metre of the runway beam section (kg/m).
// For UB/UC/PFC the nominal mass is encoded in the section name (last token).
// For Box beams it is derived from the cross-sectional area × steel density.
function massPerMetre(secType, mainSec, pfcSec, sp){
  if(secType==="Box") return sp.A*1e-4*7850;   // sp.A cm² → m², ×7850 kg/m³
  const kgm=n=>parseFloat(n.split('x').pop())||0;
  const m=kgm(mainSec);
  if(secType==="UB+PFC"||secType==="UC+PFC") return m+kgm(pfcSec);
  return m;
}

function Field({label,value,onChange,unit,hint,en,step="any"}){
  return(
    <label className="block">
      <span className="flex items-baseline justify-between">
        <span className="text-[11px] font-medium leading-tight text-slate-600">{label}</span>
        {en&&<span title={en} className="ml-1 shrink-0 cursor-help rounded px-1 text-[9px] font-bold" style={{background:"#fef3c7",color:ACCENT,border:"1px solid #fcd34d"}}>EN</span>}
      </span>
      <span className="mt-1 flex items-stretch">
        <input type="number" step={step} value={value}
          onChange={e=>onChange(e.target.value===""?"":parseFloat(e.target.value))}
          className="w-full rounded-l border border-slate-300 bg-white px-2 py-1 font-mono text-sm text-slate-900 outline-none focus:border-amber-500"/>
        {unit&&<span className="flex items-center rounded-r border border-l-0 border-slate-300 bg-slate-100 px-2 text-[10px] font-mono text-slate-500">{unit}</span>}
      </span>
      {hint&&<span className="mt-0.5 block text-[10px] leading-tight text-slate-400">{hint}</span>}
    </label>
  );
}

function Bar({u}){
  const pct=Math.min(u*100,130),col=u>1?"#dc2626":u>0.9?ACCENT:"#16a34a";
  return <div className="h-2 w-full overflow-hidden rounded-full bg-slate-200"><div className="h-full rounded-full transition-all" style={{width:pct+"%",background:col}}/></div>;
}

function Tab({id,active,set,icon,children}){
  const on=active===id;
  return <button onClick={()=>set(id)} className={"flex items-center gap-1.5 whitespace-nowrap rounded-t px-3 py-2 text-xs font-semibold "+(on?"bg-white text-slate-900":"bg-transparent text-slate-400 hover:text-slate-600")} style={on?{boxShadow:"inset 0 -2px 0 "+ACCENT}:{}}><Ico n={icon} s={14}/>{children}</button>;
}

function Row({k,v,bold}){
  return <div className="flex items-center justify-between border-b border-slate-100 pb-1 last:border-0 last:pb-0"><dt className="text-slate-500">{k}</dt><dd className={bold?"font-bold text-slate-900":"text-slate-700"}>{v}</dd></div>;
}

function Util({label,detail,u}){
  const ok=u<=1;
  return <div>
    <div className="mb-1 flex items-center justify-between">
      <span className="text-[11px] font-semibold text-slate-700">{label}</span>
      <span className="font-mono text-xs font-bold" style={{color:ok?"#16a34a":"#dc2626"}}>{fmt(u*100,1)}%</span>
    </div>
    <Bar u={u}/>
    <div className="mt-1 font-mono text-[10px] text-slate-400">{detail}</div>
  </div>;
}

function BeamSVG({a,Lb}){
  const W=240,H=68,pad=20,span=W-2*pad;
  const aPx=Lb>0?Math.min((a/Lb)*span,span):0;
  const x1=pad+(span-aPx)/2,x2=x1+aPx,fit=a<Lb;
  return <svg viewBox={"0 0 "+W+" "+H} className="mt-3 w-full">
    <line x1={pad} y1={40} x2={W-pad} y2={40} stroke={STEEL} strokeWidth="3"/>
    <polygon points={pad+",40 "+(pad-5)+",52 "+(pad+5)+",52"} fill={STEEL}/>
    <polygon points={(W-pad)+",40 "+(W-pad-5)+",52 "+(W-pad+5)+",52"} fill={STEEL}/>
    {fit?[x1,x2].map((x,i)=><g key={i}>
      <line x1={x} y1={16} x2={x} y2={38} stroke={ACCENT} strokeWidth="2"/>
      <polygon points={x+",38 "+(x-4)+",30 "+(x+4)+",30"} fill={ACCENT}/>
      <circle cx={x} cy={14} r="3" fill={ACCENT}/>
    </g>):<g>
      <line x1={W/2} y1={16} x2={W/2} y2={38} stroke="#dc2626" strokeWidth="2"/>
      <polygon points={(W/2)+",38 "+(W/2-4)+",30 "+(W/2+4)+",30"} fill="#dc2626"/>
      <circle cx={W/2} cy={14} r="3" fill="#dc2626"/>
    </g>}
    <text x={W/2} y={64} textAnchor="middle" fontSize="8" fill="#94a3b8" fontFamily="monospace">
      {fit?"2 wheels @ "+a+"m apart on "+Lb+"m span":"a="+a+"m ≥ Lb="+Lb+"m"}
    </text>
  </svg>;
}

// Cross-section schematic SVGs
function SectionSVG({secType,sp,box,mainSec,pfcSec,mainLib}){
  const W=180,H=110,cx=W/2;
  const main=mainLib?mainLib.find(s=>s.n===mainSec)||mainLib[0]:null;
  const pfc=PFC.find(s=>s.n===pfcSec)||PFC[0];

  if(secType==="Box"){
    // Draw box beam proportionally
    const scaleH=Math.min(80/(box.Hw+box.Tt+box.Tb),0.25);
    const scaleB=Math.min(120/Math.max(box.Bt,box.Bb),0.3);
    const sc=Math.min(scaleH,scaleB);
    const D=(box.Hw+box.Tt+box.Tb)*sc, Bt=box.Bt*sc, Bb=box.Bb*sc;
    const Tt=Math.max(box.Tt*sc,3), Tb=Math.max(box.Tb*sc,3);
    const Tw=Math.max(box.Tw*sc,2), Hw=box.Hw*sc;
    const s_sc=box.s*sc;
    const x0=cx-Bt/2, y0=(H-D)/2;
    // top flange
    const x0b=cx-Bb/2;
    // webs
    const wxl=x0+s_sc, wxr=cx+Bt/2-s_sc-Tw;
    return <svg viewBox={"0 0 "+W+" "+H} className="w-full">
      <rect x={x0} y={y0} width={Bt} height={Tt} fill={ACCENT} opacity="0.7"/>
      <rect x={x0b} y={y0+D-Tb} width={Bb} height={Tb} fill={ACCENT} opacity="0.7"/>
      <rect x={wxl} y={y0+Tt} width={Tw} height={Hw} fill={STEEL} opacity="0.6"/>
      <rect x={wxr} y={y0+Tt} width={Tw} height={Hw} fill={STEEL} opacity="0.6"/>
      <text x={cx} y={y0-4} textAnchor="middle" fontSize="7" fill="#64748b" fontFamily="monospace">Bt={box.Bt}</text>
      <text x={cx} y={y0+D+10} textAnchor="middle" fontSize="7" fill="#64748b" fontFamily="monospace">Bb={box.Bb}</text>
      <text x={x0-2} y={y0+D/2} textAnchor="end" fontSize="7" fill="#64748b" fontFamily="monospace">hw={box.Hw}</text>
    </svg>;
  }

  if(!main) return null;
  const scH=Math.min(80/main.h,0.22), scB=Math.min(100/main.b,0.3);
  const sc=Math.min(scH,scB);
  const H_=main.h*sc, B=main.b*sc, tw=Math.max(main.tw*sc,2.5), tf=Math.max(main.tf*sc,3);
  const hw=H_-2*tf;
  const y0=(H-H_)/2;

  const iShape=<g>
    <rect x={cx-B/2} y={y0} width={B} height={tf} fill={ACCENT} opacity="0.7"/>
    <rect x={cx-B/2} y={y0+H_-tf} width={B} height={tf} fill={ACCENT} opacity="0.7"/>
    <rect x={cx-tw/2} y={y0+tf} width={tw} height={hw} fill={STEEL} opacity="0.6"/>
  </g>;

  if(secType==="UB+PFC"||secType==="UC+PFC"){
    const capW=Math.min(pfc.h*sc, B+20);
    const capLegH=Math.max(pfc.b*sc,4);
    const capTw=Math.max(pfc.tw*sc,2);
    const capTf=Math.max(pfc.tf*sc,2);
    const fits=sp.pfcFits!==false;
    const capCol=fits?"#0ea5e9":"#ef4444";
    // ∩ configuration: web plate rests on top of UB (y0-capTw → y0);
    // legs hang DOWN from the plate ends (y0 → y0+capLegH), gripping the UB top flange.
    return <svg viewBox={"0 0 "+W+" "+H} className="w-full">
      {iShape}
      <rect x={cx-capW/2} y={y0-capTw} width={capW}  height={capTw}   fill={capCol} opacity="0.8"/>
      <rect x={cx-capW/2} y={y0}        width={capTf}  height={capLegH} fill={capCol} opacity="0.5"/>
      <rect x={cx+capW/2-capTf} y={y0}  width={capTf}  height={capLegH} fill={capCol} opacity="0.5"/>
      <text x={cx} y={H-2} textAnchor="middle" fontSize="7" fill="#94a3b8" fontFamily="monospace">
        {main.n} + PFC {pfc.n}
      </text>
    </svg>;
  }

  return <svg viewBox={"0 0 "+W+" "+H} className="w-full">
    {iShape}
    <text x={cx} y={H-2} textAnchor="middle" fontSize="7" fill="#94a3b8" fontFamily="monospace">{main.n}</text>
  </svg>;
}

// ─── Main app ────────────────────────────────────────────────────────────────

function App(){
  const [tab,setTab]=useState("geo");

  // Crane geometry
  const [geo,setGeo]=useState({L:20,a:3,e1:1,e2:1,Lb:6,beamCount:2});
  const [mass,setMass]=useState({ec:1500,trolley:2000,hoist:10000});
  const [fac,setFac]=useState({phi1:1.1,phi2:1.3,phi4:1.0,phi5:1.5,phi7:1.25});
  const [hz,setHz]=useState({aLong:0.3,aCross:0.3,buffer:20,alpha:0.015,lambda:0.5,fOver:""});

  // Section definition
  const [secType,setSecType]=useState("UB");
  const [mainSec,setMainSec]=useState("457x191x74");
  const [pfcSec,setPfcSec]=useState("230x90x32");
  const [box,setBox]=useState({Bt:400,Tt:20,Bb:300,Tb:20,Hw:400,Tw:12,s:20});

  // Underslung trolley (single girder only)
  const [trolley,setTrolley]=useState({nw:4,g:150,as:50});

  // Material & fatigue
  const [mat,setMat]=useState({fy:355,gammaM:1.1});
  const [fat,setFat]=useState({dsc:90,sm:0.4,m:3,gammaMf:1.1});

  const [combos,setCombos]=useState([
    {name:"A — Hoisting (regular)",    gG:1.22,gL:1.34,phi2:true, phi4:false,travel:false,skew:false,buffer:false},
    {name:"B — Travelling (occasional)",gG:1.16,gL:1.22,phi2:false,phi4:true, travel:true, skew:true, buffer:false},
    {name:"C — Buffer (exceptional)",  gG:1.10,gL:1.10,phi2:false,phi4:false,travel:false,skew:false,buffer:true},
  ]);

  const set=setter=>(k,v)=>setter(s=>({...s,[k]:v}));
  const sGeo=set(setGeo),sMass=set(setMass),sFac=set(setFac),sHz=set(setHz);
  const sMat=set(setMat),sFat=set(setFat),sBox=set(setBox),sTrolley=set(setTrolley);
  const upCombo=(i,k,v)=>setCombos(c=>c.map((r,j)=>j===i?{...r,[k]:v}:r));

  const mainLib=getSectionLib(secType);
  const sp=useMemo(()=>computeSection(secType,mainSec,pfcSec,box),[secType,mainSec,pfcSec,box]);
  const bridgeMassPerM=useMemo(()=>massPerMetre(secType,mainSec,pfcSec,sp),[secType,mainSec,pfcSec,sp]);
  const bfDims=useMemo(()=>bottomFlangeDims(secType,mainSec,box),[secType,mainSec,box]);

  const R=useMemo(()=>{
    const {L,a,e1,e2,Lb}=geo;
    const bridgeMassTotal=bridgeMassPerM*L*geo.beamCount;
    const Wb=bridgeMassTotal*G,Wec=mass.ec*G,Wt=mass.trolley*G,Wh=mass.hoist*G;
    const f1=(L-e1)/L, f2=e2/L;
    const pDeadWheel=(Wb/2+Wec+Wt*f1)/2;
    const pHoist=(Wh*f1)/2;
    const pMin=(Wb/2+Wec+(Wt+Wh)*f2)/2;
    const sumQ=Wb+2*Wec+Wt+Wh;
    const fSkew=(hz.fOver!==""&&hz.fOver!=null)?Number(hz.fOver):Math.min(0.3,0.3*(1-Math.exp(-250*hz.alpha)));
    const ySkewWheel=fSkew*hz.lambda*sumQ/2;
    const hCrossWheel=(mass.trolley+mass.hoist)*hz.aCross*fac.phi5/4;
    const hLongWheel=(bridgeMassTotal+2*mass.ec+mass.trolley+mass.hoist)*hz.aLong*fac.phi5/4;
    const bufferForce=fac.phi7*hz.buffer*1000;
    const rows=combos.map(c=>{
      const phi4=c.phi4?fac.phi4:1;
      const dead=pDeadWheel*fac.phi1*phi4;
      const hoist=pHoist*(c.phi2?fac.phi2:1)*phi4;
      const Pv=c.gG*dead+c.gL*hoist;
      let Ht=0;
      if(c.travel)Ht=Math.max(Ht,hCrossWheel);
      if(c.skew)  Ht=Math.max(Ht,ySkewWheel);
      Ht=c.gG*Ht;
      const Hl=c.travel?c.gG*hLongWheel:0;
      const Hbuf=c.buffer?bufferForce:0;
      return {name:c.name,Pv,Ht,Hl,Hbuf};
    });
    const govV=rows.reduce((m,r)=>r.Pv>m.Pv?r:m,rows[0]);
    const govH=rows.reduce((m,r)=>r.Ht>m.Ht?r:m,rows[0]);
    const P=govV.Pv,H=govH.Ht;
    const bothFit=a<Lb;
    const Mx=bothFit?(P/(2*Lb))*(Lb-a/2)**2:(P*Lb)/4;
    const My=bothFit?(H/(2*Lb))*(Lb-a/2)**2:(H*Lb)/4;
    const Vmax=bothFit?P*(2-a/Lb):P;

    // Section props (cm-based, formulae require N·m/cm³ = N/mm² identity)
    const {Wx,Wy,Aweb,Ix}=sp;
    const sigX=Mx/Wx, sigY=My/Wy, sigTot=sigX+sigY;
    const tau=Vmax/(Aweb*100);
    const fRd=mat.fy/mat.gammaM;
    const tauRd=mat.fy/(Math.sqrt(3)*mat.gammaM);
    const uBending=sigTot/fRd, uShear=tau/tauRd;
    const uStatic=Math.max(uBending,uShear);

    const Pchar=pDeadWheel*fac.phi1+pHoist*fac.phi2;
    const Mchar=bothFit?(Pchar/(2*Lb))*(Lb-a/2)**2:(Pchar*Lb)/4;
    const dSig=Mchar/Wx;
    const dSigRd=(fat.dsc*fat.sm**(-1/fat.m))/fat.gammaMf;
    const uFat=dSig/dSigRd;

    const E_s=210000,I_mm4=Ix*1e4,Lb_mm=Lb*1000,c_mm=Math.max((Lb_mm-a*1000)/2,0);
    const delta_mm=(bothFit&&c_mm>0)
      ?(Pchar*c_mm/(24*E_s*I_mm4))*(3*Lb_mm**2-4*c_mm**2)
      :(Pchar*Lb_mm**3)/(48*E_s*I_mm4);
    const deltaLim=Lb_mm/600;
    const uDefl=delta_mm/deltaLim;

    // ── Bottom flange transverse bending (single girder underslung hoist) ──
    // Method: EN 1993-6 §5.7 — wheel load dispersed at 30° through web height;
    // flange cantilevers from web face to wheel contact point.
    // Biaxial interaction: longitudinal (main bending) + transverse (flange bending).
    let sigTrans=0,Fw_fl=0,cf=0,leff_fl=0,uFlange=0,uFlangeCombo=0,flangeWarn="";
    if(geo.beamCount===1){
      const {tf,tw,hw,b:bf}=bfDims;
      // Design wheel force — combination A (hoisting governs for hoist load)
      const gG0=combos[0].gG, gL0=combos[0].gL;
      Fw_fl=(gL0*mass.hoist*G*fac.phi2 + gG0*mass.trolley*G*fac.phi1)/trolley.nw;
      // Moment arm: web face to wheel contact centreline
      cf=trolley.g/2 - tw/2;
      // Effective dispersion length along beam (EN 1993-6: 30° through web)
      leff_fl=trolley.as + 1.155*hw;
      if(trolley.g/2>bf/2) flangeWarn="Wheel gauge exceeds flange width — wheel is off the flange.";
      else if(cf<=0)        flangeWarn="Wheel gauge ≤ web thickness — wheel is under the web.";
      else{
        // Transverse bending stress at web–flange root, bottom surface
        sigTrans=6*Fw_fl*cf/(leff_fl*tf*tf);
        uFlange=sigTrans/fRd;
        // Biaxial interaction: longitudinal (sigX) + transverse, both tensile at bottom root
        const sigEq=Math.sqrt(sigX**2+sigTrans**2-sigX*sigTrans);
        uFlangeCombo=sigEq/fRd;
      }
    }

    return {pMin,fSkew,hLongWheel,rows,govV,govH,P,H,Mx,My,Vmax,Rmax:Vmax,
            sigX,sigY,sigTot,tau,fRd,tauRd,
            uBending,uShear,uStatic,dSig,dSigRd,uFat,
            delta_mm,deltaLim,uDefl,
            sigTrans,Fw_fl,cf,leff_fl,uFlange,uFlangeCombo,flangeWarn};
  },[geo,mass,fac,hz,combos,sp,mat,fat,bridgeMassPerM,bfDims,trolley]);

  const govU=Math.max(R.uStatic,R.uFat,R.uDefl,geo.beamCount===1?R.uFlangeCombo:0);
  const wheelsFit=geo.a<geo.Lb;

  // When section type changes, try to keep same section name if it exists in new lib
  const handleSecType=t=>{
    setSecType(t);
    const newLib=t==="UC"||t==="UC+PFC"?UC:UB;
    if(!newLib.find(s=>s.n===mainSec)) setMainSec(newLib[Math.floor(newLib.length/2)].n);
  };

  return(
  <div className="min-h-screen w-full bg-slate-100 p-3 sm:p-6" style={{fontFamily:"ui-sans-serif,system-ui,sans-serif"}}>
   <div className="mx-auto max-w-6xl">

    <div className="mb-4 flex items-center gap-3">
      <div className="flex h-10 w-10 items-center justify-center rounded" style={{background:STEEL}}><Ico n="ruler" s={20} c={ACCENT}/></div>
      <div>
        <h1 className="text-lg font-bold tracking-tight text-slate-900">Crane Loading &amp; Proof of Competence</h1>
        <p className="font-mono text-[11px] text-slate-500">Overhead travelling crane · 4-wheel · EN 15011 / EN 13001-1·-2·-3-1 · runway beam checks</p>
      </div>
    </div>

    <div className="mb-2 flex items-start gap-2 rounded border border-amber-300 bg-amber-50 px-3 py-2 text-[11px] text-amber-900">
      <Ico n="alert" s={14} c="#b45309"/>
      <span>Fields tagged <b>EN</b> are standard-derived — confirm φ factors, γ, combination definitions, and fatigue resistances against your licensed edition. Section dimensions from SCI P363 (Blue Book); root radius excluded (~1–2% conservative on Wx/Ix).</span>
    </div>
    {!wheelsFit&&<div className="mb-4 flex items-start gap-2 rounded border border-red-300 bg-red-50 px-3 py-2 text-[11px] text-red-900">
      <Ico n="alert" s={14} c="#b91c1c"/>
      <span><b>Geometry warning:</b> wheelbase a ({geo.a} m) ≥ runway span Lb ({geo.Lb} m). Results use single central load fallback — treat with caution.</span>
    </div>}
    {(secType==="UB+PFC"||secType==="UC+PFC")&&sp.pfcFits===false&&<div className="mb-4 flex items-start gap-2 rounded border border-red-300 bg-red-50 px-3 py-2 text-[11px] text-red-900">
      <Ico n="alert" s={14} c="#b91c1c"/>
      <span><b>PFC fit warning:</b> PFC inner width ({fmt(sp.innerW,0)} mm) &lt; main section flange width ({fmt(sp.mainFlange,0)} mm). Cap will not straddle the flange — choose a wider PFC.</span>
    </div>}

    <div className="grid grid-cols-1 gap-4 lg:grid-cols-3">
     <div className="lg:col-span-2">
      <div className="flex gap-1 overflow-x-auto border-b border-slate-200 px-1">
        <Tab id="geo"  active={tab} set={setTab} icon="ruler">Geometry &amp; Design</Tab>
        <Tab id="fac"  active={tab} set={setTab} icon="settings">φ Factors</Tab>
        <Tab id="hz"   active={tab} set={setTab} icon="activity">Horizontal &amp; Skew</Tab>
        <Tab id="comb" active={tab} set={setTab} icon="layers">Combinations</Tab>
      </div>

      <div className="rounded-b rounded-tr bg-white p-4 shadow-sm">

       {tab==="geo"&&<div>

         {/* ── Plan-view layout diagram ───────────────────── */}
         <div className="mb-4">
           <CraneLayoutSVG/>
         </div>

         {/* ── Geometry & mass ───────────────────────────── */}
         <div className="mb-1 text-[10px] font-semibold uppercase tracking-wide text-slate-400">Crane geometry</div>
         <div className="grid grid-cols-2 gap-3 sm:grid-cols-3 mb-4">
           <Field label="Crane span (rail–rail) L" value={geo.L} onChange={v=>sGeo("L",v)} unit="m"/>
           <Field label="End-carriage wheelbase a" value={geo.a} onChange={v=>sGeo("a",v)} unit="m" hint="wheel-to-wheel along rail"/>
           <Field label="Runway beam span Lb" value={geo.Lb} onChange={v=>sGeo("Lb",v)} unit="m" hint="between supports"/>
           <Field label="Min hook approach e₁ (rail 1)" value={geo.e1} onChange={v=>sGeo("e1",v)} unit="m"/>
           <Field label="Min hook approach e₂ (rail 2)" value={geo.e2} onChange={v=>sGeo("e2",v)} unit="m"/>
           <div/>
           <Field label="End-carriage mass (each)" value={mass.ec} onChange={v=>sMass("ec",v)} unit="kg"/>
           <Field label="Trolley / crab mass" value={mass.trolley} onChange={v=>sMass("trolley",v)} unit="kg"/>
           <Field label="Rated hoist load SWL" value={mass.hoist} onChange={v=>sMass("hoist",v)} unit="kg"/>
         </div>

         {/* ── Beam section ──────────────────────────────── */}
         <div className="border-t border-slate-200 pt-4">
           <div className="mb-2 text-[10px] font-semibold uppercase tracking-wide text-slate-400">Crane beam section</div>

           {/* Bridge config + computed mass */}
           <div className="mb-3">
             <div className="mb-1 text-[11px] font-medium text-slate-600">Bridge configuration &amp; girder mass</div>
             <div className="flex gap-2 mb-2">
               {[{n:1,label:"Single girder"},{n:2,label:"Double girder"}].map(({n,label})=>(
                 <button key={n} onClick={()=>sGeo("beamCount",n)}
                   className={"rounded border px-3 py-1.5 text-xs font-semibold transition-colors "+(geo.beamCount===n?"text-white border-transparent":"border-slate-300 bg-white text-slate-500 hover:bg-slate-50")}
                   style={geo.beamCount===n?{background:STEEL}:{}}>
                   {label}
                 </button>
               ))}
             </div>
             <div className="rounded border border-slate-200 bg-slate-50 px-3 py-2 font-mono text-[11px]">
               <span className="text-slate-500">Section mass </span>
               <span className="font-bold text-slate-800">{fmt(bridgeMassPerM,1)} kg/m</span>
               <span className="text-slate-400"> × {geo.L} m × {geo.beamCount} girder{geo.beamCount>1?"s":""} = </span>
               <span className="font-bold text-slate-900">{fmt(bridgeMassPerM*geo.L*geo.beamCount,0)} kg</span>
               <span className="ml-2 text-slate-400">(structural steel only)</span>
             </div>
           </div>

           {/* Section type selector */}
           <TypeSel value={secType} onChange={handleSecType}/>

           {/* Standard section dropdown */}
           {(secType==="UB"||secType==="UC"||secType==="UB+PFC"||secType==="UC+PFC")&&<div className="mb-3">
             <label className="block">
               <span className="text-[11px] font-medium text-slate-600">{secType.startsWith("UB")?"Universal Beam":"Universal Column"} (SCI P363)</span>
               <select value={mainSec} onChange={e=>setMainSec(e.target.value)}
                 className="mt-1 w-full rounded border border-slate-300 bg-white px-2 py-1.5 font-mono text-sm text-slate-900 outline-none focus:border-amber-500">
                 {mainLib.map(s=><option key={s.n} value={s.n}>{s.n}</option>)}
               </select>
             </label>
           </div>}

           {/* PFC cap dropdown */}
           {(secType==="UB+PFC"||secType==="UC+PFC")&&<div className="mb-3">
             <label className="block">
               <span className="text-[11px] font-medium text-slate-600">PFC cap channel — ∩ configuration (SCI P363)</span>
               <select value={pfcSec} onChange={e=>setPfcSec(e.target.value)}
                 className="mt-1 w-full rounded border border-slate-300 bg-white px-2 py-1.5 font-mono text-sm text-slate-900 outline-none focus:border-amber-500">
                 {PFC.map(s=><option key={s.n} value={s.n}>{s.n}</option>)}
               </select>
             </label>
             <p className="mt-1 text-[10px] text-slate-400">PFC web lies flat on UB top flange; flanges hang down as vertical legs. Inner clear width must ≥ main flange width.</p>
           </div>}

           {/* Box beam inputs */}
           {secType==="Box"&&<div className="mb-3 grid grid-cols-2 gap-3 sm:grid-cols-4">
             <Field label="Top flange width Bt" value={box.Bt} onChange={v=>sBox("Bt",v)} unit="mm"/>
             <Field label="Top flange thk Tt"   value={box.Tt} onChange={v=>sBox("Tt",v)} unit="mm"/>
             <Field label="Bottom flange width Bb" value={box.Bb} onChange={v=>sBox("Bb",v)} unit="mm"/>
             <Field label="Bottom flange thk Tb"   value={box.Tb} onChange={v=>sBox("Tb",v)} unit="mm"/>
             <Field label="Web height Hw (clear)" value={box.Hw} onChange={v=>sBox("Hw",v)} unit="mm"/>
             <Field label="Web thickness Tw (each)" value={box.Tw} onChange={v=>sBox("Tw",v)} unit="mm"/>
             <Field label="Web inset s" value={box.s} onChange={v=>sBox("s",v)} unit="mm" hint="outer web face from flange edge"/>
           </div>}

           {/* Section schematic + computed properties */}
           <div className="mb-3 flex items-start gap-3 rounded border border-slate-200 bg-slate-50 p-3">
             <div className="w-40 shrink-0">
               <SectionSVG secType={secType} sp={sp} box={box} mainSec={mainSec} pfcSec={pfcSec} mainLib={mainLib}/>
             </div>
             <div className="flex-1">
               <div className="text-[10px] font-semibold uppercase tracking-wide text-slate-400 mb-1">Computed section properties</div>
               <PropChips sp={sp}/>
               {(secType==="UB"||secType==="UC")&&(()=>{
                 const m=mainLib.find(s=>s.n===mainSec)||mainLib[0];
                 return <p className="mt-1.5 text-[10px] text-slate-400">h={m.h} mm · b={m.b} mm · tw={m.tw} mm · tf={m.tf} mm</p>;
               })()}
               {(secType==="UB+PFC"||secType==="UC+PFC")&&(()=>{
                 const m=mainLib.find(s=>s.n===mainSec)||mainLib[0];
                 const p=PFC.find(s=>s.n===pfcSec)||PFC[0];
                 return <p className="mt-1.5 text-[10px] text-slate-400">
                   Main: h={m.h} b={m.b} · PFC ∩: width={p.h} legs={p.b}mm · Total depth={(m.h+p.tw).toFixed(0)} mm
                 </p>;
               })()}
               {secType==="Box"&&<p className="mt-1.5 text-[10px] text-slate-400">Total depth = {box.Tt+box.Hw+box.Tb} mm · web CL at {(box.Bt/2-box.s-box.Tw/2).toFixed(0)} mm from axis</p>}
             </div>
           </div>
         </div>

         {/* ── Material, fatigue & checks ────────────────── */}
         <div className="border-t border-slate-200 pt-4">
           <div className="mb-1 text-[10px] font-semibold uppercase tracking-wide text-slate-400">Material &amp; resistance</div>
           <div className="mb-3 grid grid-cols-2 gap-3 sm:grid-cols-3">
             <Field label="Yield strength fy" value={mat.fy} onChange={v=>sMat("fy",v)} unit="N/mm²"/>
             <Field label="γM resistance factor" value={mat.gammaM} onChange={v=>sMat("gammaM",v)} en="EN 13001-3-1 Table 3: γRm, typically 1.10 for structural steel."/>
           </div>

           <div className="mb-1 text-[10px] font-semibold uppercase tracking-wide text-slate-400">Fatigue — EN 13001-3-1</div>
           <div className="mb-3 grid grid-cols-2 gap-3 sm:grid-cols-4">
             <Field label="Δσc detail category" value={fat.dsc} onChange={v=>sFat("dsc",v)} unit="N/mm²" en="EN 13001-3-1 / EN 1993-1-9: detail class for the critical weld or notch."/>
             <Field label="sₘ stress-history"   value={fat.sm}  onChange={v=>sFat("sm",v)}  en="EN 13001-3-1 §5.3: from load spectrum class S0–S9."/>
             <Field label="m slope exponent"    value={fat.m}   onChange={v=>sFat("m",v)}   en="EN 13001-3-1: 3 for normal stress, 5 for shear."/>
             <Field label="γMf fatigue factor"  value={fat.gammaMf} onChange={v=>sFat("gammaMf",v)} en="EN 13001-3-1 Table 4: typically 1.10 (safe-life)."/>
           </div>

           <div className="mb-3 flex items-start gap-2 rounded border border-blue-200 bg-blue-50 px-3 py-2 text-[10px] text-blue-800">
             <Ico n="info" s={12} c="#1e40af"/>
             <span><b>Not checked here:</b> lateral-torsional buckling (LTB), web crippling under wheel load, and plate/web panel buckling. Verify separately per EN 13001-3-1.</span>
           </div>

           {/* Underslung trolley — bottom flange check */}
           {geo.beamCount===1&&<div className="rounded border border-slate-300 bg-slate-50 p-3">
             <div className="mb-2 flex items-center gap-2">
               <div className="h-2 w-2 rounded-full" style={{background:ACCENT}}/>
               <span className="text-[11px] font-semibold text-slate-700">Underslung trolley — bottom flange bending</span>
             </div>
             <p className="mb-3 text-[10px] text-slate-500">
               Single girder crane: hoist trolley runs on the bottom flange. Wheel loads create transverse bending in the flange (EN 1993-6 §5.7). Load dispersed at 30° through web height; biaxial interaction with main-beam longitudinal stress at the web–flange root.
             </p>
             <div className="mb-2 grid grid-cols-2 gap-3 sm:grid-cols-3">
               <div>
                 <div className="mb-1 text-[11px] font-medium text-slate-600">No. of trolley wheels</div>
                 <div className="flex gap-1">
                   {[2,4].map(n=><button key={n} onClick={()=>sTrolley("nw",n)}
                     className={"rounded border px-3 py-1.5 text-xs font-semibold "+(trolley.nw===n?"text-white border-transparent":"border-slate-300 bg-white text-slate-500")}
                     style={trolley.nw===n?{background:STEEL}:{}}>{n}</button>)}
                 </div>
               </div>
               <Field label="Wheel gauge g (CL–CL)" value={trolley.g} onChange={v=>sTrolley("g",v)} unit="mm"
                 hint={"Flange b="+fmt(bfDims.b,0)+"mm · web tw="+fmt(bfDims.tw,1)+"mm"}/>
               <Field label="Wheel contact length aₛ" value={trolley.as} onChange={v=>sTrolley("as",v)} unit="mm"
                 hint="Along beam — typically 40–80 mm"/>
             </div>
             {R.flangeWarn&&<div className="flex items-start gap-1.5 rounded border border-red-200 bg-red-50 px-2 py-1.5 text-[10px] text-red-700">
               <Ico n="alert" s={11} c="#b91c1c"/>{R.flangeWarn}
             </div>}
             {!R.flangeWarn&&<div className="rounded bg-white border border-slate-200 px-2 py-1.5 font-mono text-[10px] text-slate-500 space-y-0.5">
               <div>Fw = {fmt(R.Fw_fl/1000,2)} kN per wheel · cf = {fmt(R.cf,0)} mm · l_eff = {fmt(R.leff_fl,0)} mm</div>
               <div>σ_trans = {fmt(R.sigTrans,1)} N/mm² · σ_x = {fmt(R.sigX,1)} N/mm² · σ_eq = {fmt(Math.sqrt(R.sigX**2+R.sigTrans**2-R.sigX*R.sigTrans),1)} N/mm²</div>
             </div>}
           </div>}
         </div>

       </div>}

       {tab==="fac"&&<div className="grid grid-cols-2 gap-3 sm:grid-cols-3">
         <Field label="φ₁ dead-load vibration" value={fac.phi1} onChange={v=>sFac("phi1",v)} en="EN 13001-2 §2.7.1: dynamic effect on crane self-mass. Typical 1.05–1.10."/>
         <Field label="φ₂ hoist-load factor"   value={fac.phi2} onChange={v=>sFac("phi2",v)} en="EN 13001-2 §2.7.2: φ₂ = φ₂min + β₂·vₕ. Depends on hoisting class HC1–HC4 and hoist speed vₕ."/>
         <Field label="φ₄ rail unevenness"      value={fac.phi4} onChange={v=>sFac("phi4",v)} en="EN 13001-2: 1.0 for continuously welded/ground rails under stated tolerance."/>
         <Field label="φ₅ drive acceleration"   value={fac.phi5} onChange={v=>sFac("phi5",v)} en="EN 13001-2 §2.7.5: 1.0 (smooth) to 2.0 (step change). Applied to horizontal drive forces."/>
         <Field label="φ₇ buffer elastic factor" value={fac.phi7} onChange={v=>sFac("phi7",v)} en="EN 13001-2 §2.7.7: energy absorption factor for buffers. Typically 1.25 polyurethane."/>
       </div>}

       {tab==="hz"&&<div className="grid grid-cols-2 gap-3 sm:grid-cols-3">
         <Field label="Long-travel acceleration" value={hz.aLong} onChange={v=>sHz("aLong",v)} unit="m/s²" hint="crane bridge travel"/>
         <Field label="Cross-travel acceleration" value={hz.aCross} onChange={v=>sHz("aCross",v)} unit="m/s²" hint="trolley travel"/>
         <Field label="Buffer force (per side)" value={hz.buffer} onChange={v=>sHz("buffer",v)} unit="kN" hint="×φ₇ in combo C"/>
         <div className="col-span-2 mt-1 border-t border-dashed border-slate-200 pt-2 text-[10px] font-semibold uppercase tracking-wide text-slate-400 sm:col-span-3">Skewing — EN 15011 Annex D</div>
         <Field label="Skew angle α" value={hz.alpha} onChange={v=>sHz("alpha",v)} unit="rad" en="EN 15011: α = αg+αw+αt ≤ 0.015 rad."/>
         <Field label="λ distribution factor" value={hz.lambda} onChange={v=>sHz("lambda",v)} en="EN 15011 Table D.1: from wheel/guidance geometry."/>
         <Field label="f override (blank = auto)" value={hz.fOver} onChange={v=>sHz("fOver",v)} en="f = 0.3(1−e^(−250α)) ≤ 0.3" hint={"auto f = "+fmt(R.fSkew,4)}/>
       </div>}

       {tab==="comb"&&<div className="space-y-3">
         <p className="text-[11px] text-slate-500">Three EN 13001-2 load combinations. γG and γL are partial safety factors — verify against your edition.</p>
         {combos.map((c,i)=><div key={i} className="rounded border border-slate-200 p-3">
           <input value={c.name} onChange={e=>upCombo(i,"name",e.target.value)}
             className="mb-2 w-full border-b border-slate-200 bg-transparent text-xs font-bold text-slate-800 outline-none focus:border-amber-500"/>
           <div className="grid grid-cols-2 gap-2 sm:grid-cols-4">
             <Field label="γG crane mass" value={c.gG} onChange={v=>upCombo(i,"gG",v)} en="EN 13001-2: partial safety factor for crane self-mass."/>
             <Field label="γL hoist load"  value={c.gL} onChange={v=>upCombo(i,"gL",v)} en="EN 13001-2: partial safety factor for hoist load."/>
             <div className="col-span-2 grid grid-cols-2 gap-x-2 gap-y-1.5 pt-1 text-[10px] text-slate-600">
               {[["phi2","apply φ₂"],["phi4","apply φ₄"],["travel","travel inertia"],["skew","skewing"],["buffer","buffer"]].map(([k,l])=>
                 <label key={k} className="flex cursor-pointer items-center gap-1.5">
                   <input type="checkbox" checked={c[k]} onChange={e=>upCombo(i,k,e.target.checked)} className="accent-amber-600"/>{l}
                 </label>)}
             </div>
           </div>
           <div className="mt-2 flex flex-wrap gap-x-4 gap-y-1 rounded bg-slate-50 px-2 py-1.5 font-mono text-[10px] text-slate-500">
             <span>Pᵥ=<b className="text-slate-800">{fmt(R.rows[i].Pv/1000,2)} kN</b></span>
             <span>Hₜ=<b className="text-slate-700">{fmt(R.rows[i].Ht/1000,2)} kN</b></span>
             <span>Hₗ={fmt(R.rows[i].Hl/1000,2)} kN</span>
             {R.rows[i].Hbuf>0&&<span>Fbuf={fmt(R.rows[i].Hbuf/1000,1)} kN</span>}
           </div>
         </div>)}
       </div>}


      </div>
     </div>

     {/* Results */}
     <div className="lg:col-span-1"><div className="sticky top-4 space-y-3">

       <div className="rounded p-4 text-white" style={{background:STEEL}}>
         <div className="flex items-center justify-between">
           <span className="text-[11px] font-semibold uppercase tracking-wide text-slate-300">Governing utilisation</span>
           {govU<=1?<Ico n="check" s={18} c="#4ade80"/>:<Ico n="x" s={18} c="#f87171"/>}
         </div>
         <div className="mt-1 font-mono text-3xl font-bold" style={{color:govU<=1?"#4ade80":"#f87171"}}>
           {fmt(govU*100,1)}<span className="text-base text-slate-400">%</span>
         </div>
         <div className="mt-1 text-[10px] text-slate-400">{govU<=1?"All checks pass":"Exceeds capacity — revise"}</div>
         <div className="mt-3 grid grid-cols-2 gap-1 text-center">
           {[["Bending",R.uBending],["Shear",R.uShear],["Fatigue",R.uFat],["Deflection",R.uDefl],
             ...(geo.beamCount===1&&!R.flangeWarn?[["Flange",R.uFlangeCombo]]:[])
           ].map(([l,u])=>
             <div key={l} className="rounded bg-slate-700 px-1 py-1">
               <div className="text-[9px] text-slate-400">{l}</div>
               <div className="font-mono text-[11px] font-bold" style={{color:u<=1?"#86efac":"#fca5a5"}}>{fmt(u*100,0)}%</div>
             </div>)}
         </div>
       </div>

       <div className="rounded bg-white p-4 shadow-sm">
         <h3 className="mb-2 flex items-center gap-1.5 text-xs font-bold text-slate-700"><Ico n="boxes" s={14} c={ACCENT}/> Wheel loads</h3>
         <dl className="space-y-1 font-mono text-[11px]">
           <Row k="Max vertical Pv" v={fmt(R.P/1000,2)+" kN"} bold/>
           <Row k="Min vertical (char.)" v={fmt(R.pMin/1000,2)+" kN"}/>
           <Row k="Transverse Ht" v={fmt(R.H/1000,2)+" kN"}/>
           <Row k="Longitudinal Hl/wheel" v={fmt(R.hLongWheel/1000,2)+" kN"}/>
           <Row k="Governing combo" v={R.govV.name.split(" ")[0]}/>
         </dl>
       </div>

       <div className="rounded bg-white p-4 shadow-sm">
         <h3 className="mb-2 flex items-center gap-1.5 text-xs font-bold text-slate-700"><Ico n="gauge" s={14} c={ACCENT}/> Runway beam effects</h3>
         <dl className="space-y-1 font-mono text-[11px]">
           <Row k="Max moment Mx" v={fmt(R.Mx/1000,2)+" kNm"} bold/>
           <Row k="Lateral moment My" v={fmt(R.My/1000,2)+" kNm"}/>
           <Row k="Max shear V" v={fmt(R.Vmax/1000,2)+" kN"}/>
           <Row k="Max reaction R" v={fmt(R.Rmax/1000,2)+" kN"}/>
         </dl>
         <BeamSVG a={geo.a} Lb={geo.Lb}/>
       </div>

       <div className="rounded bg-white p-4 shadow-sm">
         <h3 className="mb-3 flex items-center gap-1.5 text-xs font-bold text-slate-700"><Ico n="check" s={14} c={ACCENT}/> Proof of competence</h3>
         <div className="space-y-3">
           <Util label="Bending σ/f_Rd" detail={"σ="+fmt(R.sigTot,1)+" / f_Rd="+fmt(R.fRd,1)+" N/mm²"} u={R.uBending}/>
           <Util label="Shear τ/τ_Rd"   detail={"τ="+fmt(R.tau,1)+" / τ_Rd="+fmt(R.tauRd,1)+" N/mm²"} u={R.uShear}/>
           <Util label="Fatigue Δσ/Δσ_Rd" detail={"Δσ="+fmt(R.dSig,1)+" / Δσ_Rd="+fmt(R.dSigRd,1)+" N/mm²"} u={R.uFat}/>
           <Util label="Deflection δ/δ_lim" detail={"δ="+fmt(R.delta_mm,2)+"mm / lim="+fmt(R.deltaLim,1)+"mm (L/600)"} u={R.uDefl}/>
           {geo.beamCount===1&&!R.flangeWarn&&<Util
             label="Flange bending σ_eq/f_Rd"
             detail={"σ_trans="+fmt(R.sigTrans,1)+" σ_x="+fmt(R.sigX,1)+" → σ_eq="+fmt(Math.sqrt(R.sigX**2+R.sigTrans**2-R.sigX*R.sigTrans),1)+" N/mm²"}
             u={R.uFlangeCombo}/>}
           {geo.beamCount===1&&R.flangeWarn&&<div className="rounded border border-amber-200 bg-amber-50 px-2 py-1.5 text-[10px] text-amber-800">
             <b>Flange check:</b> {R.flangeWarn}
           </div>}
         </div>
         <div className="mt-3 rounded bg-slate-50 px-2 py-1.5 font-mono text-[10px] text-slate-500 space-y-0.5">
           <div>σx={fmt(R.sigX,1)} σy={fmt(R.sigY,1)} τ={fmt(R.tau,1)} N/mm²</div>
           <div>Wx={fmt(sp.Wx,0)} Wy={fmt(sp.Wy,0)} Aweb={fmt(sp.Aweb,1)} Ix={fmt(sp.Ix,0)}</div>
         </div>
       </div>
