<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crane Drive Sizer — hoist / long-travel / cross-travel · motor · gearbox · brake</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{margin:0}
  select,input{appearance:auto}
  @media print{
    .no-print{display:none!important}
    body{background:#fff}
    details{display:block!important}
    summary{list-style:none}
    .print-block{break-inside:avoid}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;
const ACCENT="#d97706",STEEL="#1e293b";
const fmt=(x,dp=2)=>(x==null||!isFinite(x))?"—":Number(x).toLocaleString("en-GB",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const fmt0=(x)=>(x==null||!isFinite(x))?"—":Math.round(x).toLocaleString("en-GB");

// ════════════════════════════════════════════════════════════════════════════
//  CRANE DRIVE SIZER — one tool, pick the motion (hoist / long-travel / cross-travel)
//
//  Authority of values (consistent across the toolkit):
//   • PHYSICS / KINEMATIC RELATIONS are exact and computed (amber badge):
//       P = F·v/η ; P = m·g·v/η ; T = 9549.3·P[kW]/n = P/ω ; i = n_motor/n_out ;
//       J_eq = m·(v/ω)² ; F_adh = μ·N ; reeving/Siemens-style drum-torque forms.
//   • EMPIRICAL / TABULATED COEFFICIENTS (adhesion, rolling resistance, wind,
//     brake/proof/overload/service factors, rope Zp, D/d, φ2, %ED) are EDITABLE
//     "confirm" defaults — published figures differ by standard/edition; the tool
//     gives the formula and you enter the governing value. Blue badge.
//
//  g = 9.81 m/s².  PER-DRIVE: when more than one drive (motor) is selected, the
//  load is split EQUALLY and the motor/gearbox/brake figures are reported PER
//  DRIVE, with the combined (× N) total shown alongside.
//
//  Scope: a sizing & first-pass verification aid. Final thermal selection
//  (duty S1–S5 / %ED + permissible starts) and the catalogue motor/gearbox/brake
//  remain the engineer's call — verify against the supplier's data before order.
// ════════════════════════════════════════════════════════════════════════════
const G=9.81;
const Tnm=(kW,n)=>(n>0?9549.296*kW/n:NaN);
const omega=(n)=>2*Math.PI*n/60;
const IEC_KW=[0.12,0.18,0.25,0.37,0.55,0.75,1.1,1.5,2.2,3,4,5.5,7.5,11,15,18.5,22,30,37,45,55,75,90,110,132,160,200,250,315,355,400];
const pickMotor=(P)=>{if(!isFinite(P)||P<=0)return null;for(const k of IEC_KW){if(k>=P*0.999999)return k;}return null;};

const DEF={
  muAdh:0.15, fRoll:0.5, cFlange:1.5, bearMu:0.02, windP:250,
  etaMech:0.90, vfdOverload:1.5, breakdownK:2.7, regenEff:0.0, kCool:0.33, fs:1.25,
};

// ── UI atoms ─────────────────────────────────────────────────────────────────
const Badge=({children,tone})=>(
  <span style={tone==="def"?{background:"#e0f2fe",color:"#075985",border:"1px solid #7dd3fc"}
                           :{background:"#fef3c7",color:"#92400e",border:"1px solid #fcd34d"}}
        className="text-[10px] font-semibold px-1.5 py-0.5 rounded ml-1 align-middle whitespace-nowrap">{children}</span>
);
const Field=({label,hint,children})=>(
  <label className="block mb-3">
    <div className="text-sm font-medium text-slate-700">{label}</div>
    {hint&&<div className="text-xs text-slate-400 mb-1">{hint}</div>}
    {children}
  </label>
);
const Num=(props)=>(
  <input type="number" {...props}
    className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400" />
);
const Row=({k,unit,v,strong,badge,ok})=>(
  <React.Fragment>
    <dt className={"text-slate-500 "+(strong?"font-semibold text-slate-700":"")}>{k}{badge&&<Badge tone={badge.tone}>{badge.t}</Badge>}</dt>
    <dd className={"text-right font-mono "+(strong?"font-bold text-slate-800":"")}>
      {ok!==undefined&&<span className={"mr-2 text-xs font-bold "+(ok?"text-green-600":"text-red-600")}>{ok?"PASS":"FAIL"}</span>}
      {v}{unit&&<span className="text-slate-400 font-sans"> {unit}</span>}
    </dd>
  </React.Fragment>
);
const Pill=({ok,children})=>(
  <span className={"text-xs font-bold px-2 py-0.5 rounded "+(ok?"bg-green-100 text-green-700":"bg-red-100 text-red-700")}>{children}</span>
);
const Toggle=({on,onClick,children})=>(
  <button onClick={onClick} className={"text-xs px-2 py-1 rounded border "+(on?"bg-amber-500 text-white border-amber-500":"bg-white text-slate-600 border-slate-300")}>{children}</button>
);
const SpeedField=({label,unit,vMin,onMin})=>{
  const disp = unit==="m/s" ? (vMin==="" ? "" : Math.round((vMin/60)*1000)/1000) : vMin;
  return (
    <Field label={label} hint={unit}>
      <Num value={disp} min="0" step={unit==="m/s"?0.05:0.5}
        onChange={e=>{const x=e.target.value; onMin(x===""?"":(unit==="m/s"?(+x*60):+x));}}/>
    </Field>
  );
};
const Group=({title,open,children})=>(
  <details open={open} className="border border-slate-200 rounded-lg mb-3">
    <summary className="cursor-pointer select-none font-semibold text-slate-700 text-sm px-3 py-2 bg-slate-50 rounded-t-lg">{title}</summary>
    <div className="p-3">{children}</div>
  </details>
);
// banner stating whether figures are per-drive or for a single drive
const DriveScope=({nDr})=>(
  nDr>1
    ? <div className="rounded-lg border border-sky-300 bg-sky-50 p-2.5 text-xs text-sky-800 print-block">
        <b>{nDr} drives.</b> Load is split equally — motor, gearbox &amp; brake figures below are <b>PER DRIVE</b>;
        the <b>combined (× {nDr})</b> total is shown where relevant.
      </div>
    : <div className="rounded-lg border border-slate-200 bg-slate-50 p-2.5 text-xs text-slate-500 print-block">
        <b>Single drive.</b> All figures are for one motor / gearbox / brake.
      </div>
);

// ── duty cycle / RMS / energy (indicative, travel) ─────────────────────────────
function cycleCalc(c){
  const {Tstatic,Tpeak,Pstatic,Ppeak,nMot,tAcc,tRun,tDec,dwell,kCool,cph,hpy,tariff,regenEff}=c;
  const w=omega(nMot);
  const Tdec=Math.abs(Tpeak-2*Tstatic);
  const run=tAcc+tRun+tDec;
  const denom=run+ (kCool||0)*(dwell||0);
  const Trms=denom>0?Math.sqrt((Tpeak*Tpeak*tAcc+Tstatic*Tstatic*tRun+Tdec*Tdec*tDec)/denom):NaN;
  const Prms=Trms*w/1000;
  const ed=(run+dwell)>0?100*run/(run+dwell):NaN;
  const Eacc=0.5*(Pstatic+Ppeak)*tAcc;
  const Erun=Pstatic*tRun;
  const Pregen=Math.max(0,(2*Tstatic-Tpeak))*w/1000;
  const Eregen=0.5*Pregen*tDec;
  const EgridCycle=Eacc+Erun-(regenEff||0)*Eregen;
  const startsHr=(run+dwell)>0?3600/(run+dwell):NaN;
  const kWhYr=(cph||0)*(hpy||0)*EgridCycle/3600;
  const costYr=kWhYr*(tariff||0);
  return {Tdec,run,Trms,Prms,ed,Eacc,Erun,Pregen,Eregen,EgridCycle,startsHr,kWhYr,costYr};
}

// ════════════════════════════════════════════════════════════════════════════
//  HOIST  (serial-hoist / winch method; per-drive aware)
// ════════════════════════════════════════════════════════════════════════════
function computeHoist(x){
  const PI=Math.PI;
  const mLoad=(x.mL||0)+(x.mH||0);
  const mG=x.mG||0, mStat=mLoad-mG, mDyn=mLoad+mG;
  const d=x.d||0, s=x.s||0, v=x.v||0, a=x.a||0;
  const em=x.eta_mech||0, eg=x.eta_gear||0, et=em*eg, ig=x.i_gear||0;
  const nDr=Math.max(1,x.nDrives||1);

  // ── mechanism power & drum torque (TOTALS for the whole hoist) ──
  const P_static=em>0?(mStat*G*v)/em:NaN;
  const P_dynamic=em>0?(mDyn*a*v)/em:NaN;
  const P_total=P_static+P_dynamic;
  const P_regen=mStat*G*v*em;
  const M_drum_static=(em>0&&s>0)?(mStat*G*d)/(em*2*s):NaN;
  const M_drum_dynamic=(em>0&&s>0)?(mDyn*a*d)/(em*2*s):NaN;
  const M_drum_total=M_drum_static+M_drum_dynamic;
  const n_load=d>0?(s*v)/(PI*d):NaN;                 // drum speed, rev/s

  // ── inertia matching / ratio guidance ──
  const J_load=mDyn*Math.pow(d/2,2);
  const i_opt=x.J_motor>0?Math.sqrt((J_load/(s*s)+(x.J_drum||0))/x.J_motor):NaN;
  const fB=(ig>0&&x.M_motor_rated>0)?(x.M_gearbox_rated||0)/(ig*x.M_motor_rated):NaN;
  const fB_ok=isFinite(fB)&&fB>=(x.fB_min||0);

  // ── motor speed & torque (PER DRIVE; load shared across nDr) ──
  const n_motor_rps=d>0?(s*v*ig)/(PI*d):NaN, n_motor_rpm=n_motor_rps*60;
  const alpha=x.t_acc>0?(2*PI*n_motor_rps)/x.t_acc:NaN;
  const Mms_tot=(et>0&&s>0&&ig>0)?(mStat*G*d)/(et*2*s*ig):NaN;       // one-motor-equiv static
  const MloadDyn_tot=(et>0&&s>0&&ig>0)?(mDyn*a*d)/(et*2*s*ig):NaN;   // one-motor-equiv load dyn
  const Mlow_tot=(et>0&&s>0&&ig>0)?(mStat*G*d*et)/(2*s*ig):NaN;
  const M_motor_static=Mms_tot/nDr;                                  // per drive
  const M_motor_dyn=MloadDyn_tot/nDr + (x.J_motor||0)*alpha;         // per drive (own rotor + share)
  const M_motor_peak=M_motor_static+M_motor_dyn;                     // per drive
  const M_motor_lower=Mlow_tot/nDr;                                  // per drive
  // RMS per drive (accel peak included for first t_acc of hoist — conservative)
  const tH=x.t_hoist||0,tL=x.t_lower||0,tR=x.t_rest||0,kc=x.kCool||0.33;
  const tAccU=Math.min(x.t_acc||0,tH);
  const den=tH+tL+kc*tR;
  const M_rms=den>0?Math.sqrt((M_motor_peak*M_motor_peak*tAccU
                              +M_motor_static*M_motor_static*Math.max(0,tH-tAccU)
                              +M_motor_lower*M_motor_lower*tL)/den):NaN;
  const tOn=tH+tL, tCyc=tOn+tR, ED=tCyc>0?100*tOn/tCyc:NaN;
  const isS1=x.dutyType==="S1";
  const ed_ok=isS1?true:(isFinite(ED)&&ED<=(x.motor_ED||0));

  // motor checks (per drive vs per-motor rating)
  const stallMargin=isFinite(M_motor_peak)&&M_motor_peak>0?(x.M_motor_K||0)/M_motor_peak:NaN;
  const stall_ok=isFinite(stallMargin)&&stallMargin>=(x.stallFactor||1.3);
  const motorRatedKW=(x.n_motor_rated>0&&x.M_motor_rated>0)?x.M_motor_rated*x.n_motor_rated*2*PI/60/1000:NaN;
  const omegaRated=2*PI*(x.n_motor_rated||0)/60;
  const P_duty_tot=eg>0?((x.control==="vf"?P_total:P_static)/eg):NaN;   // W, total
  const P_duty_pd=P_duty_tot/nDr;                                       // per drive
  const P_rms_pd=isFinite(M_rms)?M_rms*omegaRated:NaN;                  // W per drive
  const P_req_pd=Math.max(isFinite(P_duty_pd)?P_duty_pd:0, isFinite(P_rms_pd)?P_rms_pd:0)||NaN; // per drive

  // 87 Hz (delta): extends SPEED & POWER only; torque unchanged
  const k87=x.hz87?((x.V_supply||400)/(x.V_delta||230)):1;
  const f87=((x.V_supply||400)/(x.V_delta||230))*(x.f_base||50);
  const nBaseEff=(x.n_motor_rated||0)*k87;
  const Pcap=motorRatedKW*k87;                                          // per motor capability
  const I_inv_req=x.hz87?Math.sqrt(3)*(x.I_motor_rated||0):(x.I_motor_rated||0);
  const P_motor_rec=pickMotor((P_req_pd/1000)/k87);                     // per-drive frame to buy
  const power_ok=isFinite(Pcap)&&Pcap>=P_req_pd/1000;
  const hz87_speed_ok=(x.n_motor_max||0)>=Math.max(nBaseEff,isFinite(n_motor_rpm)?n_motor_rpm:0);
  const hz87_invI_ok=(x.I_inverter||0)>=I_inv_req;
  const hz87_ok=hz87_speed_ok&&hz87_invI_ok&&!!x.hz87_dualvolt&&!!x.hz87_cooling;
  const thermalUtil=isFinite(M_rms)&&x.M_motor_rated>0?M_rms/x.M_motor_rated:NaN;
  const thermal_ok=isFinite(thermalUtil)&&thermalUtil<=1;

  // gear-ratio guidance: speed-match so the motor sits at (extended) base speed at v
  const drumRpm=isFinite(n_load)?n_load*60:NaN;
  const nTarget=x.hz87?nBaseEff:(x.n_motor_rated||0);
  const i_speed=drumRpm>0?nTarget/drumRpm:NaN;

  // gearbox output (PER DRIVE) — supplier quote
  const gbT2cont=isFinite(M_drum_static)?M_drum_static/nDr:NaN;
  const gbT2peak=isFinite(M_drum_total)?M_drum_total/nDr:NaN;
  const gbT2Nreq=gbT2cont*(x.fs||1);
  const gbTorque_ok=(x.M_gearbox_rated||0)>=gbT2peak;

  // ── brake & proof load (PER BRAKE) ──
  const M_load_motor=(s>0&&ig>0)?((mLoad*G*d)/(2*s*ig))/nDr:NaN;   // per drive, gross, lossless
  const pf=x.proofFactor||1.25, ov=x.overloadFactor||1.10;
  const M_load_proof=pf*M_load_motor;
  const req_2x=(x.brakeFactor||2)*(x.M_motor_rated||0);
  const req_proof=M_load_proof, req_static=M_load_motor;
  const brakeReq=Math.max(req_2x,req_proof,req_static);
  const brake_2x_ok=(x.M_brake_rated||0)>=req_2x;
  const brake_proof_ok=(x.M_brake_rated||0)>=req_proof;
  const brake_static_ok=(x.M_brake_rated||0)>=req_static;
  const load_proof=pf*mLoad, load_over=ov*mLoad;

  const warns=[];
  if(!(d>0))warns.push("Drum diameter must be > 0.");
  if(!(s>0))warns.push("Reeving factor must be ≥ 1.");
  if(!(ig>0))warns.push("Gear ratio i_gear must be > 0.");
  if(!(et>0))warns.push("Efficiencies must be > 0.");
  if(mStat<0)warns.push("Counterweight exceeds total load — overhauling; size the brake/drive for the worst case.");
  if(isFinite(n_motor_rpm)&&x.n_motor_rated>0&&n_motor_rpm<0.2*x.n_motor_rated)
    warns.push("Motor speed at hoisting velocity ("+fmt0(n_motor_rpm)+" rpm) < 20% of rated — use the recommended ratio or oversize the inverter.");
  if(x.fieldWeak)warns.push("Field weakening: stall torque falls above base speed — check the motor torque–speed curve.");
  if(x.hz87&&isFinite(n_motor_rpm)&&n_motor_rpm>nBaseEff*1.0001)
    warns.push("Operating speed ("+fmt0(n_motor_rpm)+" rpm) is above the 87 Hz base speed ("+fmt0(nBaseEff)+" rpm) — field weakening, torque falls ∝ 1/f.");
  if(x.hz87&&!(x.I_motor_rated>0))warns.push("Enter the motor rated (star) current so the inverter (delta) current can be sized.");

  return {nDr,mLoad,mStat,mDyn,P_static,P_dynamic,P_total,P_regen,M_drum_static,M_drum_dynamic,M_drum_total,n_load,
    J_load,i_opt,i_speed,fB,fB_ok,gbT2cont,gbT2peak,gbT2Nreq,gbTorque_ok,n_motor_rpm,
    M_motor_static,M_motor_dyn,M_motor_peak,M_motor_lower,M_rms,ED,isS1,ed_ok,
    stallMargin,stall_ok,motorRatedKW,P_duty_tot,P_duty_pd,P_req_pd,P_motor_rec,power_ok,thermalUtil,thermal_ok,
    k87,f87,nBaseEff,Pcap,I_inv_req,hz87_speed_ok,hz87_invI_ok,hz87_ok,
    M_load_motor,M_load_proof,req_2x,req_proof,req_static,brakeReq,brake_2x_ok,brake_proof_ok,brake_static_ok,
    load_proof,load_over,warns};
}

// ════════════════════════════════════════════════════════════════════════════
//  TRAVEL (long-travel or cross-travel)
// ════════════════════════════════════════════════════════════════════════════
function computeTravel(t){
  const m=t.m||0, W=m*G, vs=(t.v||0)/60, Dwm=(t.Dw||0)/1000;
  let Froll;
  if(t.rollMode==="spec"){ Froll=(t.wSpec||0)*W/1000; }
  else{ Froll=(t.Dw>0)?W*(t.cFlange||0)*((t.bearMu||0)*(t.dJourn||0)+2*(t.fRoll||0))/(t.Dw||1):NaN; }
  const Fgrad=W*((t.grad||0)/1000);
  const Fwind=t.outdoor?(t.windP||0)*(t.area||0):0;
  const Fres=Froll+Fgrad+Fwind;
  const Pstat=(t.etaMech>0)?Fres*vs/1000/t.etaMech:NaN;
  const nWheel=Dwm>0?(t.v||0)/(Math.PI*Dwm):NaN;
  const i=nWheel>0?(t.nMot||0)/nWheel:NaN;
  const w=omega(t.nMot||0);
  const Tstat=Tnm(Pstat,t.nMot);
  const aReq=t.vfd&&t.accelMode==="rate"?(t.accelRate||0):((t.ta>0)?vs/t.ta:NaN);
  const tAcc=aReq>0?vs/aReq:NaN;
  const Facc=m*aReq;
  const Fdrive=Fres+Facc;
  const Ppeak=(t.etaMech>0)?Fdrive*vs/1000/t.etaMech:NaN;
  const Jload=w>0?m*Math.pow(vs/w,2):NaN;
  const alpha=tAcc>0?w/tAcc:NaN;
  const Tacc=(t.etaMech>0)?((t.Jmot||0)+Jload/t.etaMech)*alpha:NaN;
  const Tpeak=Tstat+Tacc;
  const Ndriven=(t.nW>0)?W*((t.nD||0)/t.nW):NaN;
  const Fadh=(t.muAdh||0)*Ndriven;
  const uSkid=Fadh>0?Fdrive/Fadh:NaN;
  const aMaxSkid=(m>0)?(Fadh-Fres)/m:NaN;
  const nDr=Math.max(1,t.nDrives||1);
  const peakFactor=t.vfd?(t.vfdOverload||1.5):1.6;
  const PperDriveStat=Math.max(Pstat/nDr,(isFinite(Ppeak)?Ppeak:Pstat)/nDr/peakFactor);
  const motorKW=pickMotor(PperDriveStat);
  const Trated=motorKW?Tnm(motorKW,t.nMot):NaN;
  const Tbreak=Trated*(t.breakdownK||0);
  const breakOK=isFinite(Tbreak)&&(Tpeak/nDr)<=Tbreak;
  const Tavail=Math.min(Tbreak||Infinity,(t.vfdOverload||0)*(Trated||0));
  const FtractAvail=(isFinite(Tavail)&&isFinite(i)&&Dwm>0)?(Tavail*nDr*i*t.etaMech)/(Dwm/2):NaN;
  const aTorque=(isFinite(FtractAvail)&&m>0)?(FtractAvail-Fres)/m:NaN;
  const aAchieve=Math.min(isFinite(aMaxSkid)?aMaxSkid:Infinity, isFinite(aTorque)?aTorque:Infinity);
  const accelLimitedBy=(aMaxSkid<=aTorque)?"wheel/rail slip":"motor / VFD torque";
  const tb=t.tb||0;
  const ab=tb>0?vs/tb:NaN;
  const sStop=tb>0?vs*tb/2:NaN;
  const uSkidB=Fadh>0?(m*ab)/Fadh:NaN;
  const Rwheel=Dwm/2;
  const gbT2cont=isFinite(Rwheel)?Fres*Rwheel/nDr:NaN;
  const gbT2peak=isFinite(Rwheel)?Fdrive*Rwheel/nDr:NaN;
  const gbT2Nreq=gbT2cont*(t.fs||1);
  const wheelLoad=t.nW>0?W/t.nW:NaN;
  const Ekin=0.5*m*vs*vs/1000;
  const Eresist=Fres*(sStop||0)/1000;
  const Eregen=Math.max(0,Ekin-Eresist);
  const PregenPk=tb>0?2*Eregen/tb:NaN;
  let cyc=null;
  if(t.cycEnable){
    const dAcc=0.5*vs*(tAcc||0), dDec=0.5*vs*tb;
    const tRun=Math.max(0,((t.moveDist||0)-dAcc-dDec)/(vs||1));
    cyc=cycleCalc({Tstatic:Math.abs(Tstat),Tpeak:Math.abs(Tpeak),Pstatic:Math.abs(Pstat),Ppeak:Math.abs(Ppeak),
      nMot:t.nMot,tAcc:tAcc||0,tRun,tDec:tb,dwell:t.dwell||0,kCool:t.kCool,cph:t.cph,hpy:t.hpy,tariff:t.tariff,regenEff:t.regenEff});
  }
  const warns=[];
  if(!(t.v>0))warns.push("Travel speed must be greater than 0.");
  if(!(t.Dw>0))warns.push("Wheel diameter must be greater than 0.");
  if(!(t.nMot>0))warns.push("Motor speed must be greater than 0.");
  if(!(t.nW>0)||!(t.nD>0))warns.push("Wheel counts must be greater than 0.");
  if(t.nD>t.nW)warns.push("Driven wheels cannot exceed total wheels.");
  if(t.etaMech<=0)warns.push("Mechanism efficiency must be greater than 0.");
  if(isFinite(uSkid)&&uSkid>1)warns.push("Drive anti-skid FAIL: tractive demand exceeds wheel/rail adhesion — add driven wheels, revise μ or extend the accel time.");
  if(isFinite(uSkidB)&&uSkidB>1)warns.push("Braking would exceed adhesion — wheels lock/skid on the stop; extend braking time or add braked-wheel capacity.");
  if(motorKW&&!breakOK)warns.push("Peak torque exceeds the selected motor's breakdown torque — pick a larger frame or extend the accel time.");
  return {m,W,vs,Froll,Fgrad,Fwind,Fres,Pstat,nWheel,i,Tstat,aReq,tAcc,Facc,Fdrive,Ppeak,Tacc,Tpeak,
    Ndriven,Fadh,uSkid,aMaxSkid,aTorque,aAchieve,accelLimitedBy,nDr,PperDriveStat,motorKW,Trated,Tbreak,breakOK,
    gbT2cont,gbT2peak,gbT2Nreq,wheelLoad,

}

              <ul className="list-disc pl-4 space-y-1 text-xs">
                <li>P = F·v/η ; P = m·g·v/η &nbsp;|&nbsp; T = 9549.3·P[kW]/n = P/ω</li>
                <li>i = n<sub>motor</sub>/n<sub>out</sub>, n<sub>out</sub> = v/(π·D); drum n = s·v/(π·d)</li>
                <li>Reflected inertia J<sub>eq</sub> = m·(v/ω)²; i<sub>opt</sub> = √[(J<sub>load</sub>/s²+J<sub>drum</sub>)/J<sub>motor</sub>]</li>
                <li>Drum torque = (m∓m<sub>G</sub>)·g·d/(η·2·s) (+ accel form)</li>
                <li>Anti-skid F<sub>adh</sub> = μ·N<sub>driven</sub>; demand F<sub>resist</sub>+m·a</li>

            <Row k="Service factor fB" unit="" v={fmt(r.fB,2)} ok={r.fB_ok}/>
            <Row k={"Output torque"+(nDr>1?" /drive":"")+" (cont.)"} unit="N·m" v={fmt(r.gbT2cont,0)}/>
            <Row k={"Rated output torque ≥ peak"+(nDr>1?" /drive":"")} unit="N·m" v={fmt0(h.M_gearbox_rated)} ok={r.gbTorque_ok}/>
          </dl>
        </div>

        <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
          <h2 className="font-bold text-slate-800 mb-2">Motor selection{nDr>1?" (per drive)":""}</h2>
          <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
            <Row k="Required power (governing)" unit="kW" v={fmt(r.P_req_pd/1000,2)} strong badge={{t:"no margin",tone:""}}/>
            <Row k="Smallest standard motor ≥" unit="kW" v={r.P_motor_rec?fmt(r.P_motor_rec,1):"—"} strong badge={{t:h.hz87?"IEC ÷k":"IEC",tone:"def"}}/>
            {nDr>1&&<Row k={"Combined (× "+nDr+" drives)"} unit="kW" v={r.P_motor_rec?fmt(r.P_motor_rec*nDr,1):"—"}/>}
            <Row k="Motor rated power (entered)" unit="kW" v={fmt(r.motorRatedKW,2)} ok={h.hz87?undefined:r.power_ok}/>
            {h.hz87&&<Row k="↳ capability at 87 Hz" unit="kW" v={fmt(r.Pcap,2)} ok={r.power_ok} badge={{t:"×"+fmt(r.k87,2),tone:""}}/>}
            <Row k={"Stall margin (≥"+fmt(h.stallFactor,2)+")"} unit="×" v={fmt(r.stallMargin,2)} ok={r.stall_ok}/>
            <Row k="Thermal utilisation (RMS)" unit="%" v={fmt(r.thermalUtil*100,0)} ok={r.thermal_ok}/>
            <Row k={r.isS1?"Duty (S1 continuous)":("Duty %ED (≤"+fmt0(h.motor_ED)+")")} unit={r.isS1?"":"%"} v={r.isS1?"N/A":fmt(r.ED,0)} ok={r.ed_ok}/>
          </dl>
          <p className="text-xs text-slate-400 mt-2">Required power has <b>no added margin</b> (larger of duty &amp; thermal-RMS); the standard size is the smallest IEC frame that meets it{nDr>1?", per drive":""}. {r.isS1?"Motor is continuous (S1) — %ED is N/A; the thermal-RMS check governs.":"For an SEW/continuous (S1) motor switch duty type to S1 — then %ED is N/A and thermal-RMS governs."} The PASS/FAIL tests the motor you enter, so an exact/special motor can be fitted if cheaper.</p>
        </div>

        {h.hz87&&(
          <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:r.hz87_ok?"#16a34a":"#dc2626",background:r.hz87_ok?"#f0fdf4":"#fef2f2"}}>
            <div className="flex items-center justify-between mb-2">
              <h2 className="font-bold text-slate-800">87 Hz (delta) — speed/power only</h2>
              <Pill ok={r.hz87_ok}>{r.hz87_ok?"SUITABLE":"CHECK"}</Pill>
            </div>
            <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
              <Row k="87 Hz base frequency" unit="Hz" v={fmt(r.f87,1)}/>
              <Row k="Extended base speed" unit="rpm" v={fmt0(r.nBaseEff)} strong badge={{t:"constant torque",tone:""}}/>
              <Row k="Power capability (× k)" unit="kW" v={fmt(r.Pcap,2)} strong/>
              <Row k="Required inverter current" unit="A" v={fmt(r.I_inv_req,1)} strong badge={{t:"√3 × rated",tone:""}}/>
              <Row k="Motor max speed ≥ base" unit="rpm" v={fmt0(h.n_motor_max)} ok={r.hz87_speed_ok}/>
              <Row k="Inverter ≥ delta current" unit="A" v={fmt(h.I_inverter,1)} ok={r.hz87_invI_ok}/>
              <Row k="Dual-voltage motor confirmed" unit="" v={h.hz87_dualvolt?"yes":"no"} ok={h.hz87_dualvolt}/>
              <Row k="Cooling/bearings confirmed" unit="" v={h.hz87_cooling?"yes":"no"} ok={h.hz87_cooling}/>
            </dl>
            <p className="text-xs text-slate-500 mt-2">Torque (rated/peak/stall) is unchanged — only speed &amp; power extend (×k). Size the inverter for the delta current; re-check the gear ratio &amp; gearbox thermal at the higher speed.</p>
          </div>
        )}

        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:brakeAllOK?"#16a34a":"#dc2626",background:brakeAllOK?"#f0fdf4":"#fef2f2"}}>
          <div className="flex items-center justify-between mb-2">
            <h2 className="font-bold text-slate-800">Holding brake &amp; 125% proof load{nDr>1?" (per brake)":""}</h2>
            <Pill ok={brakeAllOK}>{brakeAllOK?"PASS":"FAIL"}</Pill>
          </div>
          <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
            <Row k={"Static load torque"+(nDr>1?" /brake":"")} unit="N·m" v={fmt(r.M_load_motor,1)} badge={{t:"gross, lossless",tone:""}}/>
            <Row k={"At "+fmt(h.proofFactor,2)+"× proof load"} unit="N·m" v={fmt(r.M_load_proof,1)}/>
            <Row k="Recommended brake torque" unit="N·m" v={fmt0(r.brakeReq)} strong/>
            <Row k="Brake rated torque (entered)" unit="N·m" v={fmt0(h.M_brake_rated)} strong/>
            <Row k={"≥ "+fmt(h.brakeFactor,1)+"× motor rated ("+fmt0(r.req_2x)+")"} unit="" v={""} ok={r.brake_2x_ok}/>
            <Row k={"holds "+fmt(h.proofFactor,2)+"× proof ("+fmt0(r.req_proof)+")"} unit="" v={""} ok={r.brake_proof_ok}/>
            <Row k={"exceeds static load ("+fmt0(r.req_static)+")"} unit="" v={""} ok={r.brake_static_ok}/>
          </dl>
          <p className="text-xs text-slate-500 mt-2">Recommended brake torque is the worst case of the factor-on-motor-torque, the 125% proof-load hold, and the static-load checks — sized on the static load torque, computed lossless (gearbox friction only helps hold).</p>
        </div>

        <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
          <h2 className="font-bold text-slate-800 mb-2">Overload / proof loads</h2>
          <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
            <Row k="Rated load" unit="kg" v={fmt0(r.mLoad)}/>
            <Row k={fmt0(h.overloadFactor*100)+"% operational overload"} unit="kg" v={fmt0(r.load_over)}/>
            <Row k={fmt0(h.proofFactor*100)+"% proof (test) load"} unit="kg" v={fmt0(r.load_proof)} strong/>
          </dl>
        </div>
        <ScopeNote/>
      </div>
    </div>
  );
}

// ── TRAVEL tab ────────────────────────────────────────────────────────────────
function TravelTab({t,set,r,title,massHint,unit}){
  const skidOK=isFinite(r.uSkid)&&r.uSkid<=1;
  const skidBOK=isFinite(r.uSkidB)&&r.uSkidB<=1;
  const nDr=r.nDr;
  return (
    <div className="bg-white rounded-b-lg rounded-tr-lg shadow-sm border border-slate-200 p-5 grid md:grid-cols-2 gap-6">
      <div>
        <Group title={title} open={true}>
          <p className="text-xs text-slate-400 mb-2">Mass = {massHint}.</p>
          <div className="grid grid-cols-2 gap-x-4">
            <Field label="Total moving mass" hint="kg"><Num value={t.m} min="0" step="100" onChange={e=>set("m",e.target.value)}/></Field>
            <SpeedField label="Travel speed" unit={unit} vMin={t.v} onMin={v=>set("v",v)}/>
            <Field label="Total wheels"><Num value={t.nW} min="1" step="1" onChange={e=>set("nW",e.target.value)}/></Field>
            <Field label="Driven wheels"><Num value={t.nD} min="1" step="1" onChange={e=>set("nD",e.target.value)}/></Field>
            <Field label="Wheel diameter" hint="mm"><Num value={t.Dw} min="0" step="10" onChange={e=>set("Dw",e.target.value)}/></Field>
            <Field label="Motor base speed" hint="rpm"><Num value={t.nMot} min="0" step="10" onChange={e=>set("nMot",e.target.value)}/></Field>
            <Field label="Mechanism efficiency" hint="η"><Num value={t.etaMech} min="0" max="1" step="0.01" onChange={e=>set("etaMech",e.target.value)}/></Field>
            <Field label="Adhesion μ" hint="wheel/rail — confirm"><Num value={t.muAdh} min="0" max="1" step="0.01" onChange={e=>set("muAdh",e.target.value)}/></Field>
            <Field label="Gradient" hint="‰"><Num value={t.grad} min="0" step="0.5" onChange={e=>set("grad",e.target.value)}/></Field>
            <Field label="Motor inertia" hint="kg·m²"><Num value={t.Jmot} min="0" step="0.01" onChange={e=>set("Jmot",e.target.value)}/></Field>
          </div>
        </Group>

        <Group title="Running resistance" open={false}>
          <div className="flex gap-2 mb-3">
            <Toggle on={t.rollMode==="calc"} onClick={()=>set("rollMode","calc")}>Bearing &amp; rolling</Toggle>
            <Toggle on={t.rollMode==="spec"} onClick={()=>set("rollMode","spec")}>Specific resistance</Toggle>
          </div>
          {t.rollMode==="calc"?(
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Journal diameter" hint="mm"><Num value={t.dJourn} min="0" step="5" onChange={e=>set("dJourn",e.target.value)}/></Field>
              <Field label="Bearing μ" hint="default — confirm"><Num value={t.bearMu} min="0" step="0.001" onChange={e=>set("bearMu",e.target.value)}/></Field>
              <Field label="Rolling lever f" hint="mm — confirm"><Num value={t.fRoll} min="0" step="0.1" onChange={e=>set("fRoll",e.target.value)}/></Field>
              <Field label="Flange factor c" hint="— confirm"><Num value={t.cFlange} min="1" step="0.1" onChange={e=>set("cFlange",e.target.value)}/></Field>
            </div>
          ):(
            <Field label="Specific resistance w" hint="N per kN (≈10–20 steel wheel)"><Num value={t.wSpec} min="0" step="1" onChange={e=>set("wSpec",e.target.value)}/></Field>
          )}
          <label className="flex items-center gap-2 mt-2 text-sm text-slate-700">
            <input type="checkbox" checked={t.outdoor} onChange={e=>set("outdoor",e.target.checked)}/> Outdoor — include in-service wind
          </label>
          {t.outdoor&&(
            <div className="grid grid-cols-2 gap-x-4 mt-2">
              <Field label="Wind pressure" hint="N/m² — confirm"><Num value={t.windP} min="0" step="10" onChange={e=>set("windP",e.target.value)}/></Field>
              <Field label="Projected area" hint="m²"><Num value={t.area} min="0" step="0.5" onChange={e=>set("area",e.target.value)}/></Field>
            </div>
          )}
        </Group>

        <Group title="Acceleration / VFD & braking" open={false}>
          <label className="flex items-center gap-2 mb-2 text-sm text-slate-700">
            <input type="checkbox" checked={t.vfd} onChange={e=>set("vfd",e.target.checked)}/> VFD drive
          </label>
          <div className="flex gap-2 mb-2">
            <Toggle on={t.accelMode==="time"} onClick={()=>set("accelMode","time")}>By accel time</Toggle>
            <Toggle on={t.accelMode==="rate"} onClick={()=>set("accelMode","rate")}>By max accel</Toggle>
          </div>
          <div className="grid grid-cols-2 gap-x-4">
            {t.accelMode==="time"
              ?<Field label="Acceleration time" hint="s"><Num value={t.ta} min="0.1" step="0.1" onChange={e=>set("ta",e.target.value)}/></Field>
              :<Field label="Max acceleration" hint="m/s²"><Num value={t.accelRate} min="0.01" step="0.05" onChange={e=>set("accelRate",e.target.value)}/></Field>}
            <Field label="Braking time" hint="s to stop"><Num value={t.tb} min="0.1" step="0.1" onChange={e=>set("tb",e.target.value)}/></Field>
            {t.vfd&&<Field label="VFD overload" hint="× rated"><Num value={t.vfdOverload} min="1" step="0.1" onChange={e=>set("vfdOverload",e.target.value)}/></Field>}
            {t.vfd&&<Field label="Regen recovery η" hint="0 = resistor"><Num value={t.regenEff} min="0" max="1" step="0.05" onChange={e=>set("regenEff",e.target.value)}/></Field>}
          </div>
        </Group>

        <Group title="Drives, gearbox & motor selection" open={false}>
          <div className="grid grid-cols-2 gap-x-4">
            <Field label="Drives (motors)" hint="parallel units"><Num value={t.nDrives} min="1" step="1" onChange={e=>set("nDrives",e.target.value)}/></Field>
            <Field label="Breakdown torque" hint="× rated"><Num value={t.breakdownK} min="1" step="0.1" onChange={e=>set("breakdownK",e.target.value)}/></Field>
            <Field label="Gearbox service factor f_s" hint="application — confirm"><Num value={t.fs} min="1" step="0.05" onChange={e=>set("fs",e.target.value)}/></Field>
          </div>
        </Group>

        <Group title="Duty cycle & energy (indicative)" open={false}>
          <label className="flex items-center gap-2 mb-2 text-sm text-slate-700">
            <input type="checkbox" checked={t.cycEnable} onChange={e=>set("cycEnable",e.target.checked)}/> Estimate RMS / %ED / energy
          </label>
          {t.cycEnable&&(
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Move distance" hint="m per cycle"><Num value={t.moveDist} min="0" step="1" onChange={e=>set("moveDist",e.target.value)}/></Field>
              <Field label="Dwell / cycle" hint="s standstill"><Num value={t.dwell} min="0" step="1" onChange={e=>set("dwell",e.target.value)}/></Field>
              <Field label="Standstill cooling k" hint="≈0.33"><Num value={t.kCool} min="0" max="1" step="0.05" onChange={e=>set("kCool",e.target.value)}/></Field>
              <Field label="Cycles / hour"><Num value={t.cph} min="0" step="1" onChange={e=>set("cph",e.target.value)}/></Field>
              <Field label="Operating h / year"><Num value={t.hpy} min="0" step="100" onChange={e=>set("hpy",e.target.value)}/></Field>
              <Field label="Tariff" hint="£/kWh"><Num value={t.tariff} min="0" step="0.01" onChange={e=>set("tariff",e.target.value)}/></Field>
            </div>
          )}
        </Group>
      </div>

      {/* RESULTS */}
      <div className="space-y-5">
        {r.warns.length>0 && (
          <div className="rounded-lg border border-amber-300 bg-amber-50 p-3 text-sm text-amber-800">
            <div className="font-semibold mb-1">Check inputs</div>
            <ul className="list-disc pl-5 space-y-0.5">{r.warns.map((w,i)=><li key={i}>{w}</li>)}</ul>
          </div>
        )}
        <DriveScope nDr={nDr}/>
        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:skidOK?"#16a34a":"#dc2626",background:skidOK?"#f0fdf4":"#fef2f2"}}>
          <div className="flex items-center justify-between mb-2">
            <h2 className="font-bold text-slate-800">Anti-skid (drive)</h2>
            <Pill ok={skidOK}>{skidOK?"NO SLIP":"SLIP — FAIL"}</Pill>
          </div>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Tractive demand (resist+accel)" unit="kN" v={fmt(r.Fdrive/1000,2)}/>
            <Row k="Adhesion limit μ·N_driven" unit="kN" v={fmt(r.Fadh/1000,2)} badge={{t:"F=μ·N",tone:""}}/>
            <Row k="Utilisation" unit="" v={fmt(r.uSkid*100,0)+" %"} strong/>
            <Row k="Skid-limited accel" unit="m/s²" v={fmt(r.aMaxSkid,2)}/>
            {t.vfd&&<Row k="Torque-limited accel" unit="m/s²" v={fmt(r.aTorque,2)}/>}
            {t.vfd&&<Row k="Achievable accel" unit="m/s²" v={fmt(r.aAchieve,2)} strong badge={{t:"limit: "+r.accelLimitedBy,tone:""}}/>}
          </dl>
          <p className="text-xs text-slate-500 mt-2">{fmt0(t.nD)} of {fmt0(t.nW)} wheels driven (even distribution). Braking uses {fmt(r.uSkidB*100,0)}% of adhesion {skidBOK?"":"— wheels would lock."}</p>
        </div>

        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:ACCENT,background:"#fffbeb"}}>
          <div className="flex items-center justify-between mb-2">
            <h2 className="font-bold text-slate-800">Required motor &amp; drive{nDr>1?" (per drive)":""}</h2>
            <Badge>P = F·v / η</Badge>
          </div>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Steady drive power (total)" unit="kW" v={fmt(r.Pstat,2)} strong/>
            <Row k="Motor torque (steady, total)" unit="N·m" v={fmt(r.Tstat,1)}/>
            <Row k="Motor torque (steady+accel, total)" unit="N·m" v={fmt(r.Tpeak,1)} strong badge={{t:"peak",tone:""}}/>
            <Row k="Wheel speed" unit="rpm" v={fmt(r.nWheel,1)}/>
            <Row k="Gearbox ratio i" unit=": 1" v={fmt(r.i,2)} strong/>
            <Row k={"Std motor"+(nDr>1?" /drive":"")} unit="kW" v={r.motorKW?fmt(r.motorKW,1):"—"} strong badge={{t:"IEC pick",tone:"def"}}/>
            {nDr>1&&<Row k={"Combined (× "+nDr+" drives)"} unit="kW" v={r.motorKW?fmt(r.motorKW*nDr,1):"—"}/>}
            <Row k="Breakdown torque margin" unit="" v={r.motorKW?(r.breakOK?"OK":"LOW"):"—"}/>
          </dl>
        </div>

        <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
          <h2 className="font-bold text-slate-800 mb-3">Forces, braking &amp; regen</h2>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Rolling resistance" unit="kN" v={fmt(r.Froll/1000,2)}/>
            {t.grad>0&&<Row k="Gradient resistance" unit="kN" v={fmt(r.Fgrad/1000,2)}/>}
            {t.outdoor&&<Row k="Wind resistance" unit="kN" v={fmt(r.Fwind/1000,2)}/>}
            <Row k="Total steady resistance" unit="kN" v={fmt(r.Fres/1000,2)} strong/>
            <Row k="Acceleration" unit="m/s²" v={fmt(r.aReq,3)}/>
            <Row k="Required deceleration" unit="m/s²" v={fmt(r.ab,3)}/>
            <Row k="Stopping distance" unit="m" v={fmt(r.sStop,2)} strong/>
            {t.vfd&&<Row k="Regen energy / stop" unit="kJ" v={fmt(r.Eregen,1)} badge={{t:"→ resistor",tone:""}}/>}
            {t.vfd&&<Row k="Peak regen power" unit="kW" v={fmt(r.PregenPk,1)}/>}
          </dl>
        </div>

        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:"#0369a1",background:"#f0f9ff"}}>
          <div className="flex items-center justify-between mb-2">
            <h2 className="font-bold text-slate-800">Geared-motor spec{nDr>1?" (per drive)":""}</h2>
            <Badge tone="def">SEW / Nord / Demag</Badge>
          </div>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Motor power (per drive)" unit="kW" v={r.motorKW?fmt(r.motorKW,1):"—"} strong/>
            <Row k="Output speed n₂" unit="rpm" v={fmt(r.nWheel,1)}/>
            <Row k="Gear ratio i" unit=": 1" v={fmt(r.i,2)}/>
            <Row k={"Output torque (cont.)"+(nDr>1?" /drive":"")} unit="N·m" v={fmt(r.gbT2cont,0)}/>
            <Row k={"Select gearbox T₂N ≥ (× f_s "+fmt(t.fs,2)+")"} unit="N·m" v={fmt(r.gbT2Nreq,0)} strong/>
            <Row k={"Output torque (peak)"+(nDr>1?" /drive":"")} unit="N·m" v={fmt(r.gbT2peak,0)}/>
            <Row k="Output radial load (wheel)" unit="kN" v={fmt(r.wheelLoad/1000,2)}/>
          </dl>
          <p className="text-xs text-slate-500 mt-2">Hand these to the supplier with the duty (%ED &amp; starts/hour). Output torque = tractive force × wheel radius, per driving gearbox.</p>
        </div>

        {t.cycEnable&&r.cyc&&(
          <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
            <h2 className="font-bold text-slate-800 mb-2">Duty &amp; energy <Badge tone="def">indicative</Badge></h2>
            <dl className="grid grid-cols-2 gap-y-2 text-sm">
              <Row k="RMS motor torque" unit="N·m" v={fmt(r.cyc.Trms,1)}/>
              <Row k="RMS continuous power" unit="kW" v={fmt(r.cyc.Prms,2)} strong/>
              {r.motorKW&&<Row k="vs selected motor rating" unit="" v={r.cyc.Prms<=r.motorKW?"OK — within kW":"RMS > motor kW — uprate"}/>}
              <Row k="Duty %ED" unit="%" v={fmt(r.cyc.ed,0)}/>
              <Row k="Implied starts / hour" unit="" v={fmt0(r.cyc.startsHr)}/>
              <Row k="Energy / cycle" unit="kWh" v={fmt(r.cyc.EgridCycle/3600,3)}/>
              <Row k="Energy / year" unit="kWh" v={fmt0(r.cyc.kWhYr)}/>
              <Row k="Running cost / year" unit="£" v={fmt0(r.cyc.costYr)} strong/>
            </dl>
            <p className="text-xs text-slate-400 mt-2">Trapezoidal-move estimate; verify thermal rating against the supplier data.</p>
          </div>
        )}
        <ScopeNote/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
