<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;
const ACCENT="#d97706",STEEL="#1e293b";
const fmt=(x,dp=2)=>(x==null||!isFinite(x))?"—":Number(x).toLocaleString("en-GB",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const fmt0=(x)=>(x==null||!isFinite(x))?"—":Math.round(x).toLocaleString("en-GB");

// ════════════════════════════════════════════════════════════════════════════
//  ENGINEERING DATA & FORMULAE
//
//  Two kinds of value live here, and they are NOT equal in authority:
//
//   (1) KINEMATIC / DYNAMIC RELATIONS — general mechanics, edition-independent.
//       Exact; never "tuned". Badged amber in the UI.
//         P = F·v / η ; P = m·g·v / η         power vs force/load & speed
//         T = 9549.3·P[kW]/n  (= P/ω)         shaft torque from power & speed
//         i = n_motor / n_out ; n_out = v/(πD) gear ratio
//         J_eq = m·(v/ω)²                      moving mass referred as inertia
//         T_acc = (J_mot + J_eq/η)·α , α=ω/t_a accel torque
//         η_reeving = (1−η_s^n)/(n(1−η_s))     pulley-system efficiency
//         S = m·g/(n_falls·η_reeving)          hoist lead-line rope pull
//         φ2 = φ2,min + β2·v_h                  EN 13001-2 hoisting factor (FORM)
//         F_adh = μ·N                          anti-skid limit
//
//   (2) EMPIRICAL / TABULATED COEFFICIENTS — adhesion, rolling-resistance terms,
//       wind, brake factor, rope coefficient Zp, drum D/d minimum, φ2 coeffs.
//       These are EDITION- and PROJECT-dependent and PUBLISHED VALUES DISAGREE
//       between sources/editions, so they are EXPOSED AS EDITABLE INPUTS with
//       typical DEFAULTS, badged "default — confirm" (blue). Verify each against
//       the controlling standard (EN 14492-2 / ISO 4308 / EN 13001-2 / EN 13135)
//       before order. A result on a default is INDICATIVE, not normative.
//
//  Sizing philosophy: returns the *demanded* power, torque, ratio, *minimum*
//  brake torque, anti-skid, rope/D-d checks and an *indicative* duty/energy
//  estimate. Final thermal selection (duty S1–S5 / %ED + permissible starts,
//  FEM 9.683 / EN 14492-2) and a real motor pick remain the engineer's call.
// ════════════════════════════════════════════════════════════════════════════
const G=9.80665;                              // m/s²
const Tnm=(kW,n)=>(n>0?9549.296*kW/n:NaN);    // shaft torque [N·m] from power [kW] & speed [rpm]
const omega=(n)=>2*Math.PI*n/60;              // rad/s from rpm
// IEC standard motor power ladder (kW) — for "next standard size"
const IEC_KW=[0.12,0.18,0.25,0.37,0.55,0.75,1.1,1.5,2.2,3,4,5.5,7.5,11,15,18.5,22,30,37,45,55,75,90,110,132,160,200,250,315,355,400];
const pickMotor=(P)=>{if(!isFinite(P)||P<=0)return null;for(const k of IEC_KW){if(k>=P*0.999999)return k;}return null;};
// pulley-system (reeving) efficiency from n supporting falls + nDiv diverting sheaves
const reevingEff=(n,es,nDiv)=>{n=n||0;es=es||0;nDiv=nDiv||0;if(n<=0||es<=0||es>=1)return NaN;
  return ((1-Math.pow(es,n))/(n*(1-es)))*Math.pow(es,nDiv);};

const DEF={
  muAdh:0.15, fRoll:0.5, cFlange:1.5, bearMu:0.02, windP:250, brakeSFhoist:1.6,
  etaS:0.98, etaMech:0.90, vfdOverload:1.5, breakdownK:2.7, regenEff:0.0,
  Zp:4.0, minDd:20, phi2min:1.1, beta2:0.34, kCool:0.33, fs:1.25,
};

// ── UI atoms ─────────────────────────────────────────────────────────────────
const Badge=({children,tone})=>(
  <span style={tone==="def"?{background:"#e0f2fe",color:"#075985",border:"1px solid #7dd3fc"}
                           :{background:"#fef3c7",color:"#92400e",border:"1px solid #fcd34d"}}
        className="text-[10px] font-semibold px-1.5 py-0.5 rounded ml-1 align-middle whitespace-nowrap">{children}</span>
);
const Field=({label,hint,children})=>(
  <label className="block mb-3">
    <div className="text-sm font-medium text-slate-700">{label}</div>
    {hint&&<div className="text-xs text-slate-400 mb-1">{hint}</div>}
    {children}
  </label>
);
const Num=(props)=>(
  <input type="number" {...props}
    className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400" />
);
const Row=({k,unit,v,strong,badge})=>(
  <React.Fragment>
    <dt className={"text-slate-500 "+(strong?"font-semibold text-slate-700":"")}>{k}{badge&&<Badge tone={badge.tone}>{badge.t}</Badge>}</dt>
    <dd className={"text-right font-mono "+(strong?"font-bold text-slate-800":"")}>{v}{unit&&<span className="text-slate-400 font-sans"> {unit}</span>}</dd>
  </React.Fragment>
);
const Pill=({ok,children})=>(
  <span className={"text-xs font-bold px-2 py-0.5 rounded "+(ok?"bg-green-100 text-green-700":"bg-red-100 text-red-700")}>{children}</span>
);
const Toggle=({on,onClick,children})=>(
  <button onClick={onClick} className={"text-xs px-2 py-1 rounded border "+(on?"bg-amber-500 text-white border-amber-500":"bg-white text-slate-600 border-slate-300")}>{children}</button>
);
// collapsible input group
const Group=({title,open,children})=>(
  <details open={open} className="border border-slate-200 rounded-lg mb-3">
    <summary className="cursor-pointer select-none font-semibold text-slate-700 text-sm px-3 py-2 bg-slate-50 rounded-t-lg">{title}</summary>
    <div className="p-3">{children}</div>
  </details>
);

// ── duty cycle / RMS / energy (indicative, shared by all mechanisms) ───────────
// Simplified trapezoidal move: accelerate (Tpeak), run (Tstatic), decelerate
// (|Tpeak−2·Tstatic|, resistance/gravity assisting), then dwell. RMS torque per
// FEM-style equivalent: denom counts standstill at reduced cooling kCool.
function cycleCalc(c){
  const {Tstatic,Tpeak,Pstatic,Ppeak,nMot,tAcc,tRun,tDec,dwell,kCool,cph,hpy,tariff,regenEff}=c;
  const w=omega(nMot);
  const Tdec=Math.abs(Tpeak-2*Tstatic);               // decel torque magnitude (motor)
  const run=tAcc+tRun+tDec;                             // time in motion
  const denom=run+ (kCool||0)*(dwell||0);
  const Trms=denom>0?Math.sqrt((Tpeak*Tpeak*tAcc+Tstatic*Tstatic*tRun+Tdec*Tdec*tDec)/denom):NaN;
  const Prms=Trms*w/1000;                               // continuous power req at base speed, kW
  const ed=(run+dwell)>0?100*run/(run+dwell):NaN;       // duty %ED
  // energy per cycle (indicative): motoring accel+run, regen on decel
  const Eacc=0.5*(Pstatic+Ppeak)*tAcc;                  // kJ (kW·s)
  const Erun=Pstatic*tRun;
  const Pregen=Math.max(0,(2*Tstatic-Tpeak))*w/1000;    // regen power if decel is overhauling, kW
  const Eregen=0.5*Pregen*tDec;                          // kJ recoverable on decel
  const EgridCycle=Eacc+Erun-(regenEff||0)*Eregen;      // kJ from grid per cycle
  const startsHr=(run+dwell)>0?3600/(run+dwell):NaN;     // implied starts/hour (1 move/cycle)
  const kWhYr=(cph||0)*(hpy||0)*EgridCycle/3600;         // kWh/year
  const costYr=kWhYr*(tariff||0);
  return {Tdec,run,Trms,Prms,ed,Eacc,Erun,Pregen,Eregen,EgridCycle,startsHr,kWhYr,costYr};
}

// ════════════════════════════════════════════════════════════════════════════
//  HOIST
// ════════════════════════════════════════════════════════════════════════════
function computeHoist(h){
  const mGross=(h.mLoad||0)+(h.mTackle||0);
  const vs=(h.vh||0)/60;
  const W=mGross*G;                                      // gross load force (for rope), N
  // EN 13001-2 hoisting dynamic factor (form; coeffs editable)
  const phi2 = h.hcEnable ? ((h.phi2min||0)+(h.beta2||0)*vs) : 1;
  // counterweight
  const mCw=h.mCw||0, mNet=mGross-mCw, Wnet=mNet*G;
  const overhauling = mNet<0;
  // reeving efficiency (derive or manual)
  const etaReev = h.deriveEta ? reevingEff(h.falls,h.etaS,h.nDiv) : (h.etaReevManual||0);
  const etaTot=etaReev*(h.etaMech||0);
  // steady power on NET load (counterweight assists), motoring divides / regen multiplies
  const Plift=Wnet*vs/1000;
  const Pmot = etaTot>0 ? (Plift>=0?Plift/etaTot:Plift*etaTot) : NaN;
  const PmotMag=Math.abs(Pmot);
  const w=omega(h.nMot||0);
  // static torque (net) at motor
  const Tstat=Tnm(Pmot,h.nMot);
  // acceleration: inertia of BOTH masses + motor
  const a=(h.ta>0)?vs/h.ta:NaN;
  const Jload=w>0?(mGross+mCw)*Math.pow(vs/w,2):NaN;
  const alpha=(h.ta>0)?w/h.ta:NaN;
  const Tacc=(etaTot>0)?((h.Jmot||0)+Jload/etaTot)*alpha:NaN;
  // peak hoisting torque: static (with φ2 on the lifted load) + accel
  const TstatDyn = Tnm(phi2*Wnet*vs/1000/(etaTot||1), h.nMot);
  const Tpeak=Math.abs(TstatDyn)+Math.abs(Tacc);
  const Ppeak=Tpeak*w/1000;
  // reeving / rope / drum
  const Slead=(h.falls>0&&etaReev>0)?W/(h.falls*etaReev):NaN;  // lead-line pull, N
  const vrope=(h.vh||0)*(h.falls||0);
  const Ddm=(h.Dd||0)/1000;
  const nDrum=Ddm>0?vrope/(Math.PI*Ddm):NaN;
  const i=nDrum>0?(h.nMot||0)/nDrum:NaN;
  // rope safety (EN 14492-2 / ISO 4308 coefficient Zp — editable)
  const MBLreq=(Slead/1000)*(h.Zp||0);                  // required min breaking load, kN
  const SFact=(h.ropeMBL>0&&Slead>0)?(h.ropeMBL*1000)/Slead:NaN; // actual factor on lead line
  const ropeOK=isFinite(SFact)&&SFact>=(h.Zp||0);
  const ddActual=(h.ropeDia>0)?(h.Dd||0)/h.ropeDia:NaN; // drum / rope diameter ratio
  const ddOK=isFinite(ddActual)&&ddActual>=(h.minDd||0);
  // brake — GROSS load, counterweight NOT credited (conservative), referred to motor shaft
  const Tload=w>0?W*vs/w:NaN;                            // gross static load torque, lossless
  const Tbrake=(h.brakeSF||0)*Tload;
  // drives + motor pick (per drive). Size on the GREATER of the continuous demand
  // and the peak-torque demand divided by the usable short-time overload — so the
  // frame is big enough that its overload covers the acceleration peak.
  const nDr=Math.max(1,h.nDrives||1);
  const peakFactor=h.vfd?(h.vfdOverload||1.5):1.6;
  const TperDrivePeak=Tpeak/nDr;
  const PperDrive=Math.max(PmotMag/nDr,(Ppeak/nDr)/peakFactor);
  const motorKW=pickMotor(PperDrive);
  const Trated=motorKW?Tnm(motorKW,h.nMot):NaN;
  const Tbreak=Trated*(h.breakdownK||0);                 // breakdown torque, N·m
  const breakOK=isFinite(Tbreak)&&TperDrivePeak<=Tbreak;
  // VFD achievable accel (torque-limited): budget = min(breakdown, overload×rated)
  const Tavail=Math.min(Tbreak||Infinity,(h.vfdOverload||0)*(Trated||0));
  const Taccbudget=Tavail-Math.abs(TstatDyn)/nDr;        // torque available for accel, per drive
  const aTq=(Taccbudget>0&&w>0&&Jload>0)?(Taccbudget*nDr*etaTot)/((h.Jmot||0)*nDr+Jload)*(vs/w):NaN; // m/s²
  // gearbox output requirement (for a supplier quote) — torque at the DRUM shaft,
  // taken directly from the rope tension so it's free of motor-efficiency bookkeeping.
  const Rdrum=Ddm/2;
  const gbT2cont=isFinite(Rdrum)?Slead*Rdrum:NaN;        // continuous output torque, N·m
  const ratioPk=Math.abs(Tstat)>0?Tpeak/Math.abs(Tstat):NaN;
  const gbT2peak=gbT2cont*ratioPk;                       // accel/peak output torque, N·m
  const gbT2Nreq=gbT2cont*(h.fs||1);                     // T2N to select against (× service factor)
  // regen on lowering (continuous) — lowering loaded returns power to the line/resistor
  const PregenLower=Wnet>0?Wnet*vs*etaTot/1000:NaN;      // kW, steady lowering regen (load assists)
  // duty cycle / energy (indicative)
  let cyc=null;
  if(h.cycEnable){
    const aR=h.vfd&&h.accelMode==="rate"?(h.accelRate||a):a;
    const tAcc=aR>0?vs/aR:0;
    const dAcc=0.5*vs*tAcc, dDec=dAcc;
    const tDec=tAcc;
    const tRun=Math.max(0,((h.moveDist||0)-dAcc-dDec)/(vs||1));
    cyc=cycleCalc({Tstatic:Math.abs(Tstat),Tpeak,Pstatic:PmotMag,Ppeak,nMot:h.nMot,
      tAcc,tRun,tDec,dwell:h.dwell||0,kCool:h.kCool,cph:h.cph,hpy:h.hpy,tariff:h.tariff,regenEff:h.regenEff});
  }
  const warns=[];
  if(!(h.vh>0))warns.push("Hoist speed must be greater than 0.");
  if(!(h.falls>0))warns.push("Number of rope falls must be at least 1.");
  if(!(h.Dd>0))warns.push("Drum diameter must be greater than 0.");
  if(!(h.nMot>0))warns.push("Motor speed must be greater than 0.");
  if(!(etaTot>0))warns.push("Efficiencies must resolve to a positive value (check reeving / sheave η).");
  if(overhauling)warns.push("Counterweight exceeds the loaded hook — the load is OVERHAULING: the motor brakes to raise and drives to lower; size the brake/regen accordingly.");
  if(h.ropeMBL>0&&!ropeOK)warns.push("Rope safety FAIL: chosen MBL gives factor "+fmt(SFact,2)+" < required Zp "+fmt(h.Zp,2)+".");
  if(h.ropeDia>0&&!ddOK)warns.push("Drum D/d FAIL: "+fmt(ddActual,1)+" < minimum "+fmt(h.minDd,1)+" — increase drum diameter or reduce rope size.");
  if(motorKW&&!breakOK)warns.push("Peak torque exceeds the selected motor's breakdown torque — pick a larger frame or extend the accel time.");
  return {mGross,phi2,mNet,overhauling,etaReev,etaTot,Plift,Pmot,PmotMag,Tstat,a,Jload,Tacc,Tpeak,Ppeak,
    Slead,vrope,nDrum,i,MBLreq,SFact,ropeOK,ddActual,ddOK,Tload,Tbrake,
    gbT2cont,gbT2peak,gbT2Nreq,
    nDr,PperDrive,TperDrivePeak,motorKW,Trated,Tbreak,breakOK,aTq,PregenLower,cyc,warns};
}

// ════════════════════════════════════════════════════════════════════════════
//  TRAVEL (long-travel or cross-travel)
// ════════════════════════════════════════════════════════════════════════════
function computeTravel(t){
  const m=t.m||0, W=m*G, vs=(t.v||0)/60, Dwm=(t.Dw||0)/1000;
  let Froll;
  if(t.rollMode==="spec"){ Froll=(t.wSpec||0)*W/1000; }
  else{ Froll=(t.Dw>0)?W*(t.cFlange||0)*((t.bearMu||0)*(t.dJourn||0)+2*(t.fRoll||0))/(t.Dw||1):NaN; }
  const Fgrad=W*((t.grad||0)/1000);
  const Fwind=t.outdoor?(t.windP||0)*(t.area||0):0;
  const Fres=Froll+Fgrad+Fwind;
  const Pstat=(t.etaMech>0)?Fres*vs/1000/t.etaMech:NaN;
  const nWheel=Dwm>0?(t.v||0)/(Math.PI*Dwm):NaN;
  const i=nWheel>0?(t.nMot||0)/nWheel:NaN;
  const w=omega(t.nMot||0);
  const Tstat=Tnm(Pstat,t.nMot);
  // acceleration — by time, or (VFD) by rate
  const aReq=t.vfd&&t.accelMode==="rate"?(t.accelRate||0):((t.ta>0)?vs/t.ta:NaN);
  const tAcc=aReq>0?vs/aReq:NaN;
  const Facc=m*aReq;
  const Fdrive=Fres+Facc;
  const Ppeak=(t.etaMech>0)?Fdrive*vs/1000/t.etaMech:NaN;
  const Jload=w>0?m*Math.pow(vs/w,2):NaN;
  const alpha=tAcc>0?w/tAcc:NaN;
  const Tacc=(t.etaMech>0)?((t.Jmot||0)+Jload/t.etaMech)*alpha:NaN;
  const Tpeak=Tstat+Tacc;
  // anti-skid (driving)
  const Ndriven=(t.nW>0)?W*((t.nD||0)/t.nW):NaN;
  const Fadh=(t.muAdh||0)*Ndriven;
  const uSkid=Fadh>0?Fdrive/Fadh:NaN;
  const aMaxSkid=(m>0)?(Fadh-Fres)/m:NaN;               // skid-limited accel
  // drives + motor pick. Travel is acceleration-governed: size on the GREATER of the
  // continuous demand and the peak-torque demand divided by the usable overload.
  const nDr=Math.max(1,t.nDrives||1);
  const peakFactor=t.vfd?(t.vfdOverload||1.5):1.6;
  const PperDriveStat=Math.max(Pstat/nDr,(isFinite(Ppeak)?Ppeak:Pstat)/nDr/peakFactor);
  const motorKW=pickMotor(PperDriveStat);
  const Trated=motorKW?Tnm(motorKW,t.nMot):NaN;
  const Tbreak=Trated*(t.breakdownK||0);
  const breakOK=isFinite(Tbreak)&&(Tpeak/nDr)<=Tbreak;
  // VFD torque-limited accel: available motor torque → tractive force at the wheels → accel
  const Tavail=Math.min(Tbreak||Infinity,(t.vfdOverload||0)*(Trated||0));
  const FtractAvail=(isFinite(Tavail)&&isFinite(i)&&Dwm>0)?(Tavail*nDr*i*t.etaMech)/(Dwm/2):NaN; // N at wheels
  const aTorque=(isFinite(FtractAvail)&&m>0)?(FtractAvail-Fres)/m:NaN;
  const aAchieve=Math.min(isFinite(aMaxSkid)?aMaxSkid:Infinity, isFinite(aTorque)?aTorque:Infinity);
  const accelLimitedBy = (aMaxSkid<=aTorque)?"wheel/rail slip":"motor / VFD torque";
  // braking / stopping
  const tb=t.tb||0;
  const ab=tb>0?vs/tb:NaN;
  const sStop=tb>0?vs*tb/2:NaN;
  const uSkidB=Fadh>0?(m*ab)/Fadh:NaN;
  // gearbox output requirement (for a supplier quote) — torque at the WHEEL shaft
  // from the tractive force, per driving gearbox.
  const Rwheel=Dwm/2;
  const gbT2cont=isFinite(Rwheel)?Fres*Rwheel/nDr:NaN;  // continuous output torque, N·m
  const gbT2peak=isFinite(Rwheel)?Fdrive*Rwheel/nDr:NaN;// accel/peak output torque, N·m
  const gbT2Nreq=gbT2cont*(t.fs||1);                    // T2N to select against (× service factor)
  const wheelLoad=t.nW>0?W/t.nW:NaN;                    // per-wheel vertical load (output radial), N
  // regen on decel (kinetic energy)
  const Ekin=0.5*m*vs*vs/1000;                          // kJ
  const Eresist=Fres*(sStop||0)/1000;                   // kJ removed by resistance
  const Eregen=Math.max(0,Ekin-Eresist);                // kJ to brake resistor / regen per stop
  const PregenPk=tb>0?2*Eregen/tb:NaN;                  // kW peak (triangular)
  // duty cycle / energy
  let cyc=null;
  if(t.cycEnable){
    const dAcc=0.5*vs*(tAcc||0), dDec=0.5*vs*tb;
    const tRun=Math.max(0,((t.moveDist||0)-dAcc-dDec)/(vs||1));
    cyc=cycleCalc({Tstatic:Math.abs(Tstat),Tpeak:Math.abs(Tpeak),Pstatic:Math.abs(Pstat),Ppeak:Math.abs(Ppeak),
      nMot:t.nMot,tAcc:tAcc||0,tRun,tDec:tb,dwell:t.dwell||0,kCool:t.kCool,cph:t.cph,hpy:t.hpy,tariff:t.tariff,regenEff:t.regenEff});
  }
  const warns=[];
  if(!(t.v>0))warns.push("Travel speed must be greater than 0.");
  if(!(t.Dw>0))warns.push("Wheel diameter must be greater than 0.");
  if(!(t.nMot>0))warns.push("Motor speed must be greater than 0.");
  if(!(t.nW>0)||!(t.nD>0))warns.push("Wheel counts must be greater than 0.");
  if(t.nD>t.nW)warns.push("Driven wheels cannot exceed total wheels.");
  if(t.etaMech<=0)warns.push("Mechanism efficiency must be greater than 0.");
  if(isFinite(uSkid)&&uSkid>1)warns.push("Drive anti-skid FAIL: tractive demand exceeds wheel/rail adhesion — add driven wheels, revise μ or extend the accel time.");
  if(isFinite(uSkidB)&&uSkidB>1)warns.push("Braking would exceed adhesion — wheels lock/skid on the stop; extend braking time or add braked-wheel capacity.");
  if(motorKW&&!breakOK)warns.push("Peak torque exceeds the selected motor's breakdown torque — pick a larger frame or extend the accel time.");
  return {m,W,vs,Froll,Fgrad,Fwind,Fres,Pstat,nWheel,i,Tstat,aReq,tAcc,Facc,Fdrive,Ppeak,Tacc,Tpeak,
    Ndriven,Fadh,uSkid,aMaxSkid,aTorque,aAchieve,accelLimitedBy,nDr,PperDriveStat,motorKW,Trated,Tbreak,breakOK,
    gbT2cont,gbT2peak,gbT2Nreq,wheelLoad,
    ab,sStop,uSkidB,Ekin,Eregen,PregenPk,cyc,warns};
}

// ── shared notes ──────────────────────────────────────────────────────────────
function ScopeNote(){
  return (
    <div className="rounded-lg border border-slate-300 bg-slate-50 p-4 text-sm text-slate-600 print-block">
      <span className="font-semibold text-slate-700">Demand, not selection.</span> The "next standard motor"
      is a starting point from the IEC kW ladder against the steady demand; the final pick is governed by
      thermal duty — type S1–S5 / %ED and permissible <b>starts per hour</b> to <b>FEM 9.683 / EN 14492-2</b>
      (the duty &amp; energy panel gives an <i>indicative</i> RMS/%ED, not a certified rating). Verify every
      coefficient flagged <Badge tone="def">default</Badge> against the project and the controlling standard.
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
//  APP
// ════════════════════════════════════════════════════════════════════════════
function App(){
  const [tab,setTab]=useState("hoist");
  const [customer,setCustomer]=useState("");
  const [quoteNo,setQuoteNo]=useState("");
  const [dateStr,setDateStr]=useState("");
  const [preparedBy,setPreparedBy]=useState("");

  const [h,setH]=useState({
    mLoad:5000,mTackle:200,vh:8,Dd:400,nMot:1450,ta:1.0,Jmot:0.05,etaMech:DEF.etaMech,
    falls:4,etaS:DEF.etaS,nDiv:0,deriveEta:true,etaReevManual:0.95,
    hcEnable:true,phi2min:DEF.phi2min,beta2:DEF.beta2,
    mCw:0, brakeSF:DEF.brakeSFhoist,
    Zp:DEF.Zp,ropeDia:13,ropeMBL:130,minDd:DEF.minDd,
    nDrives:1,breakdownK:DEF.breakdownK,fs:DEF.fs,
    vfd:true,accelMode:"time",accelRate:0.4,vfdOverload:DEF.vfdOverload,regenEff:DEF.regenEff,
    cycEnable:false,moveDist:6,dwell:20,kCool:DEF.kCool,cph:10,hpy:2000,tariff:0.30,
    ED:40,starts:150});
  const setH1=(k,v)=>setH({...h,[k]:(typeof v==="boolean"||typeof v==="string")?v:(v===""?"":Number(v))});

  const ltDefaults={
    m:15000,v:40,nW:4,nD:2,Dw:250,rollMode:"calc",dJourn:60,bearMu:DEF.bearMu,fRoll:DEF.fRoll,cFlange:DEF.cFlange,wSpec:13,
    grad:0,outdoor:false,windP:DEF.windP,area:6,nMot:1450,etaMech:DEF.etaMech,muAdh:DEF.muAdh,Jmot:0.02,ta:5,tb:4,
    nDrives:2,breakdownK:DEF.breakdownK,fs:DEF.fs,vfd:true,accelMode:"time",accelRate:0.4,vfdOverload:DEF.vfdOverload,regenEff:DEF.regenEff,
    cycEnable:false,moveDist:20,dwell:15,kCool:DEF.kCool,cph:20,hpy:2000,tariff:0.30};
  const ctDefaults={...ltDefaults,m:5200,v:20,Dw:160,dJourn:40,area:2,Jmot:0.01,ta:2,tb:1.5,nDrives:2,moveDist:8,dwell:10};
  const [lt,setLt]=useState(ltDefaults);
  const [ct,setCt]=useState(ctDefaults);
  const mkSet=(setter,obj)=>(k,v)=>setter({...obj,[k]:(typeof v==="boolean"||typeof v==="string")?v:(v===""?"":Number(v))});

  const rH=useMemo(()=>computeHoist(h),[h]);
  const rLT=useMemo(()=>computeTravel(lt),[lt]);
  const rCT=useMemo(()=>computeTravel(ct),[ct]);
  const TABS=[["hoist","Hoist"],["lt","Long travel"],["ct","Cross travel"]];

  return (
    <div className="min-h-screen bg-slate-100 text-slate-800" style={{fontFamily:"system-ui,Segoe UI,Roboto,sans-serif"}}>
      <div style={{background:STEEL}} className="text-white">
        <div className="max-w-6xl mx-auto px-5 py-5">
          <h1 className="text-xl font-bold">Crane Drive Sizer</h1>
          <p className="text-slate-300 text-sm mt-1">
            Motor, gearbox &amp; brake for the <span className="font-semibold text-amber-300">hoist</span>,
            <span className="font-semibold text-amber-300"> long-travel</span> and
            <span className="font-semibold text-amber-300"> cross-travel</span> mechanisms — reeving &amp; rope,
            anti-skid, VFD acceleration, standard-motor pick and an indicative duty/energy estimate.
          </p>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-5 pt-5">
        <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4 flex flex-wrap items-end gap-3">
          <label className="text-xs text-slate-600 flex-1 min-w-[140px]">Customer
            <input value={customer} onChange={e=>setCustomer(e.target.value)} className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <label className="text-xs text-slate-600 w-32">Quotation No.
            <input value={quoteNo} onChange={e=>setQuoteNo(e.target.value)} className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <label className="text-xs text-slate-600 w-32">Date
            <input value={dateStr} onChange={e=>setDateStr(e.target.value)} placeholder="dd/mm/yyyy" className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <label className="text-xs text-slate-600 w-32">Prepared by
            <input value={preparedBy} onChange={e=>setPreparedBy(e.target.value)} className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <button onClick={()=>window.print()} className="no-print text-sm bg-slate-700 text-white px-3 py-1.5 rounded hover:bg-slate-800">Print / PDF</button>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-5 pt-5 no-print">
        <div className="flex gap-1">
          {TABS.map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={"px-4 py-2 text-sm font-medium rounded-t-lg border border-b-0 "+
                (tab===id?"bg-white text-slate-800 border-slate-200":"bg-slate-200 text-slate-500 border-transparent hover:bg-slate-300")}>{label}</button>
          ))}
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-5 pb-6">
        {tab==="hoist" && <HoistTab h={h} set={setH1} r={rH}/>}
        {tab==="lt"    && <TravelTab t={lt} set={mkSet(setLt,lt)} r={rLT} title="Long-travel (bridge / gantry on the runway)" massHint="whole crane + trolley + rated load"/>}
        {tab==="ct"    && <TravelTab t={ct} set={mkSet(setCt,ct)} r={rCT} title="Cross-travel (trolley / crab on the bridge)" massHint="trolley/crab + rated load"/>}
      </div>

      <div className="max-w-6xl mx-auto px-5 pb-10">
        <details className="bg-white rounded-lg shadow-sm border border-slate-200 p-5">
          <summary className="font-bold text-slate-800 cursor-pointer">Formulae &amp; standard basis</summary>
          <div className="grid md:grid-cols-2 gap-6 mt-4 text-sm text-slate-600">
            <div>
              <h3 className="font-semibold text-slate-700 mb-1">Exact mechanics (badged amber)</h3>
              <ul className="list-disc pl-4 space-y-1 text-xs">
                <li>P = F·v/η ; P = m·g·v/η &nbsp;|&nbsp; T = 9549.3·P[kW]/n = P/ω</li>
                <li>i = n<sub>motor</sub>/n<sub>out</sub>, n<sub>out</sub> = v/(π·D)</li>
                <li>Reflected inertia J<sub>eq</sub> = m·(v/ω)²; T<sub>a</sub> = (J<sub>mot</sub>+J<sub>eq</sub>/η)·α</li>
                <li>Reeving η = (1−η<sub>s</sub><sup>n</sup>)/(n(1−η<sub>s</sub>)); lead-line S = m·g/(n·η)</li>
                <li>φ₂ = φ₂,min + β₂·v<sub>h</sub> &nbsp;(EN 13001-2 form)</li>
                <li>Anti-skid F<sub>adh</sub> = μ·N<sub>driven</sub>; demand F<sub>resist</sub>+m·a</li>
                <li>Rope safety = MBL/S ≥ Z<sub>p</sub>; drum D/d ≥ minimum</li>
              </ul>
              <h3 className="font-semibold text-slate-700 mb-1 mt-4">Coefficient defaults <Badge tone="def">editable — confirm</Badge></h3>
              <ul className="list-disc pl-4 space-y-0.5 text-xs">
                <li>Adhesion μ={DEF.muAdh}; flange c={DEF.cFlange}; bearing μ={DEF.bearMu}; rolling f={DEF.fRoll} mm</li>
                <li>In-service wind p={DEF.windP} N/m²; hoist brake factor {DEF.brakeSFhoist}×</li>
                <li>Sheave η<sub>s</sub>={DEF.etaS}; φ₂,min={DEF.phi2min}, β₂={DEF.beta2}</li>
                <li>Rope Z<sub>p</sub>={DEF.Zp}; drum D/d min={DEF.minDd}; breakdown {DEF.breakdownK}×; VFD overload {DEF.vfdOverload}×</li>
              </ul>
            </div>
            <div>
              <h3 className="font-semibold text-slate-700 mb-1">Why coefficients are inputs, not constants</h3>
              <p className="text-xs">Published values for the rope coefficient Z<sub>p</sub>, the φ₂ coefficients and the
                drum/sheave D/d minima <b>differ between standards and editions</b> (e.g. ISO 4308-1 vs EN 14492-2 vs
                FEM, and 1986 vs current ISO 4301-1 duty bands). Rather than assert one set as authoritative, this tool
                gives the <b>formula</b> and exposes the coefficient so you enter your house / project figure from the
                controlling document.</p>
              <h3 className="font-semibold text-slate-700 mb-1 mt-4">Standards context</h3>
              <ul className="list-disc pl-4 space-y-0.5 text-xs">
                <li><b>EN 14492-1/-2</b> — power-driven winches &amp; hoists: rope, drum/sheave ratios, brake, drive.</li>
                <li><b>ISO 4308-1</b> — wire-rope selection, coefficient of utilisation Z<sub>p</sub>.</li>
                <li><b>EN 13001-2</b> — loads incl. hoisting dynamic factor φ₂ and wind.</li>
                <li><b>EN 13135</b> — equipment / brake requirements.</li>
                <li><b>FEM 9.683 / FEM 9.511 · ISO 4301-1</b> — drive selection (%ED, starts/h) &amp; duty group (use the Hoist Duty Calculator).</li>
              </ul>
            </div>
          </div>
          <p className="text-xs text-slate-400 mt-4 border-t border-slate-100 pt-3">
            Kinematic/dynamic relations are exact mechanics. Tabulated coefficients are typical values exposed as
            inputs; the duty/energy figures are indicative. Verify against the controlling standard before order.
          </p>
        </details>
        <p className="text-center text-xs text-slate-400 mt-4">Levate Solutions Ltd · for crane engineering use · check against the controlling standard before order.</p>
      </div>
    </div>
  );
}

            <Field label="Mechanism efficiency" hint="η gearbox+drum"><Num value={h.etaMech} min="0" max="1" step="0.01" onChange={e=>set("etaMech",e.target.value)}/></Field>
            <Field label="Motor+brake inertia" hint="kg·m²"><Num value={h.Jmot} min="0" step="0.01" onChange={e=>set("Jmot",e.target.value)}/></Field>
          </div>

        <Group title="Reeving & rope" open={true}>

          <div className="flex gap-2 mb-2">

          )}
          <div className="text-xs text-slate-500 mb-2">Reeving η = <span className="font-mono">{fmt(r.etaReev,3)}</span></div>
          <div className="grid grid-cols-2 gap-x-4">

            <Field label="Chosen rope MBL" hint="kN"><Num value={h.ropeMBL} min="0" step="1" onChange={e=>set("ropeMBL",e.target.value)}/></Field>
          </div>
        </Group>

        <Group title="Dynamic factor & brake" open={false}>
          <label className="flex items-center gap-2 mb-2 text-sm text-slate-700">
            <input type="checkbox" checked={h.hcEnable} onChange={e=>set("hcEnable",e.target.checked)}/>

          {h.hcEnable&&(
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="φ₂,min" hint="default — confirm"><Num value={h.phi2min} min="1" step="0.01" onChange={e=>set("phi2min",e.target.value)}/></Field>
              <Field label="β₂" hint="× v_h [m/s], default — confirm"><Num value={h.beta2} min="0" step="0.01" onChange={e=>set("beta2",e.target.value)}/></Field>

          <div className="flex gap-2 mb-2">
            <Toggle on={h.accelMode==="time"} onClick={()=>set("accelMode","time")}>By accel time</Toggle>
            <Toggle on={h.accelMode==="rate"} onClick={()=>set("accelMode","rate")}>By max accel</Toggle>
          </div>
          <div className="grid grid-cols-2 gap-x-4">
            {h.accelMode==="time"

            </div>

      </div>

      {/* RESULTS */}
      <div className="space-y-5">
        {r.warns.length>0 && (
          <div className="rounded-lg border border-amber-300 bg-amber-50 p-3 text-sm text-amber-800">

        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:ACCENT,background:"#fffbeb"}}>

        </div>

        {h.cycEnable&&r.cyc&&(
          <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
            <h2 className="font-bold text-slate-800 mb-2">Duty &amp; energy <Badge tone="def">indicative</Badge></h2>
            <dl className="grid grid-cols-2 gap-y-2 text-sm">
              <Row k="RMS motor torque" unit="N·m" v={fmt(r.cyc.Trms,1)}/>
              <Row k="RMS continuous power" unit="kW" v={fmt(r.cyc.Prms,2)} strong/>
              <Row k="Duty %ED" unit="%" v={fmt(r.cyc.ed,0)}/>
              <Row k="Implied starts / hour" unit="" v={fmt0(r.cyc.startsHr)}/>
              <Row k="Energy / cycle" unit="kWh" v={fmt(r.cyc.EgridCycle/3600,3)}/>
              <Row k="Energy / year" unit="kWh" v={fmt0(r.cyc.kWhYr)}/>
              <Row k="Running cost / year" unit="£" v={fmt0(r.cyc.costYr)} strong/>
            </dl>
            <p className="text-xs text-slate-400 mt-2">Trapezoidal-move estimate; verify thermal rating to FEM 9.683 / EN 14492-2.</p>
          </div>
        )}
        <ScopeNote/>
      </div>
    </div>
  );
}

// ── TRAVEL tab ────────────────────────────────────────────────────────────────
function TravelTab({t,set,r,title,massHint}){
  const skidOK=isFinite(r.uSkid)&&r.uSkid<=1;
  const skidBOK=isFinite(r.uSkidB)&&r.uSkidB<=1;
  return (
    <div className="bg-white rounded-b-lg rounded-tr-lg shadow-sm border border-slate-200 p-5 grid md:grid-cols-2 gap-6">
      <div>
        <Group title={title} open={true}>
          <p className="text-xs text-slate-400 mb-2">Mass = {massHint}.</p>
          <div className="grid grid-cols-2 gap-x-4">
            <Field label="Total moving mass" hint="kg"><Num value={t.m} min="0" step="100" onChange={e=>set("m",e.target.value)}/></Field>
            <Field label="Travel speed" hint="m/min"><Num value={t.v} min="0" step="1" onChange={e=>set("v",e.target.value)}/></Field>
            <Field label="Total wheels"><Num value={t.nW} min="1" step="1" onChange={e=>set("nW",e.target.value)}/></Field>
            <Field label="Driven wheels"><Num value={t.nD} min="1" step="1" onChange={e=>set("nD",e.target.value)}/></Field>
            <Field label="Wheel diameter" hint="mm"><Num value={t.Dw} min="0" step="10" onChange={e=>set("Dw",e.target.value)}/></Field>
            <Field label="Motor base speed" hint="rpm"><Num value={t.nMot} min="0" step="10" onChange={e=>set("nMot",e.target.value)}/></Field>
            <Field label="Mechanism efficiency" hint="η"><Num value={t.etaMech} min="0" max="1" step="0.01" onChange={e=>set("etaMech",e.target.value)}/></Field>
            <Field label="Adhesion μ" hint="wheel/rail — confirm"><Num value={t.muAdh} min="0" max="1" step="0.01" onChange={e=>set("muAdh",e.target.value)}/></Field>
            <Field label="Gradient" hint="‰"><Num value={t.grad} min="0" step="0.5" onChange={e=>set("grad",e.target.value)}/></Field>
            <Field label="Motor inertia" hint="kg·m²"><Num value={t.Jmot} min="0" step="0.01" onChange={e=>set("Jmot",e.target.value)}/></Field>
          </div>
        </Group>

        <Group title="Running resistance" open={false}>
          <div className="flex gap-2 mb-3">
            <Toggle on={t.rollMode==="calc"} onClick={()=>set("rollMode","calc")}>Bearing &amp; rolling</Toggle>
            <Toggle on={t.rollMode==="spec"} onClick={()=>set("rollMode","spec")}>Specific resistance</Toggle>
          </div>
          {t.rollMode==="calc"?(
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Journal diameter" hint="mm"><Num value={t.dJourn} min="0" step="5" onChange={e=>set("dJourn",e.target.value)}/></Field>
              <Field label="Bearing μ" hint="default — confirm"><Num value={t.bearMu} min="0" step="0.001" onChange={e=>set("bearMu",e.target.value)}/></Field>
              <Field label="Rolling lever f" hint="mm — confirm"><Num value={t.fRoll} min="0" step="0.1" onChange={e=>set("fRoll",e.target.value)}/></Field>
              <Field label="Flange factor c" hint="— confirm"><Num value={t.cFlange} min="1" step="0.1" onChange={e=>set("cFlange",e.target.value)}/></Field>
            </div>
          ):(
            <Field label="Specific resistance w" hint="N per kN (≈10–20 steel wheel)"><Num value={t.wSpec} min="0" step="1" onChange={e=>set("wSpec",e.target.value)}/></Field>
          )}
          <label className="flex items-center gap-2 mt-2 text-sm text-slate-700">
            <input type="checkbox" checked={t.outdoor} onChange={e=>set("outdoor",e.target.checked)}/> Outdoor — include in-service wind
          </label>
          {t.outdoor&&(
            <div className="grid grid-cols-2 gap-x-4 mt-2">
              <Field label="Wind pressure" hint="N/m² — confirm"><Num value={t.windP} min="0" step="10" onChange={e=>set("windP",e.target.value)}/></Field>
              <Field label="Projected area" hint="m²"><Num value={t.area} min="0" step="0.5" onChange={e=>set("area",e.target.value)}/></Field>
            </div>
          )}
        </Group>

        <Group title="Acceleration / VFD & braking" open={false}>
          <label className="flex items-center gap-2 mb-2 text-sm text-slate-700">
            <input type="checkbox" checked={t.vfd} onChange={e=>set("vfd",e.target.checked)}/> VFD drive
          </label>
          <div className="flex gap-2 mb-2">
            <Toggle on={t.accelMode==="time"} onClick={()=>set("accelMode","time")}>By accel time</Toggle>
            <Toggle on={t.accelMode==="rate"} onClick={()=>set("accelMode","rate")}>By max accel</Toggle>
          </div>
          <div className="grid grid-cols-2 gap-x-4">
            {t.accelMode==="time"
              ?<Field label="Acceleration time" hint="s"><Num value={t.ta} min="0.1" step="0.1" onChange={e=>set("ta",e.target.value)}/></Field>
              :<Field label="Max acceleration" hint="m/s²"><Num value={t.accelRate} min="0.01" step="0.05" onChange={e=>set("accelRate",e.target.value)}/></Field>}
            <Field label="Braking time" hint="s to stop"><Num value={t.tb} min="0.1" step="0.1" onChange={e=>set("tb",e.target.value)}/></Field>
            {t.vfd&&<Field label="VFD overload" hint="× rated"><Num value={t.vfdOverload} min="1" step="0.1" onChange={e=>set("vfdOverload",e.target.value)}/></Field>}
            {t.vfd&&<Field label="Regen recovery η" hint="0 = resistor"><Num value={t.regenEff} min="0" max="1" step="0.05" onChange={e=>set("regenEff",e.target.value)}/></Field>}
          </div>
        </Group>

        <Group title="Drives, gearbox & motor selection" open={false}>
          <div className="grid grid-cols-2 gap-x-4">
            <Field label="Drives (motors)" hint="parallel units"><Num value={t.nDrives} min="1" step="1" onChange={e=>set("nDrives",e.target.value)}/></Field>
            <Field label="Breakdown torque" hint="× rated"><Num value={t.breakdownK} min="1" step="0.1" onChange={e=>set("breakdownK",e.target.value)}/></Field>
            <Field label="Gearbox service factor f_s" hint="SEW f_B / application — confirm"><Num value={t.fs} min="1" step="0.05" onChange={e=>set("fs",e.target.value)}/></Field>
          </div>
        </Group>

        <Group title="Duty cycle & energy (indicative)" open={false}>
          <label className="flex items-center gap-2 mb-2 text-sm text-slate-700">
            <input type="checkbox" checked={t.cycEnable} onChange={e=>set("cycEnable",e.target.checked)}/> Estimate RMS / %ED / energy
          </label>
          {t.cycEnable&&(
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Move distance" hint="m per cycle"><Num value={t.moveDist} min="0" step="1" onChange={e=>set("moveDist",e.target.value)}/></Field>
              <Field label="Dwell / cycle" hint="s standstill"><Num value={t.dwell} min="0" step="1" onChange={e=>set("dwell",e.target.value)}/></Field>
              <Field label="Standstill cooling k" hint="≈0.33"><Num value={t.kCool} min="0" max="1" step="0.05" onChange={e=>set("kCool",e.target.value)}/></Field>
              <Field label="Cycles / hour"><Num value={t.cph} min="0" step="1" onChange={e=>set("cph",e.target.value)}/></Field>
              <Field label="Operating h / year"><Num value={t.hpy} min="0" step="100" onChange={e=>set("hpy",e.target.value)}/></Field>
              <Field label="Tariff" hint="£/kWh"><Num value={t.tariff} min="0" step="0.01" onChange={e=>set("tariff",e.target.value)}/></Field>
            </div>
          )}
        </Group>
      </div>

      {/* RESULTS */}
      <div className="space-y-5">
        {r.warns.length>0 && (
          <div className="rounded-lg border border-amber-300 bg-amber-50 p-3 text-sm text-amber-800">
            <div className="font-semibold mb-1">Check inputs</div>
            <ul className="list-disc pl-5 space-y-0.5">{r.warns.map((w,i)=><li key={i}>{w}</li>)}</ul>
          </div>
        )}
        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:skidOK?"#16a34a":"#dc2626",background:skidOK?"#f0fdf4":"#fef2f2"}}>
          <div className="flex items-center justify-between mb-2">
            <h2 className="font-bold text-slate-800">Anti-skid (drive)</h2>
            <Pill ok={skidOK}>{skidOK?"NO SLIP":"SLIP — FAIL"}</Pill>
          </div>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Tractive demand (resist+accel)" unit="kN" v={fmt(r.Fdrive/1000,2)}/>
            <Row k="Adhesion limit μ·N_driven" unit="kN" v={fmt(r.Fadh/1000,2)} badge={{t:"F=μ·N",tone:""}}/>
            <Row k="Utilisation" unit="" v={fmt(r.uSkid*100,0)+" %"} strong/>
            <Row k="Skid-limited accel" unit="m/s²" v={fmt(r.aMaxSkid,2)}/>
            {t.vfd&&<Row k="Torque-limited accel" unit="m/s²" v={fmt(r.aTorque,2)}/>}
            {t.vfd&&<Row k="Achievable accel" unit="m/s²" v={fmt(r.aAchieve,2)} strong badge={{t:"limit: "+r.accelLimitedBy,tone:""}}/>}
          </dl>
          <p className="text-xs text-slate-500 mt-2">{fmt0(t.nD)} of {fmt0(t.nW)} wheels driven (even distribution). Braking uses {fmt(r.uSkidB*100,0)}% of adhesion {skidBOK?"":"— wheels would lock."}</p>
        </div>

        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:ACCENT,background:"#fffbeb"}}>
          <div className="flex items-center justify-between mb-2">
            <h2 className="font-bold text-slate-800">Required motor &amp; drive</h2>
            <Badge>P = F·v / η</Badge>
          </div>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Steady drive power" unit="kW" v={fmt(r.Pstat,2)} strong/>
            <Row k="Motor torque (steady)" unit="N·m" v={fmt(r.Tstat,1)}/>
            <Row k="Motor torque (steady+accel)" unit="N·m" v={fmt(r.Tpeak,1)} strong badge={{t:"peak",tone:""}}/>
            <Row k="Wheel speed" unit="rpm" v={fmt(r.nWheel,1)}/>
            <Row k="Gearbox ratio i" unit=": 1" v={fmt(r.i,2)} strong/>
            <Row k={"Std motor ("+fmt0(r.nDr)+"×, per drive)"} unit="kW" v={r.motorKW?fmt(r.motorKW,1):"—"} strong badge={{t:"IEC pick",tone:"def"}}/>
            <Row k="Breakdown torque margin" unit="" v={r.motorKW?(r.breakOK?"OK":"LOW"):"—"}/>
          </dl>
        </div>

        <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
          <h2 className="font-bold text-slate-800 mb-3">Forces, braking &amp; regen</h2>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Rolling resistance" unit="kN" v={fmt(r.Froll/1000,2)}/>
            {t.grad>0&&<Row k="Gradient resistance" unit="kN" v={fmt(r.Fgrad/1000,2)}/>}
            {t.outdoor&&<Row k="Wind resistance" unit="kN" v={fmt(r.Fwind/1000,2)}/>}
            <Row k="Total steady resistance" unit="kN" v={fmt(r.Fres/1000,2)} strong/>
            <Row k="Acceleration" unit="m/s²" v={fmt(r.aReq,3)}/>
            <Row k="Required deceleration" unit="m/s²" v={fmt(r.ab,3)}/>
            <Row k="Stopping distance" unit="m" v={fmt(r.sStop,2)} strong/>
            {t.vfd&&<Row k="Regen energy / stop" unit="kJ" v={fmt(r.Eregen,1)} badge={{t:"→ resistor",tone:""}}/>}
            {t.vfd&&<Row k="Peak regen power" unit="kW" v={fmt(r.PregenPk,1)}/>}
          </dl>
        </div>

        <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:"#0369a1",background:"#f0f9ff"}}>
          <div className="flex items-center justify-between mb-2">
            <h2 className="font-bold text-slate-800">Geared-motor spec</h2>
            <Badge tone="def">SEW / Nord / Demag</Badge>
          </div>
          <dl className="grid grid-cols-2 gap-y-2 text-sm">
            <Row k="Motor power (per drive)" unit="kW" v={r.motorKW?fmt(r.motorKW,1):"—"} strong/>
            <Row k="Output speed n₂" unit="rpm" v={fmt(r.nWheel,1)}/>
            <Row k="Gear ratio i" unit=": 1" v={fmt(r.i,2)}/>
            <Row k="Output torque (continuous)" unit="N·m" v={fmt(r.gbT2cont,0)}/>
            <Row k={"Select gearbox T₂N ≥ (× f_s "+fmt(t.fs,2)+")"} unit="N·m" v={fmt(r.gbT2Nreq,0)} strong/>
            <Row k="Output torque (accel/peak) T₂B" unit="N·m" v={fmt(r.gbT2peak,0)}/>
            <Row k="Output radial load (wheel)" unit="kN" v={fmt(r.wheelLoad/1000,2)}/>
          </dl>
          <p className="text-xs text-slate-500 mt-2">Hand these to the supplier with the duty (%ED &amp; starts/hour from the duty panel). Travel output torque is the tractive force × wheel radius, per driving gearbox.</p>
        </div>

        {t.cycEnable&&r.cyc&&(
          <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
            <h2 className="font-bold text-slate-800 mb-2">Duty &amp; energy <Badge tone="def">indicative</Badge></h2>
            <dl className="grid grid-cols-2 gap-y-2 text-sm">
              <Row k="RMS motor torque" unit="N·m" v={fmt(r.cyc.Trms,1)}/>
              <Row k="RMS continuous power" unit="kW" v={fmt(r.cyc.Prms,2)} strong/>
              <Row k="Duty %ED" unit="%" v={fmt(r.cyc.ed,0)}/>
              <Row k="Implied starts / hour" unit="" v={fmt0(r.cyc.startsHr)}/>
              <Row k="Energy / cycle" unit="kWh" v={fmt(r.cyc.EgridCycle/3600,3)}/>
              <Row k="Energy / year" unit="kWh" v={fmt0(r.cyc.kWhYr)}/>
              <Row k="Running cost / year" unit="£" v={fmt0(r.cyc.costYr)} strong/>
            </dl>
            <p className="text-xs text-slate-400 mt-2">Trapezoidal-move estimate; verify thermal rating to FEM 9.683.</p>
          </div>
        )}
        <ScopeNote/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
