const T1LRY=[85,90,95,100,105,110,115,120,130,140,150,160,170,180,190,200,210,220,230,240,250,260,270,280,290,300];
const T1DT=[10,15,20,25,30,35,40,50];

function pbcLookup(lry,dt){
  const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
  const off = lry>300 || lry<85 || dt>50 || dt<10;
  const L=clamp(lry,85,300), D=clamp(dt,10,50);
  const brk=(arr,x)=>{let i=0;while(i<arr.length-1&&arr[i+1]<x)i++;const lo=i,hi=Math.min(i+1,arr.length-1);const t=arr[hi]===arr[lo]?0:(x-arr[lo])/(arr[hi]-arr[lo]);return[lo,hi,t];};
  const [r0,r1,tr]=brk(T1LRY,L), [c0,c1,tc]=brk(T1DT,D);
  const a=T1V[r0][c0]+(T1V[r0][c1]-T1V[r0][c0])*tc;
  const b=T1V[r1][c0]+(T1V[r1][c1]-T1V[r1][c0])*tc;
  return {v:a+(b-a)*tr, off};
}

/* ── Core calculation, faithful to each FM1 sheet ── */
function calc(cfg,s){
  const total   = (+s.swl) + (+s.added);
  const duty     = total * cfg.duty;
  const totalKg = total + duty;
  const Wact    = totalKg/1000;          // actual total incl. duty %
  const Wdes    = (+s.designKg)/1000;    // rounded design load (sizing)
  const Lcm     = (+s.spanMm)/10;
  const sCm     = ((+s.spanMm)/(+s.deflDiv))/10;
  const sec     = UB.find(u=>u.n===s.section) || UB[0];
  const Tcm=sec.flange/10, DT=sec.depth/sec.flange, lry=Lcm/sec.ry;
  const pbc=pbcLookup(lry,DT);
  const pbcAllow=(s.pbcOverride!==''&&s.pbcOverride!=null)?Number(s.pbcOverride):pbc.v;
  const Wpbc=cfg.pbcLoad==='design'?Wdes:Wact;
  const Wfl =cfg.flangeLoad==='design'?Wdes:Wact;

  let reqIxx,calPbc,defl,calPbcCorrect=null,extra={};
  if(cfg.model==='central'){
    reqIxx = Wdes*Lcm**3/(48*E_STEEL*sCm);
    calPbc = Wpbc*Lcm/(4*sec.Zx);
    defl   = Wact*Lcm**3/(48*E_STEEL*sec.Ix);
  } else if(cfg.model==='cantilever'){
    reqIxx = Wdes*Lcm**3/(3*E_STEEL*sCm);
    calPbc = Wpbc*Lcm/(4*sec.Zx);            // faithful (house factor)
    calPbcCorrect = Wpbc*Lcm/sec.Zx;          // true cantilever moment W.L
    defl   = Wact*Lcm**3/(3*E_STEEL*sec.Ix);
  } else { // gantry — two crab wheels
    const aCm=(+s.aMm)/10, k=3*Lcm-4*aCm;
    reqIxx = (Wdes/2)*aCm**2*k/(6*E_STEEL*sCm);
    calPbc = 0.1*Wpbc*Lcm/(4*sec.Zx);
    defl   = (Wact/2)*aCm**2*k/(6*E_STEEL*sec.Ix);
    extra={wheel:Wact/2, aCm, k};
  }
  const flange=1.4*(+s.C)*Wfl/((+s.K2)*Tcm**2);

  return {total,duty,totalKg,Wact,Wdes,Lcm,sCm,reqIxx,sec,Tcm,DT,lry,
    pbcAuto:pbc.v,pbcOff:pbc.off,pbcAllow,calPbc,calPbcCorrect,flange,defl,extra,
    okSection:sec.Ix>=reqIxx, okStress:calPbc<=pbcAllow,
    okStressCorrect: calPbcCorrect==null || calPbcCorrect<=pbcAllow,
    okFlange:flange<=FLANGE_ALLOW, okDefl:defl<=sCm};
}

// Built-in regression test — re-runs each sheet's worked example and checks the
// live formulas against the original spreadsheet's stored cell values.
const EXPECT={
  crane:[72321.42857142857,0.4102653631284916,0.46544238813537836,1.7240523553987883],
  runway:[2480.15873015873,0.7992651835011368,1.1983695652173914,0.6091332959081837],
  simple:[698.5109126984128,1.276605504587156,2.245777937477542,0.4213888524596989],
  cantilever:[190.47619047619048,0.05161168607158258,0.4802332561529885,0.03225469587948365],
  gantry:[202.4652777777778,0.018064516129032256,0.5020804133746609,0.02332213422926166],
};
function selfTest(){
  return SHEETS.map(cfg=>{
    const r=calc(cfg,{...cfg.d,pbcOverride:""});
    const got=[r.reqIxx,r.calPbc,r.flange,r.defl], exp=EXPECT[cfg.id];
    const ok=got.every((g,i)=>Math.abs(g-exp[i])<=Math.max(1e-6,Math.abs(exp[i])*1e-9));
    return {id:cfg.id,label:cfg.title,ok};
  });
}

function Field({label,unit,note,children}){

    <span className="w-48 shrink-0 text-sm text-slate-600">{label}</span>{children}
    {unit&&<span className="w-10 text-sm text-slate-400">{unit}</span>}

}

          <Out label="Required Ixx" formula={cfg.ixxF} value={fmt(r.reqIxx,0)} unit="cm⁴"/>
          <Out label="Section Ixx" value={fmt(r.sec.Ix,0)} unit="cm⁴" strong/>
          <Out label="Section Zxx" value={fmt(r.sec.Zx,0)} unit="cm³"/>
          <Out label="D/T" value={fmt(r.DT)} unit=""/>
          <Out label="l/ry" value={fmt(r.lry,1)} unit=""/>
          <div className="h-2"></div>
          <Out label="Bending Pbc" formula={cfg.pbcF} value={fmt(r.calPbc,3)} unit="t/cm²"/>
          {r.calPbcCorrect!=null && <Out label="Bending (corrected)" formula="W.L / Zxx" value={fmt(r.calPbcCorrect,3)} unit="t/cm²"/>}
          <Out label="Allowable Pbc" value={fmt(r.pbcAllow,3)} unit="t/cm²"/>
          <Out label="Flange load" formula="1.4.C.W / K2.T²" value={fmt(r.flange,3)} unit="t/cm²"/>
          <Out label="Deflection" formula={cfg.deflF} value={fmt(r.defl,3)} unit="cm"/>
          <Out label="Preferred (s)" value={fmt(r.sCm,3)} unit="cm"/>
        </div>
        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 space-y-2">
          <h2 className="font-semibold text-slate-900 mb-1">Checks</h2>
          <Verdict ok={r.okSection}>Section Ixx ≥ required ({fmt(r.sec.Ix,0)} ≥ {fmt(r.reqIxx,0)} cm⁴)</Verdict>
          <Verdict ok={r.okStress}>Bending ≤ allowable Pbc ({fmt(r.calPbc,3)} ≤ {fmt(r.pbcAllow,3)} t/cm²)</Verdict>
          {r.calPbcCorrect!=null && <Verdict ok={r.okStressCorrect}>Corrected bending ≤ allowable ({fmt(r.calPbcCorrect,3)} ≤ {fmt(r.pbcAllow,3)} t/cm²)</Verdict>}
          <Verdict ok={r.okFlange}>Flange load ≤ {FLANGE_ALLOW} t/cm² ({fmt(r.flange,3)})</Verdict>
          <Verdict ok={r.okDefl}>Deflection ≤ preferred ({fmt(r.defl,3)} ≤ {fmt(r.sCm,3)} cm)</Verdict>
        </div>
        {cfg.notes && <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-900">
          <ul className="list-disc pl-4 space-y-1">{cfg.notes.map((n,i)=><li key={i}>{n}</li>)}</ul></div>}
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("crane");
  const [stateMap,setStateMap]=useState(()=>Object.fromEntries(SHEETS.map(sh=>[sh.id,{...sh.d,pbcOverride:""}])));
  const cfg=SHEETS.find(sh=>sh.id===tab);
  const s=stateMap[tab];
  const setS=(updater)=>setStateMap(m=>({...m,[tab]:updater(m[tab])}));
  const tests=useMemo(()=>selfTest(),[]);
  const allPass=tests.every(t=>t.ok);

  return (
    <div className="min-h-screen text-slate-800">
      <div className="bg-slate-800 text-white">
        <div className="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between flex-wrap gap-2">
          <div><h1 className="text-lg font-semibold">FM1 Design Workbook</h1>
            <p className="text-slate-300 text-sm">Proof of competence — lifting structures</p></div>
          <span className="rounded-full bg-blue-600/90 px-3 py-1 text-xs font-medium">BS 2853:1957 (inc. amm. 1–4)</span>
        </div>
        <div className="max-w-6xl mx-auto px-3 flex gap-1 overflow-x-auto">
          {SHEETS.map(sh=><button key={sh.id} onClick={()=>setTab(sh.id)}
            className={"whitespace-nowrap px-3 py-2 text-sm rounded-t "+(tab===sh.id?"bg-slate-100 text-slate-900 font-medium":"text-slate-200 hover:bg-slate-700")}>{sh.tab}</button>)}
          {FUTURE.map((sh,i)=><span key={i} className="whitespace-nowrap px-3 py-2 text-sm text-slate-500 cursor-not-allowed">{sh.tab} ·</span>)}
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-5 py-5">
        <div className={"mb-4 rounded-lg border px-4 py-2 text-sm flex items-center justify-between flex-wrap gap-2 "+
            (allPass?"border-emerald-200 bg-emerald-50 text-emerald-800":"border-rose-200 bg-rose-50 text-rose-800")}>
          <span><b>{allPass?"✓ Verified":"✗ Mismatch"}</b> — live formulas reproduce the original FM1 spreadsheet for all {tests.length} beam sheets.</span>
          <span className="text-xs tnum">{tests.map(t=>(t.ok?"✓":"✗")+" "+t.label.split(" ")[0]).join("  ")}</span>
        </div>

        <BeamSheet cfg={cfg} s={s} setS={setS}/>

        <div className="mt-5 grid lg:grid-cols-2 gap-5">
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <h3 className="text-sm font-medium text-slate-700 mb-2">Provenance</h3>
            <ul className="list-disc pl-4 space-y-1 text-sm text-slate-600">
              <li>Formulas reconstructed from the FM1 sheet's printed algebra and verified against its stored cell values.</li>
              <li>Allowable Pbc read from <b>Table 1</b> (BS15 steel) by bilinear interpolation; clamped &amp; flagged beyond l/ry = 300.</li>
              <li>Section properties from the workbook's "Section misc" register; C (Table 3) and K2 (Table 5) per BS 2853.</li>
              <li className="text-amber-700">BS 2853:1957 is withdrawn; retained as the firm's documented design practice. Results require a competent-engineer check.</li>
            </ul>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <h3 className="text-sm font-medium text-slate-700 mb-2">Load basis (reproduced exactly from the form)</h3>
            <table className="w-full text-xs text-slate-600">
              <thead><tr className="text-left text-slate-400"><th className="py-1">Cell</th><th>Load used</th></tr></thead>
              <tbody>
                <tr className="border-t border-slate-100"><td className="py-1">Required Ixx (sizing)</td><td>rounded design load</td></tr>
                <tr className="border-t border-slate-100"><td className="py-1">Bending Pbc</td><td>actual total <span className="text-slate-400">(Simply Supported: design)</span></td></tr>
                <tr className="border-t border-slate-100"><td className="py-1">Flange load</td><td>actual total <span className="text-slate-400">(Cantilever: design)</span></td></tr>
                <tr className="border-t border-slate-100"><td className="py-1">Deflection</td><td>actual total</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <p className="text-center text-xs text-slate-400 mt-6">Compliance with BS 2853:1957 inc. amm. 1, 2, 3 &amp; 4 — design-office use; results require competent engineer check.</p>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
