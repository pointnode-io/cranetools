function pbcLookup(lry,dt){
  const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
  const off = lry>300 || lry<85 || dt>50 || dt<10;
  const L=clamp(lry,85,300), D=clamp(dt,10,50);
  const brk=(arr,x)=>{let i=0;while(i<arr.length-1&&arr[i+1]<x)i++;const lo=i,hi=Math.min(i+1,arr.length-1);const t=arr[hi]===arr[lo]?0:(x-arr[lo])/(arr[hi]-arr[lo]);return[lo,hi,t];};
  const [r0,r1,tr]=brk(T1LRY,L), [c0,c1,tc]=brk(T1DT,D);
  const a=T1V[r0][c0]+(T1V[r0][c1]-T1V[r0][c0])*tc;
  const b=T1V[r1][c0]+(T1V[r1][c1]-T1V[r1][c0])*tc;
  return {v:a+(b-a)*tr, off};
}

function sectOf(cfg,s){
  if(cfg.customSection) return {n:"custom",depth:num(s.cDepth),flange:num(s.cFlange),Ix:num(s.cIx),Zx:num(s.cZx),ry:num(s.cRy)};
  return UB.find(u=>u.n===s.section)||UB[0];
}
function calcBeam(cfg,s){
  const total=num(s.swl)+num(s.added), duty=total*cfg.duty, totalKg=total+duty;
  const Wact=totalKg/1000, Wdes=num(s.designKg)/1000;
  const Lcm=num(s.spanMm)/10, sCm=(num(s.spanMm)/num(s.deflDiv))/10;
  const sec=sectOf(cfg,s), Tcm=sec.flange/10, DT=sec.depth/sec.flange, lry=Lcm/sec.ry;
  const pbc=pbcLookup(lry,DT);
  const pbcAllow=(s.pbcOverride!==''&&s.pbcOverride!=null)?num(s.pbcOverride):pbc.v;
  const Wpbc=cfg.pbcLoad==='design'?Wdes:Wact, Wfl=cfg.flangeLoad==='design'?Wdes:Wact;
  let reqIxx,calPbc,defl,calPbcCorrect=null;
  if(cfg.model==='central'){ reqIxx=Wdes*Lcm**3/(48*E_STEEL*sCm); calPbc=Wpbc*Lcm/(4*sec.Zx); defl=Wact*Lcm**3/(48*E_STEEL*sec.Ix); }
  else if(cfg.model==='cantilever'){ reqIxx=Wdes*Lcm**3/(3*E_STEEL*sCm); calPbc=Wpbc*Lcm/(4*sec.Zx); calPbcCorrect=Wpbc*Lcm/sec.Zx; defl=Wact*Lcm**3/(3*E_STEEL*sec.Ix); }
  else { const aCm=num(s.aMm)/10, k=3*Lcm-4*aCm; reqIxx=(Wdes/2)*aCm**2*k/(6*E_STEEL*sCm); calPbc=0.1*Wpbc*Lcm/(4*sec.Zx); defl=(Wact/2)*aCm**2*k/(6*E_STEEL*sec.Ix); }
  const flange=1.4*num(s.C)*Wfl/(num(s.K2)*Tcm**2);
  return {totalKg,Wact,Wdes,Lcm,sCm,reqIxx,sec,DT,lry,pbcAuto:pbc.v,pbcOff:pbc.off,pbcAllow,calPbc,calPbcCorrect,flange,defl,
    okSection:sec.Ix>=reqIxx, okStress:calPbc<=pbcAllow, okStressCorrect:calPbcCorrect==null||calPbcCorrect<=pbcAllow,
    okFlange:flange<=FLANGE_ALLOW, okDefl:defl<=sCm};
}

/* ═════════════ Jib COLUMN (sheets 10 & 11) ═════════════ */
function calcJibCol(cfg,s){
  const dyn1=num(s.dyn1)/1000, W=num(s.designKg)/1000;
  const A=num(s.A)/10, C=num(s.C)/10, a=num(s.a)/10, b=num(s.b)/10, D=num(s.D)/10;
  const sCm=A/num(s.deflDiv);
  let reqIxx;
  if(cfg.id==='jibcol10') reqIxx=(W*num(s.deflDiv)/E_STEEL)*((a+b)*C + b**2/3);   // (W·250/E)·((a+b)C + b²/3)
  else reqIxx=(W/(E_STEEL*sCm))*(C**3/3 + C**2*a);                                  // (W/E·s)·(C³/3 + C²·a)
  const F=a*dyn1/D;                                                                  // bolt uplift, a·DYN1/D
  return {reqIxx, F, sCm, selIx:num(s.selIx), ok:num(s.selIx)>=reqIxx};
}

/* ═════════════ DAVIT (sheet 12) ═════════════ */
function calcDavit(s){
  const total=num(s.swl)+num(s.hcb), W=num(s.designKg)/1000;
  const A=num(s.A)/10, B=num(s.B)/10, C=num(s.C)/10, D=num(s.D)/10, e=num(s.e)/10;
  const sCm=(A+C)/num(s.deflDiv);
  const M=C*W;                                   // bending moment, t·cm
  const reqIxx=(M*B/(E_STEEL*sCm))*(D+e/6);
  const armZ=W*B/(4*num(s.z));                    // required arm section modulus
  return {W,totalKg:total*1.25,sCm,M,reqIxx,armZ,selIx:num(s.selIx),ok:num(s.selIx)>=reqIxx};
}

/* ═════════════ Section-modulus forms (C-hook 14, Lift beam 17) ═════════════ */
const SECTMOD={
  chook:   {title:"C-Hook", proofMult:2.0, leverLabel:"L = A + B", avail:"bd2", zDefault:1.64,
            note:"Proof = 2 × SWL. Required Z = W·(A+B)/4z; available Z of the section = b·d²/6."},
  liftbeam:{title:"Lifting Beam (11–160 t)", proofMult:1.28, leverLabel:"L = A + B", avail:"manual", zDefault:1.64,
            note:"Proof = 1.28 × SWL. Required Z = W·(A+B)/4z; compare to the section's X-X modulus."},
};
function calcSectMod(cfg,s){
  const proof=num(s.swl)*cfg.proofMult/1000;      // t
  const lever=(num(s.A)+num(s.B))/10;              // cm
  const Zreq=proof*lever/(4*num(s.z));
  const Zavail=cfg.avail==='bd2' ? (num(s.bb)/10)*((num(s.dd)/10)**2)/6 : num(s.availZ);
  return {proof,lever,Zreq,Zavail,ok:Zavail>=Zreq};
}

/* ═════════════ COLUMN (sheet 15) ═════════════ */
function calcColumn15(s){
  const DYN1=(num(s.swl)+num(s.dead))*1.25;        // kg
  const tenPct=DYN1*0.1, W=num(s.designKg)/1000;
  const Lcm=num(s.L)/10, Dcm=num(s.D)/10;
  const Zreq=W*Lcm/(4*num(s.z));
  const weight=num(s.wtm)*num(s.L)/1000;           // kg
  const F=Lcm*W/Dcm;                               // bolt uplift, L·W/D
  return {DYN1,tenPct,W,Lcm,Zreq,Zavail:num(s.availZ),weight,F,ok:num(s.availZ)>=Zreq};
}

/* ═════════════ STRESS (sheet 13) ═════════════ */
function calcStress(s){
  const proof=num(s.proof)/1000;                   // t
  const b=num(s.b)/10, d=num(s.d)/10, D=num(s.Dpin)/10;
  const rect=proof/(b*d);
  const circArea=Math.PI*D**2/4, circ=proof/circArea;
  return {proof,rect,circArea,circ,okR:rect<=num(s.allowR),okC:circ<=num(s.allowC)};
}

/* ═════════════ A-FRAME LEG (sheet 16) — combined bending + axial, N/mm² ═════════════ */
function calcAframe(s){
  const Qh=num(s.designLoad)*num(s.dynPct)/100;     // 10% dynamic, kg
  const fc=(num(s.loadPerLeg)*G)/(num(s.area)*100);                 // N/mm²
  const fbcx=(Qh*num(s.legLen)*G)/(num(s.Zx)*100);                  // N/mm²
  const lambda=num(s.effLen)/num(s.ry);
  const interaction=fc/num(s.pc)+fbcx/num(s.pbcx);
  return {Qh,fc,fbcx,lambda,interaction,ok:interaction<=1};
}

  simple:{reqIxx:698.5109126984128,calPbc:1.276605504587156,flange:2.245777937477542,defl:0.4213888524596989},
  jibarm8:{reqIxx:1736.111111111111,calPbc:0.7546356188012074,flange:1.313137809793328,defl:0.6908336870401811},
  jibarm9:{reqIxx:1178.5714285714287,calPbc:0.1183252427184466,flange:0.23224599978886726,defl:0.666120106579217},
};
function approx(a,b){return Math.abs(a-b)<=Math.max(1e-6,Math.abs(b)*1e-9);}
function selfTest(){
  const out=[];
  for(const id in BEAM){ const r=calcBeam(BEAM[id],{...BEAM[id].d,pbcOverride:""}), e=EXPECT[id];
    out.push({label:BEAM[id].title, ok:approx(r.reqIxx,e.reqIxx)&&approx(r.calPbc,e.calPbc)&&approx(r.flange,e.flange)&&approx(r.defl,e.defl)});}
  let r;
  r=calcJibCol(BEAM_NONE.jibcol10,DEF.jibcol10); out.push({label:"Overbraced Jib Column",ok:approx(r.reqIxx,18260.714285714286)&&approx(r.F,3.6842105263157894)});
  r=calcJibCol(BEAM_NONE.jibcol11,DEF.jibcol11); out.push({label:"Underbraced Jib Column",ok:approx(r.reqIxx,9025.714285714286)&&approx(r.F,2.3076923076923075)});
  r=calcDavit(DEF.davit); out.push({label:"Davit",ok:approx(r.M,66)&&approx(r.reqIxx,1205.0137362637363)&&approx(r.armZ,9.968749999999998)});
  r=calcStress(DEF.stress); out.push({label:"Calculated Stress",ok:approx(r.rect,0.4444444444444444)&&approx(r.circArea,5.3092915845667505)&&approx(r.circ,0.37669809015833217)});
  r=calcSectMod(SECTMOD.chook,DEF.chook); out.push({label:"C-Hook",ok:approx(r.Zreq,94.1158536585366)&&approx(r.Zavail,65.10416666666667)});
  r=calcColumn15(DEF.column15); out.push({label:"Column",ok:approx(r.Zreq,337.5)&&approx(r.weight,1611)&&approx(r.F,27)});
  r=calcAframe(DEF.aframe); out.push({label:"A-Frame Leg",ok:approx(r.fc,4.266086956521739)&&approx(r.fbcx,144.15279138099902)&&approx(r.interaction,1.262710079632074)});
  r=calcSectMod(SECTMOD.liftbeam,DEF.liftbeam); out.push({label:"Lifting Beam",ok:approx(r.Zreq,2341.4634146341464)});
  return out;
}

/* ───────────────────────── UI helpers ───────────────────────── */
function NumIn({value,onChange,step,w="w-28"}){
  return <input type="number" step={step} value={value} onChange={e=>onChange(e.target.value)}
    className={w+" rounded border border-blue-300 bg-blue-50 px-2 py-1 text-right tnum text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-400"} />;
}
function Field({label,unit,note,wide,children}){
  return (<label className="flex items-center gap-2 py-1.5">
    <span className={(wide?"w-56":"w-44")+" shrink-0 text-sm text-slate-600"}>{label}</span>{children}
    {unit&&<span className="w-12 text-sm text-slate-400">{unit}</span>}
    {note&&<span className="text-xs text-slate-400">{note}</span>}
  </label>);
}
function Out({label,formula,value,unit,strong}){
  return (<div className="flex items-center gap-2 py-1 border-b border-slate-100">
    <span className="w-40 shrink-0 text-sm text-slate-600">{label}</span>
    {formula&&<span className="hidden md:inline w-44 text-xs text-slate-400 italic">{formula}</span>}
    <span className={"flex-1 text-right tnum "+(strong?"font-semibold text-slate-900":"text-slate-700")}>{value}</span>
    <span className="w-14 text-sm text-slate-400">{unit}</span>
  </div>);
}
function Verdict({ok,children}){
  return (<div className={"flex items-center justify-between rounded px-3 py-2 text-sm "+(ok?"bg-emerald-50 text-emerald-800":"bg-rose-50 text-rose-800")}>
    <span>{children}</span><span className={"font-bold "+(ok?"text-emerald-600":"text-rose-600")}>{ok?"PASS":"FAIL"}</span>
  </div>);
}
function Card({title,children}){ return <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">{title&&<h2 className="font-semibold text-slate-900 mb-3">{title}</h2>}{children}</div>; }
function Notes({list}){ return <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-900"><ul className="list-disc pl-4 space-y-1">{list.map((n,i)=><li key={i}>{n}</li>)}</ul></div>; }

/* ── Schematic load-case sketches (one per sheet type), mirroring the FM1 forms ── */
function Diagram({meta}){
  const shape = meta.kind==='beam' ? BEAM[meta.id].model
              : meta.kind==='jibcol' ? 'jibcolumn'
              : meta.kind==='sectmod' ? meta.id : meta.kind;
  const S="#475569", A="#d97706", F="#94a3b8";
  const T=(x,y,t,c)=> <text key={"t"+x+y+t} x={x} y={y} fontSize="12" fill={c||S}>{t}</text>;
  const down=(x,y1,y2)=> <g key={"d"+x+y2} stroke={A} strokeWidth="2"><line x1={x} y1={y1} x2={x} y2={y2}/><polygon points={`${x-4},${y2-8} ${x+4},${y2-8} ${x},${y2}`} fill={A} stroke="none"/></g>;
  const sup=(x,y)=> <polygon key={"s"+x} points={`${x},${y} ${x-9},${y+13} ${x+9},${y+13}`} fill={F}/>;
  const wall=(x,y1,y2)=> <g key="w" stroke={S}><line x1={x} y1={y1} x2={x} y2={y2} strokeWidth="3"/>{[0,1,2,3,4].map(i=><line key={i} x1={x} y1={y1+i*(y2-y1)/4} x2={x-8} y2={y1+i*(y2-y1)/4+6} strokeWidth="1"/>)}</g>;
  const dim=(x1,x2,y,lbl)=> <g key={"dim"+x1+"_"+x2}><line x1={x1} y1={y} x2={x2} y2={y} stroke={F} strokeWidth="1"/><line x1={x1} y1={y-3} x2={x1} y2={y+3} stroke={F}/><line x1={x2} y1={y-3} x2={x2} y2={y+3} stroke={F}/>{T((x1+x2)/2-3,y+13,lbl)}</g>;
  let g=null, cap="";
  if(shape==='central'){ cap="Simply supported — central point load (hoist at mid-span)";
    g=<g><line x1="60" y1="70" x2="420" y2="70" stroke={S} strokeWidth="5"/>{sup(60,70)}{sup(420,70)}{down(240,22,64)}{T(247,30,"W",A)}{dim(60,420,92,"L")}</g>; }
  else if(shape==='cantilever'){ cap="Cantilever — tip point load";
    g=<g>{wall(60,40,100)}<line x1="60" y1="70" x2="410" y2="70" stroke={S} strokeWidth="5"/>{down(405,22,64)}{T(388,30,"W",A)}{dim(60,405,92,"L")}</g>; }
  else if(shape==='gantry'){ cap="Gantry — two crab wheels (W₁ = W/2) at offset a";
    g=<g><line x1="60" y1="70" x2="420" y2="70" stroke={S} strokeWidth="5"/>{sup(60,70)}{sup(420,70)}<circle cx="140" cy="64" r="5" fill="none" stroke={S}/><circle cx="340" cy="64" r="5" fill="none" stroke={S}/>{down(140,30,58)}{down(340,30,58)}{T(132,26,"W₁",A)}{T(332,26,"W₁",A)}{dim(60,140,92,"a")}{dim(340,420,92,"a")}</g>; }
  else if(shape==='jibcolumn'){ cap="Jib column — arm load W carried to the column & base";
    g=<g><line x1="100" y1="20" x2="100" y2="100" stroke={S} strokeWidth="5"/><line x1="78" y1="100" x2="122" y2="100" stroke={S} strokeWidth="4"/><line x1="100" y1="30" x2="320" y2="30" stroke={S} strokeWidth="4"/><line x1="100" y1="75" x2="320" y2="30" stroke={F} strokeWidth="2"/>{down(315,32,68)}{T(322,40,"W",A)}{T(70,66,"A")}{T(205,22,"C")}</g>; }
  else if(shape==='davit'){ cap="Davit — reach C creates an overturning moment on the column";
    g=<g><line x1="110" y1="18" x2="110" y2="100" stroke={S} strokeWidth="5"/><line x1="86" y1="100" x2="134" y2="100" stroke={S} strokeWidth="4"/><path d="M110 30 H300" stroke={S} strokeWidth="4" fill="none"/>{down(295,32,70)}{T(302,42,"W",A)}{T(80,66,"B")}{dim(110,295,90,"C")}</g>; }
  else if(shape==='stress'){ cap="Direct stress — rectangular bar (b×d) and circular pin (D)";
    g=<g>{down(120,16,40)}<rect x="92" y="42" width="56" height="48" fill="none" stroke={S} strokeWidth="2"/>{T(116,104,"b×d")}<circle cx="320" cy="62" r="26" fill="none" stroke={S} strokeWidth="2"/><g stroke={A} strokeWidth="2"><line x1="280" y1="50" x2="360" y2="50"/><line x1="360" y1="74" x2="280" y2="74"/></g>{T(312,104,"pin D")}</g>; }
  else if(shape==='chook'){ cap="C-hook — throat bending under the lifted load";
    g=<g><path d="M200 24 H120 V96 H190" fill="none" stroke={S} strokeWidth="5"/><path d="M190 96 q14 0 14 -12" fill="none" stroke={S} strokeWidth="5"/>{down(204,86,108)}{T(210,104,"W",A)}{T(150,18,"throat A+B")}</g>; }
  else if(shape==='column15'){ cap="Column — vertical load W, holding-down bolts resist uplift";
    g=<g>{down(240,14,40)}{T(248,28,"W",A)}<line x1="240" y1="40" x2="240" y2="100" stroke={S} strokeWidth="6"/><line x1="206" y1="100" x2="274" y2="100" stroke={S} strokeWidth="4"/>{dim(300,300,40,"")}<line x1="300" y1="40" x2="300" y2="100" stroke={F}/><line x1="296" y1="40" x2="304" y2="40" stroke={F}/><line x1="296" y1="100" x2="304" y2="100" stroke={F}/>{T(306,74,"L")}</g>; }
  else if(shape==='aframe'){ cap="A-frame leg — combined axial compression + bending";
    g=<g><line x1="170" y1="100" x2="250" y2="28" stroke={S} strokeWidth="6"/><line x1="250" y1="28" x2="330" y2="100" stroke={S} strokeWidth="6"/><g stroke={A} strokeWidth="2"><line x1="250" y1="10" x2="250" y2="30"/><polygon points="246,23 254,23 250,31" fill={A} stroke="none"/></g>{T(258,20,"axial",A)}<g stroke={A} strokeWidth="2"><line x1="120" y1="60" x2="165" y2="60"/><polygon points="158,56 158,64 168,60" fill={A} stroke="none"/></g>{T(92,57,"H",A)}</g>; }
  else if(shape==='liftbeam'){ cap="Lifting beam — central sling, two lift points at A and B";
    g=<g><circle cx="240" cy="16" r="5" fill="none" stroke={S}/><line x1="240" y1="20" x2="150" y2="56" stroke={F} strokeWidth="2"/><line x1="240" y1="20" x2="330" y2="56" stroke={F} strokeWidth="2"/><line x1="90" y1="60" x2="390" y2="60" stroke={S} strokeWidth="5"/>{down(150,64,92)}{down(330,64,92)}{T(120,104,"A")}{T(336,104,"B")}</g>; }
  return <Card><div className="flex items-center gap-4 flex-wrap"><svg viewBox="0 0 480 120" width="480" height="120" preserveAspectRatio="xMidYMid meet" className="max-w-full shrink-0" style={{width:480,height:120}}>{g}</svg><p className="text-sm text-slate-500">{cap}</p></div></Card>;
}

/* ───────────────────────── Beam sheet ───────────────────────── */
function BeamSheet({cfg,s,set}){
  const r=useMemo(()=>calcBeam(cfg,s),[cfg,s]);

  return (
    <div className="grid lg:grid-cols-2 gap-5">
      <Card title={cfg.title+" — inputs"}>
        <p className="text-xs text-slate-400 -mt-2 mb-2">Blue cells = manual input (mirrors the original form).</p>
        <Field label="SWL" unit="kg"><NumIn value={s.swl} onChange={set('swl')}/></Field>
        <Field label={cfg.addedLabel} unit="kg"><NumIn value={s.added} onChange={set('added')}/></Field>
        {cfg.duty>0 && <div className="my-2 rounded bg-slate-50 px-3 py-2 text-sm text-slate-600 flex justify-between"><span>Total + {Math.round(cfg.duty*100)}% duty</span><span className="tnum font-medium">{fmt(r.totalKg,1)} kg · {fmt(r.Wact,4)} t</span></div>}
        <Field label="Design load W (sizing)" unit="kg" note={num(s.designKg)!==suggest?`suggest ${suggest}`:"rounded up"}><NumIn value={s.designKg} onChange={set('designKg')}/></Field>
        <Field label="Span L" unit="mm"><NumIn value={s.spanMm} onChange={set('spanMm')}/></Field>
        {cfg.model==='gantry' && <Field label="Wheel offset a" unit="mm"><NumIn value={s.aMm} onChange={set('aMm')}/></Field>}
        <Field label="Preferred deflection"><select value={s.deflDiv} onChange={e=>set('deflDiv')(e.target.value)} className="w-28 rounded border border-blue-300 bg-blue-50 px-2 py-1 text-slate-800"><option value={250}>L / 250</option><option value={500}>L / 500</option><option value={750}>L / 750</option></select></Field>
        {cfg.customSection ? (
          <div className="mt-2 rounded-lg border border-slate-200 p-3">
            <div className="text-sm text-slate-600 mb-1">Compound section (from parallel-axis calc)</div>
            <div className="grid grid-cols-2 gap-x-3">
              <Field label="Depth" unit="mm"><NumIn value={s.cDepth} onChange={set('cDepth')} w="w-24"/></Field>
              <Field label="Flange T" unit="mm"><NumIn value={s.cFlange} onChange={set('cFlange')} w="w-24"/></Field>
              <Field label="Ixx" unit="cm⁴"><NumIn value={s.cIx} onChange={set('cIx')} w="w-24"/></Field>
              <Field label="Zxx" unit="cm³"><NumIn value={s.cZx} onChange={set('cZx')} w="w-24"/></Field>
              <Field label="ry" unit="cm"><NumIn value={s.cRy} onChange={set('cRy')} w="w-24"/></Field>
            </div>
          </div>
        ) : (
          <div>
            <Field label="Section (UB)"><select value={s.section} onChange={e=>set('section')(e.target.value)} className="w-56 rounded border border-blue-300 bg-blue-50 px-2 py-1 text-slate-800">{UB.map(u=><option key={u.n} value={u.n}>{u.n}{LEGACY[u.n]?" — legacy":""}</option>)}</select></Field>
            {LEGACY[s.section] && <p className="text-xs text-amber-600 ml-44 -mt-1">Superseded serial size — for new designs use {LEGACY[s.section]} (current Blue Book). Retained for historical jobs.</p>}
          </div>
        )}
        <Field label="C (Table 3)"><NumIn value={s.C} onChange={set('C')} step="0.05"/></Field>
        <Field label="K2 (Table 5)"><NumIn value={s.K2} onChange={set('K2')} step="0.05"/></Field>
        <div className="mt-3 rounded-lg border border-slate-200 p-3">
          <div className="flex items-center justify-between text-sm"><span className="text-slate-600">Allowable Pbc — Table 1</span><span className="tnum font-medium">{fmt(r.pbcAuto)} t/cm²</span></div>
          <div className="text-xs text-slate-400 mt-0.5">at l/ry = {fmt(r.lry,1)}, D/T = {fmt(r.DT,1)}{r.pbcOff && <span className="text-amber-600"> · off-table, clamped — verify restraint</span>}</div>
          <label className="flex items-center gap-2 mt-2 text-sm"><span className="text-slate-600">Override</span><input value={s.pbcOverride} placeholder="auto" onChange={e=>set('pbcOverride')(e.target.value)} className="w-24 rounded border border-blue-300 bg-blue-50 px-2 py-1 text-right tnum"/><span className="text-slate-400 text-xs">t/cm²</span></label>
        </div>
      </Card>
      <div className="space-y-4">
        <Card title="Results">
          <Out label="Required Ixx" formula={cfg.ixxF} value={fmt(r.reqIxx,0)} unit="cm⁴"/>
          <Out label="Section Ixx" value={fmt(r.sec.Ix,0)} unit="cm⁴" strong/>
          <Out label="Section Zxx" value={fmt(r.sec.Zx,0)} unit="cm³"/>

          <Out label="Allowable Pbc" value={fmt(r.pbcAllow,3)} unit="t/cm²"/>
          <Out label="Flange load" formula="1.4.C.W / K2.T²" value={fmt(r.flange,3)} unit="t/cm²"/>
          <Out label="Deflection" formula={cfg.deflF} value={fmt(r.defl,3)} unit="cm"/>
          <Out label="Preferred (s)" value={fmt(r.sCm,3)} unit="cm"/>

          <div className="space-y-2">
            <Verdict ok={r.okSection}>Section Ixx ≥ required ({fmt(r.sec.Ix,0)} ≥ {fmt(r.reqIxx,0)} cm⁴)</Verdict>
            <Verdict ok={r.okStress}>Bending ≤ allowable Pbc ({fmt(r.calPbc,3)} ≤ {fmt(r.pbcAllow,3)})</Verdict>
            {r.calPbcCorrect!=null && <Verdict ok={r.okStressCorrect}>Corrected bending ≤ allowable ({fmt(r.calPbcCorrect,3)} ≤ {fmt(r.pbcAllow,3)})</Verdict>}
            <Verdict ok={r.okFlange}>Flange load ≤ {FLANGE_ALLOW} t/cm² ({fmt(r.flange,3)})</Verdict>
            <Verdict ok={r.okDefl}>Deflection ≤ preferred ({fmt(r.defl,3)} ≤ {fmt(r.sCm,3)} cm)</Verdict>
          </div>
        </Card>
        {cfg.notes && <Notes list={cfg.notes}/>}
      </div>
    </div>
  );
}

        </Card>
        <Card title="Checks"><Verdict ok={r.ok}>Column tube Ixx ≥ required ({fmt(r.selIx,0)} ≥ {fmt(r.reqIxx,0)} cm⁴)</Verdict></Card>
        <Notes list={["Column: required Ixx from the davit overturning, vs the selected tube (manual).","Arm: pick a hollow section with Z ≥ the required arm modulus."]}/>
      </div>
    </div>
  );
}

/* ───────────────────────── Section-modulus sheet (C-hook, Lift beam) ───────────────────────── */
function SectModSheet({cfg,s,set}){
  const r=useMemo(()=>calcSectMod(cfg,s),[cfg,s]);
  return (
    <div className="grid lg:grid-cols-2 gap-5">
      <Card title={cfg.title+" — inputs"}>
        <Field label="SWL" unit="kg"><NumIn value={s.swl} onChange={set('swl')}/></Field>
        <div className="my-2 rounded bg-slate-50 px-3 py-2 text-sm text-slate-600 flex justify-between"><span>Proof = {cfg.proofMult} × SWL</span><span className="tnum">{fmt(num(s.swl)*cfg.proofMult,0)} kg · {fmt(r.proof,2)} t</span></div>
        <Field label="A" unit="mm"><NumIn value={s.A} onChange={set('A')}/></Field>
        <Field label="B" unit="mm"><NumIn value={s.B} onChange={set('B')}/></Field>
        <Field label="Allowable z" unit="t/cm²"><NumIn value={s.z} onChange={set('z')} step="0.01"/></Field>
        {cfg.avail==='bd2' ? (<>
          <Field label="Section b" unit="mm"><NumIn value={s.bb} onChange={set('bb')}/></Field>
          <Field label="Section d" unit="mm"><NumIn value={s.dd} onChange={set('dd')}/></Field>
        </>) : (
          <Field label="Section Z (X-X)" unit="cm³"><NumIn value={s.availZ} onChange={set('availZ')}/></Field>
        )}
      </Card>
      <div className="space-y-4">
        <Card title="Results">
          <Out label="Lever L" formula={cfg.leverLabel} value={fmt(r.lever,1)} unit="cm"/>
          <Out label="Required Z" formula="W · L / 4z" value={fmt(r.Zreq,2)} unit="cm³" strong/>
          <Out label="Available Z" formula={cfg.avail==='bd2'?"b · d² / 6":"section X-X"} value={fmt(r.Zavail,2)} unit="cm³"/>
        </Card>
        <Card title="Checks"><Verdict ok={r.ok}>Available Z ≥ required ({fmt(r.Zavail,1)} ≥ {fmt(r.Zreq,1)} cm³)</Verdict></Card>
        <Notes list={[cfg.note]}/>
      </div>
    </div>
  );
}

/* ───────────────────────── Column sheet (15) ───────────────────────── */
function Column15Sheet({s,set}){
  const r=useMemo(()=>calcColumn15(s),[s]);
  return (
    <div className="grid lg:grid-cols-2 gap-5">
      <Card title="Column — inputs">
        <Field label="SWL" unit="kg"><NumIn value={s.swl} onChange={set('swl')}/></Field>
        <Field label="Dead load" unit="kg"><NumIn value={s.dead} onChange={set('dead')}/></Field>
        <div className="my-2 rounded bg-slate-50 px-3 py-2 text-sm text-slate-600"><div className="flex justify-between"><span>DYN1 = (SWL+Dead)×1.25</span><span className="tnum">{fmt(r.DYN1,0)} kg</span></div><div className="flex justify-between"><span>10% of DYN1</span><span className="tnum">{fmt(r.tenPct,0)} kg</span></div></div>
        <Field label="Horiz. load W" unit="kg" note="rounded up"><NumIn value={s.designKg} onChange={set('designKg')}/></Field>
        <Field label="Height L" unit="mm"><NumIn value={s.L} onChange={set('L')}/></Field>
        <Field label="D (base lever)" unit="mm"><NumIn value={s.D} onChange={set('D')}/></Field>
        <Field label="Allowable z" unit="t/cm²"><NumIn value={s.z} onChange={set('z')} step="0.1"/></Field>
        <Field label="Section Z (X-X)" unit="cm³"><NumIn value={s.availZ} onChange={set('availZ')}/></Field>
        <Field label="Section weight" unit="kg/m"><NumIn value={s.wtm} onChange={set('wtm')}/></Field>
      </Card>
      <div className="space-y-4">
        <Card title="Results">
          <Out label="Required Z" formula="W · L / 4z" value={fmt(r.Zreq,1)} unit="cm³" strong/>
          <Out label="Available Z" value={fmt(r.Zavail,0)} unit="cm³"/>
          <Out label="Column weight" formula="kg/m · L" value={fmt(r.weight,0)} unit="kg"/>
          <Out label="Bolt uplift F" formula="L · W / D" value={fmt(r.F,2)} unit="t"/>
        </Card>
        <Card title="Checks"><Verdict ok={r.ok}>Section Z ≥ required ({fmt(r.Zavail,0)} ≥ {fmt(r.Zreq,0)} cm³)</Verdict></Card>
        <Notes list={["Horizontal design load W = 10% of DYN1, rounded up. Bolt uplift sizes the holding-down bolts."]}/>
      </div>
    </div>
  );
}

/* ───────────────────────── Stress sheet (13) ───────────────────────── */
function StressSheet({s,set}){
  const r=useMemo(()=>calcStress(s),[s]);
  return (
    <div className="grid lg:grid-cols-2 gap-5">
      <Card title="Calculated Stress — inputs">
        <Field label="SWL" unit="kg"><NumIn value={s.swl} onChange={set('swl')}/></Field>
        <Field label="Proof load" unit="kg"><NumIn value={s.proof} onChange={set('proof')}/></Field>
        <div className="text-sm text-slate-600 mt-3 mb-1 font-medium">Rectangular section</div>
        <Field label="b" unit="mm"><NumIn value={s.b} onChange={set('b')}/></Field>
        <Field label="d" unit="mm"><NumIn value={s.d} onChange={set('d')}/></Field>
        <Field label="Allowable (BS4360 43)" unit="t/cm²"><NumIn value={s.allowR} onChange={set('allowR')} step="0.01"/></Field>
        <div className="text-sm text-slate-600 mt-3 mb-1 font-medium">Circular pin</div>
        <Field label="Diameter D" unit="mm"><NumIn value={s.Dpin} onChange={set('Dpin')}/></Field>
        <Field label="Allowable (shear)" unit="t/cm²"><NumIn value={s.allowC} onChange={set('allowC')} step="0.01"/></Field>
      </Card>
      <div className="space-y-4">
        <Card title="Results">
          <Out label="Rect. stress" formula="Proof / (b·d)" value={fmt(r.rect,3)} unit="t/cm²" strong/>
          <Out label="Circle area" formula="π·D² / 4" value={fmt(r.circArea,3)} unit="cm²"/>
          <Out label="Pin stress" formula="Proof / area" value={fmt(r.circ,3)} unit="t/cm²" strong/>
        </Card>
        <Card title="Checks"><div className="space-y-2">
          <Verdict ok={r.okR}>Rectangular ≤ {fmt(num(s.allowR),2)} t/cm² ({fmt(r.rect,3)})</Verdict>
          <Verdict ok={r.okC}>Pin shear ≤ {fmt(num(s.allowC),2)} t/cm² ({fmt(r.circ,3)})</Verdict>
        </div></Card>
        <Notes list={["Direct stress on a rectangular bar and a circular pin under the proof load. Allowable limits per BS4360 grade 43 steel."]}/>
      </div>
    </div>
  );
}

/* ───────────────────────── A-frame leg sheet (16) ───────────────────────── */
function AframeSheet({s,set}){
  const r=useMemo(()=>calcAframe(s),[s]);
  return (
    <div className="grid lg:grid-cols-2 gap-5">
      <Card title="A-Frame Leg — combined stress (N/mm²)">
        <Field label="Design load" unit="kg"><NumIn value={s.designLoad} onChange={set('designLoad')}/></Field>
        <Field label="Dynamic %" unit="%"><NumIn value={s.dynPct} onChange={set('dynPct')}/></Field>
        <Field label="Worst-case load / leg" unit="kg"><NumIn value={s.loadPerLeg} onChange={set('loadPerLeg')}/></Field>
        <Field label="Leg length" unit="cm"><NumIn value={s.legLen} onChange={set('legLen')}/></Field>
        <Field label="Effective length" unit="—"><NumIn value={s.effLen} onChange={set('effLen')}/></Field>
        <div className="text-sm text-slate-600 mt-2 mb-1 font-medium">Section properties</div>
        <Field label="Ixx" unit="cm⁴"><NumIn value={s.Ix} onChange={set('Ix')}/></Field>
        <Field label="Zxx" unit="cm³"><NumIn value={s.Zx} onChange={set('Zx')}/></Field>
        <Field label="r of g" unit="cm"><NumIn value={s.ry} onChange={set('ry')} step="0.01"/></Field>
        <Field label="Area" unit="cm²"><NumIn value={s.area} onChange={set('area')}/></Field>
        <div className="text-sm text-slate-600 mt-2 mb-1 font-medium">BS449 allowables (manual lookup)</div>
        <Field label="pc — table 17a" unit="N/mm²"><NumIn value={s.pc} onChange={set('pc')}/></Field>
        <Field label="pbcx — table 3a" unit="N/mm²"><NumIn value={s.pbcx} onChange={set('pbcx')}/></Field>
      </Card>
      <div className="space-y-4">
        <Card title="Results">
          <Out label="Axial fc" formula="Load·g / Area" value={fmt(r.fc,3)} unit="N/mm²"/>
          <Out label="Bending fbcx" formula="Qh·L·g / Zxx" value={fmt(r.fbcx,3)} unit="N/mm²"/>
          <Out label="Slenderness λ" formula="Eff.lg / r" value={fmt(r.lambda,1)} unit=""/>
          <Out label="Interaction" formula="fc/pc + fbcx/pbcx" value={fmt(r.interaction,3)} unit="≤ 1" strong/>
        </Card>
        <Card title="Checks"><Verdict ok={r.ok}>fc/pc + fbcx/pbcx ≤ 1 ({fmt(r.interaction,3)})</Verdict></Card>
        <Notes list={["Combined axial + bending interaction per BS449. pc (from table 17a by slenderness) and pbcx (from table 3a by D/T) are read from BS449 and entered manually — the original sheet does the same."]}/>
      </div>
    </div>
  );
}

/* ───────────────────────── Tabs / state ───────────────────────── */
const BEAM_NONE={ jibcol10:{id:'jibcol10'}, jibcol11:{id:'jibcol11'} };
const DEF={
  jibcol10:{dyn1:1000,armWt:150,designKg:1200,A:4000,C:3500,a:3500,b:150,D:950,deflDiv:250,selIx:18390},
  jibcol11:{dyn1:500,armWt:300,designKg:800,A:3000,C:2700,a:3000,b:0,D:650,deflDiv:250,selIx:2016},
  davit:{swl:160,hcb:10,designKg:220,A:2200,B:2900,C:3000,D:2700,e:300,deflDiv:250,z:1.6,selIx:433},
  stress:{swl:1000,proof:2000,b:15,d:30,Dpin:26,allowR:1.05,allowC:0.77},
  chook:{swl:900,A:1715,B:1715,z:1.64,bb:25,dd:125},
  liftbeam:{swl:40000,A:1500,B:1500,z:1.64,availZ:2995},
  column15:{swl:12500,dead:6500,designKg:2400,L:9000,D:800,z:1.6,availZ:4935,wtm:179},
  aframe:{designLoad:15000,dynPct:10,loadPerLeg:3000,legLen:1000,effLen:2000,Ix:18720,Zx:1021,ry:3.85,area:69,pc:25,pbcx:132},
};
const TABS=[
  {id:'crane',     tab:'1 · Crane Beam',      kind:'beam'},
  {id:'gantry',    tab:'2 · Gantry Beam',     kind:'beam'},
  {id:'runway',    tab:'3 · Runway Beam',     kind:'beam'},
  {id:'compound',  tab:'4 · Compound Runway', kind:'beam'},
  {id:'cantilever',tab:'6 · Cantilever',      kind:'beam'},
  {id:'simple',    tab:'7 · Simply Supported',kind:'beam'},
  {id:'jibarm8',   tab:'8 · Jib Arm (OB)',    kind:'beam'},
  {id:'jibarm9',   tab:'9 · Jib Arm (UB)',    kind:'beam'},
  {id:'jibcol10',  tab:'10 · Jib Column (OB)',kind:'jibcol'},
  {id:'jibcol11',  tab:'11 · Jib Column (UB)',kind:'jibcol'},
  {id:'davit',     tab:'12 · Davit',          kind:'davit'},
  {id:'stress',    tab:'13 · Stress',         kind:'stress'},
  {id:'chook',     tab:'14 · C-Hook',         kind:'sectmod'},
  {id:'column15',  tab:'15 · Column',         kind:'column15'},
  {id:'aframe',    tab:'16 · A-Frame Leg',    kind:'aframe'},
  {id:'liftbeam',  tab:'17 · Lifting Beam',   kind:'sectmod'},
];
const JIBCOL_CFG={jibcol10:{id:'jibcol10',title:'Overbraced Jib Column'},jibcol11:{id:'jibcol11',title:'Underbraced Jib Column'}};

function initialState(){
  const m={};
  for(const t of TABS){
    if(t.kind==='beam') m[t.id]={...BEAM[t.id].d,pbcOverride:""};
    else m[t.id]={...DEF[t.id]};
  }
  return m;
}

function App(){
  const [tab,setTab]=useState("crane");
  const [stateMap,setStateMap]=useState(initialState);
  const meta=TABS.find(t=>t.id===tab);
  const s=stateMap[tab];
  const set=(k)=>(v)=>setStateMap(m=>({...m,[tab]:{...m[tab],[k]:v}}));
  const tests=useMemo(()=>selfTest(),[]);
  const allPass=tests.every(t=>t.ok);

  let body=null;
  if(meta.kind==='beam') body=<BeamSheet cfg={BEAM[tab]} s={s} set={set}/>;
  else if(meta.kind==='jibcol') body=<JibColumnSheet cfg={JIBCOL_CFG[tab]} s={s} set={set}/>;
  else if(meta.kind==='davit') body=<DavitSheet s={s} set={set}/>;
  else if(meta.kind==='sectmod') body=<SectModSheet cfg={SECTMOD[tab]} s={s} set={set}/>;
  else if(meta.kind==='column15') body=<Column15Sheet s={s} set={set}/>;
  else if(meta.kind==='stress') body=<StressSheet s={s} set={set}/>;
  else if(meta.kind==='aframe') body=<AframeSheet s={s} set={set}/>;

  return (
    <div className="min-h-screen text-slate-800">
      <div className="bg-slate-800 text-white">
        <div className="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between flex-wrap gap-2">
          <div><h1 className="text-lg font-semibold">FM1 Design Workbook</h1><p className="text-slate-300 text-sm">Proof of competence — lifting structures</p></div>
          <span className="rounded-full bg-blue-600/90 px-3 py-1 text-xs font-medium">BS 2853:1957 (inc. amm. 1–4)</span>
        </div>
        <div className="max-w-6xl mx-auto px-3 flex gap-1 overflow-x-auto">
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={"whitespace-nowrap px-3 py-2 text-sm rounded-t "+(tab===t.id?"bg-slate-100 text-slate-900 font-medium":"text-slate-200 hover:bg-slate-700")}>{t.tab}</button>)}
        </div>
      </div>
      <div className="max-w-6xl mx-auto px-5 py-5">
        <div className={"mb-4 rounded-lg border px-4 py-2 text-sm flex items-center justify-between flex-wrap gap-2 "+(allPass?"border-emerald-200 bg-emerald-50 text-emerald-800":"border-rose-200 bg-rose-50 text-rose-800")}>
          <span><b>{allPass?"✓ Verified":"✗ Mismatch"}</b> — live formulas reproduce the original FM1 spreadsheet for all {tests.length} sheets.</span>
          <span className="text-xs">{tests.filter(t=>!t.ok).length===0?"all sheets tie out to stored cell values":tests.filter(t=>!t.ok).map(t=>"✗ "+t.label).join(", ")}</span>
        </div>
        <div className="mb-5"><Diagram meta={meta}/></div>
        {body}
        <p className="text-center text-xs text-slate-400 mt-6">Formulas read from the original FM1 .xls and verified against its stored values. BS 2853:1957 is withdrawn — retained as documented design practice; results require a competent-engineer check.</p>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
