<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hoist / Winch Drive Sizer — motor · gearbox · brake · inverter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{margin:0}
  select,input{appearance:auto}
  @media print{
    .no-print{display:none!important}
    body{background:#fff}
    details{display:block!important}
    summary{list-style:none}
    .print-block{break-inside:avoid}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;
const ACCENT="#d97706",STEEL="#1e293b";
const fmt=(x,dp=2)=>(x==null||!isFinite(x))?"—":Number(x).toLocaleString("en-GB",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const fmt0=(x)=>(x==null||!isFinite(x))?"—":Math.round(x).toLocaleString("en-GB");

// ════════════════════════════════════════════════════════════════════════════
//  HOIST / WINCH DRIVE SIZER — motor · gearbox · brake · inverter
//
//  Serial-hoist / winch sizing method (Siemens SINAMICS approach). Sizes the
//  motor, gearbox and holding brake from the duty, and checks the design can
//  withstand the 125% proof load and meets the brake & gearbox service factors.
//
//  Authority of values (consistent with the rest of the toolkit):
//   • Physics / kinematic relations are exact and computed (amber badge).
//   • g = 9.81 m/s².
//   • Standard-derived factors (brake factor, gearbox service factor, proof &
//     overload factors, %ED) are EDITABLE inputs with typical defaults —
//     published figures vary by standard/edition; confirm against EN 14492-2 /
//     EN 13001 before order.
//
//  Masses: the load in the formulas is the TOTAL load m = mL (payload) + mH
//  (hook/block). Counterweight mG subtracts statically (helps hold) and adds
//  dynamically (must also be accelerated).
//
//  Scope: a sizing & first-pass verification aid — confirm the final motor /
//  gearbox / brake / inverter against the supplier's selection data.
// ════════════════════════════════════════════════════════════════════════════
const G=9.81;
// IEC standard motor power ladder (kW) — recommendations snap UP to the next size
const IEC_KW=[0.12,0.18,0.25,0.37,0.55,0.75,1.1,1.5,2.2,3,4,5.5,7.5,11,15,18.5,22,30,37,45,55,75,90,110,132,160,200,250,315,355,400];
const pickMotorUp=(P)=>{if(!isFinite(P)||P<=0)return null;for(const k of IEC_KW){if(k>=P*0.999999)return k;}return null;};

function compute(x){
  const PI=Math.PI;
  const mLoad=(x.mL||0)+(x.mH||0);
  const mG=x.mG||0, mStat=mLoad-mG, mDyn=mLoad+mG;
  const d=x.d||0, s=x.s||0, v=x.v||0, a=x.a||0;
  const em=x.eta_mech||0, eg=x.eta_gear||0, et=em*eg, ig=x.i_gear||0;

  // ── power & drum torque ──
  const P_static=em>0?(mStat*G*v)/em:NaN;
  const P_dynamic=em>0?(mDyn*a*v)/em:NaN;
  const P_total=P_static+P_dynamic;
  const P_regen=mStat*G*v*em;                                   // lowering, returned to drive
  const M_drum_static=(em>0&&s>0)?(mStat*G*d)/(em*2*s):NaN;
  const M_drum_dynamic=(em>0&&s>0)?(mDyn*a*d)/(em*2*s):NaN;
  const M_drum_total=M_drum_static+M_drum_dynamic;
  const n_load=d>0?(s*v)/(PI*d):NaN;

  // ── inertia matching & gearbox ──
  const J_load=mDyn*Math.pow(d/2,2);
  const i_opt=x.J_motor>0?Math.sqrt((J_load/(s*s)+(x.J_drum||0))/x.J_motor):NaN;
  const fB=(ig>0&&x.M_motor_rated>0)?(x.M_gearbox_rated||0)/(ig*x.M_motor_rated):NaN;
  const fB_ok=isFinite(fB)&&fB>=(x.fB_min||0);
  const gbTorqueReq=M_drum_total;                              // peak output torque at drum
  const gbTorque_ok=(x.M_gearbox_rated||0)>=gbTorqueReq;

  // ── motor torque ──
  const n_motor_rps=d>0?(s*v*ig)/(PI*d):NaN, n_motor_rpm=n_motor_rps*60;
  const M_motor_static=(et>0&&s>0&&ig>0)?(mStat*G*d)/(et*2*s*ig):NaN;
  const alpha=x.t_acc>0?(2*PI*n_motor_rps)/x.t_acc:NaN;
  const M_motor_dyn=((et>0&&s>0&&ig>0)?(mDyn*a*d)/(et*2*s*ig):NaN)+(x.J_motor||0)*alpha;
  const M_motor_peak=M_motor_static+M_motor_dyn;
  const M_motor_lower=(et>0&&s>0&&ig>0)?(mStat*G*d*et)/(2*s*ig):NaN;
  // RMS over duty (hoist/lower/rest, standstill cooling kc). CONSERVATIVE: the
  // acceleration peak is included for the first t_acc of the hoist phase, so the
  // thermal figure is not understated.
  const tH=x.t_hoist||0,tL=x.t_lower||0,tR=x.t_rest||0,kc=x.kCool||0.33;
  const tAccU=Math.min(x.t_acc||0,tH);
  const den=tH+tL+kc*tR;
  const M_rms=den>0?Math.sqrt((M_motor_peak*M_motor_peak*tAccU
                              +M_motor_static*M_motor_static*Math.max(0,tH-tAccU)
                              +M_motor_lower*M_motor_lower*tL)/den):NaN;
  const tOn=tH+tL, tCyc=tOn+tR, ED=tCyc>0?100*tOn/tCyc:NaN;
  // motor checks
  const stallMargin=isFinite(M_motor_peak)&&M_motor_peak>0?(x.M_motor_K||0)/M_motor_peak:NaN;
  const stall_ok=isFinite(stallMargin)&&stallMargin>=(x.stallFactor||1.3);
  const motorRatedKW=(x.n_motor_rated>0&&x.M_motor_rated>0)?x.M_motor_rated*x.n_motor_rated*2*PI/60/1000:NaN;
  const omegaRated=2*PI*(x.n_motor_rated||0)/60;
  const P_duty=eg>0?((x.control==="vf"?P_total:P_static)/eg):NaN;   // W, duty basis
  const P_rms_W=isFinite(M_rms)?M_rms*omegaRated:NaN;              // W, thermal basis at rated speed
  // GOVERNING required power = the larger of duty and thermal → never undersized
  const P_motor_req=Math.max(isFinite(P_duty)?P_duty:0, isFinite(P_rms_W)?P_rms_W:0)||NaN; // W
  const P_motor_rec=pickMotorUp(P_motor_req/1000);                // next standard size up, kW
  const power_ok=isFinite(motorRatedKW)&&motorRatedKW>=P_motor_req/1000;
  const thermalUtil=isFinite(M_rms)&&x.M_motor_rated>0?M_rms/x.M_motor_rated:NaN;
  const thermal_ok=isFinite(thermalUtil)&&thermalUtil<=1;
  const ed_ok=isFinite(ED)&&ED<=(x.motor_ED||0);

  // ── brake & proof load ──
  // static LOAD torque at the motor (brake) shaft — gross, lossless (conservative)
  const M_load_motor=(s>0&&ig>0)?(mLoad*G*d)/(2*s*ig):NaN;
  const pf=x.proofFactor||1.25, ov=x.overloadFactor||1.10;
  const M_load_proof=pf*M_load_motor;                          // torque at proof load
  const req_2x=(x.brakeFactor||2)*(x.M_motor_rated||0);        // brake factor × motor rated
  const req_proof=M_load_proof;                                // must hold proof load
  const req_static=M_load_motor;
  const brakeReq=Math.max(req_2x,req_proof,req_static);
  const brake_2x_ok=(x.M_brake_rated||0)>=req_2x;
  const brake_proof_ok=(x.M_brake_rated||0)>=req_proof;
  const brake_static_ok=(x.M_brake_rated||0)>=req_static;
  // proof load (mass) & line pull at proof
  const load_proof=pf*mLoad, load_over=ov*mLoad;

  const warns=[];
  if(!(d>0))warns.push("Drum diameter must be > 0.");
  if(!(s>0))warns.push("Reeving factor must be ≥ 1.");
  if(!(ig>0))warns.push("Gear ratio i_gear must be > 0.");
  if(!(et>0))warns.push("Efficiencies must be > 0.");
  if(mStat<0)warns.push("Counterweight exceeds total load — overhauling; size the brake/drive for the worst case.");
  if(isFinite(n_motor_rpm)&&x.n_motor_rated>0&&n_motor_rpm<0.2*x.n_motor_rated)
    warns.push("Motor speed at hoisting velocity ("+fmt0(n_motor_rpm)+" rpm) < 20% of rated — choose a different ratio or oversize the inverter.");
  if(x.fieldWeak)warns.push("Field weakening: stall torque falls above base speed — check the motor torque–speed curve.");

  return {mLoad,mStat,mDyn,P_static,P_dynamic,P_total,P_regen,M_drum_static,M_drum_dynamic,M_drum_total,n_load,
    J_load,i_opt,fB,fB_ok,gbTorqueReq,gbTorque_ok,n_motor_rpm,M_motor_static,M_motor_dyn,M_motor_peak,M_motor_lower,
    M_rms,ED,stallMargin,stall_ok,motorRatedKW,P_duty,P_motor_req,P_motor_rec,power_ok,thermalUtil,thermal_ok,ed_ok,
    M_load_motor,M_load_proof,req_2x,req_proof,req_static,brakeReq,brake_2x_ok,brake_proof_ok,brake_static_ok,
    load_proof,load_over,warns};
}

// ── UI atoms ─────────────────────────────────────────────────────────────────
const Badge=({children,tone})=>(
  <span style={tone==="def"?{background:"#e0f2fe",color:"#075985",border:"1px solid #7dd3fc"}
                           :{background:"#fef3c7",color:"#92400e",border:"1px solid #fcd34d"}}
        className="text-[10px] font-semibold px-1.5 py-0.5 rounded ml-1 align-middle whitespace-nowrap">{children}</span>
);
const Field=({label,hint,children})=>(
  <label className="block mb-3">
    <div className="text-sm font-medium text-slate-700">{label}</div>
    {hint&&<div className="text-xs text-slate-400 mb-1">{hint}</div>}
    {children}
  </label>
);
const Num=(props)=>(
  <input type="number" {...props}
    className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400" />
);
const Row=({k,unit,v,strong,badge,ok})=>(
  <React.Fragment>
    <dt className={"text-slate-500 "+(strong?"font-semibold text-slate-700":"")}>{k}{badge&&<Badge tone={badge.tone}>{badge.t}</Badge>}</dt>
    <dd className={"text-right font-mono "+(strong?"font-bold text-slate-800":"")}>
      {ok!==undefined&&<span className={"mr-2 text-xs font-bold "+(ok?"text-green-600":"text-red-600")}>{ok?"PASS":"FAIL"}</span>}
      {v}{unit&&<span className="text-slate-400 font-sans"> {unit}</span>}
    </dd>
  </React.Fragment>
);
const Pill=({ok,children})=>(
  <span className={"text-xs font-bold px-2 py-0.5 rounded "+(ok?"bg-green-100 text-green-700":"bg-red-100 text-red-700")}>{children}</span>
);
const Toggle=({on,onClick,children})=>(
  <button onClick={onClick} className={"text-xs px-2 py-1 rounded border "+(on?"bg-amber-500 text-white border-amber-500":"bg-white text-slate-600 border-slate-300")}>{children}</button>
);
const Group=({title,open,children})=>(
  <details open={open} className="border border-slate-200 rounded-lg mb-3">
    <summary className="cursor-pointer select-none font-semibold text-slate-700 text-sm px-3 py-2 bg-slate-50 rounded-t-lg">{title}</summary>
    <div className="p-3">{children}</div>
  </details>
);

function App(){
  const [customer,setCustomer]=useState("");
  const [quoteNo,setQuoteNo]=useState("");
  const [dateStr,setDateStr]=useState("");
  const [preparedBy,setPreparedBy]=useState("");

  const [x,setX]=useState({
    mL:5000,mH:200,mG:0,
    d:0.4,s:4,v:0.133,a:0.3,t_acc:1.0,
    eta_mech:0.90,eta_gear:0.95,
    n_motor_rated:1450,M_motor_rated:70,M_motor_K:200,J_motor:0.05,J_drum:2.0,motor_ED:40,
    i_gear:57,M_gearbox_rated:5000,fB_min:1.0,
    M_brake_rated:160,brakeFactor:2.0,proofFactor:1.25,overloadFactor:1.10,
    t_hoist:20,t_lower:20,t_rest:20,kCool:0.33,stallFactor:1.3,
    control:"vector",fieldWeak:false});
  const set=(k,val)=>setX({...x,[k]:(typeof val==="boolean"||typeof val==="string")?val:(val===""?"":Number(val))});
  const r=useMemo(()=>compute(x),[x]);

  return (
    <div className="min-h-screen bg-slate-100 text-slate-800" style={{fontFamily:"system-ui,Segoe UI,Roboto,sans-serif"}}>
      <div style={{background:STEEL}} className="text-white">
        <div className="max-w-6xl mx-auto px-5 py-5">
          <h1 className="text-xl font-bold">Hoist / Winch Drive Sizer</h1>
          <p className="text-slate-300 text-sm mt-1">
            Motor · gearbox · brake · inverter sizing for a hoist/winch — static &amp; dynamic power and torque,
            <span className="font-semibold text-amber-300"> optimum gear ratio</span>,
            <span className="font-semibold text-amber-300"> stall margin</span>,
            <span className="font-semibold text-amber-300"> 125% proof-load</span> &amp; brake / service-factor checks.
            Serial-hoist (Siemens SINAMICS) method.
          </p>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-5 pt-5">
        <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-4 flex flex-wrap items-end gap-3">
          <label className="text-xs text-slate-600 flex-1 min-w-[140px]">Customer
            <input value={customer} onChange={e=>setCustomer(e.target.value)} className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <label className="text-xs text-slate-600 w-32">Quotation No.
            <input value={quoteNo} onChange={e=>setQuoteNo(e.target.value)} className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <label className="text-xs text-slate-600 w-32">Date
            <input value={dateStr} onChange={e=>setDateStr(e.target.value)} placeholder="dd/mm/yyyy" className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <label className="text-xs text-slate-600 w-32">Prepared by
            <input value={preparedBy} onChange={e=>setPreparedBy(e.target.value)} className="mt-0.5 w-full border border-slate-300 rounded px-2 py-1 text-sm" /></label>
          <button onClick={()=>window.print()} className="no-print text-sm bg-slate-700 text-white px-3 py-1.5 rounded hover:bg-slate-800">Print / PDF</button>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-5 py-6 grid md:grid-cols-2 gap-6">
        {/* INPUTS */}
        <div>
          {r.warns.length>0 && (
            <div className="rounded-lg border border-amber-300 bg-amber-50 p-3 text-sm text-amber-800 mb-3">
              <ul className="list-disc pl-5 space-y-0.5">{r.warns.map((w,i)=><li key={i}>{w}</li>)}</ul>
            </div>
          )}
          <Group title="Load & geometry" open={true}>
            <p className="text-xs text-slate-400 mb-2">Total load = <b>mL + mH</b>; counterweight mG subtracts statically, adds dynamically.</p>
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Payload mL" hint="kg"><Num value={x.mL} min="0" step="50" onChange={e=>set("mL",e.target.value)}/></Field>
              <Field label="Hook/block mH" hint="kg"><Num value={x.mH} min="0" step="10" onChange={e=>set("mH",e.target.value)}/></Field>
              <Field label="Counterweight mG" hint="kg, optional"><Num value={x.mG} min="0" step="50" onChange={e=>set("mG",e.target.value)}/></Field>
              <Field label="Drum diameter d" hint="m"><Num value={x.d} min="0" step="0.01" onChange={e=>set("d",e.target.value)}/></Field>
              <Field label="Reeving factor s" hint="falls"><Num value={x.s} min="1" step="1" onChange={e=>set("s",e.target.value)}/></Field>
            </div>
          </Group>
          <Group title="Motion & efficiency" open={true}>
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Hoisting speed v" hint="m/s"><Num value={x.v} min="0" step="0.01" onChange={e=>set("v",e.target.value)}/></Field>
              <Field label="Acceleration a" hint="m/s²"><Num value={x.a} min="0" step="0.05" onChange={e=>set("a",e.target.value)}/></Field>
              <Field label="Accel time t_acc" hint="s"><Num value={x.t_acc} min="0.05" step="0.1" onChange={e=>set("t_acc",e.target.value)}/></Field>
              <Field label="η mechanical" hint="reeving+drum"><Num value={x.eta_mech} min="0" max="1" step="0.01" onChange={e=>set("eta_mech",e.target.value)}/></Field>
              <Field label="η gearbox" hint=""><Num value={x.eta_gear} min="0" max="1" step="0.01" onChange={e=>set("eta_gear",e.target.value)}/></Field>
            </div>
          </Group>
          <Group title="Motor" open={true}>
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Rated speed" hint="rpm"><Num value={x.n_motor_rated} min="0" step="10" onChange={e=>set("n_motor_rated",e.target.value)}/></Field>
              <Field label="Rated torque" hint="N·m"><Num value={x.M_motor_rated} min="0" step="1" onChange={e=>set("M_motor_rated",e.target.value)}/></Field>
              <Field label="Stall/breakdown M_K" hint="N·m"><Num value={x.M_motor_K} min="0" step="5" onChange={e=>set("M_motor_K",e.target.value)}/></Field>
              <Field label="Rated %ED" hint="duty rating"><Num value={x.motor_ED} min="0" max="100" step="5" onChange={e=>set("motor_ED",e.target.value)}/></Field>
              <Field label="J motor" hint="kg·m²"><Num value={x.J_motor} min="0" step="0.005" onChange={e=>set("J_motor",e.target.value)}/></Field>
              <Field label="J drum" hint="kg·m²"><Num value={x.J_drum} min="0" step="0.1" onChange={e=>set("J_drum",e.target.value)}/></Field>
            </div>
            <div className="flex gap-2 mt-1 items-center">
              <Toggle on={x.control==="vector"} onClick={()=>set("control","vector")}>Vector</Toggle>
              <Toggle on={x.control==="vf"} onClick={()=>set("control","vf")}>V/f</Toggle>
              <label className="flex items-center gap-1 text-xs text-slate-600 ml-2"><input type="checkbox" checked={x.fieldWeak} onChange={e=>set("fieldWeak",e.target.checked)}/> field weakening</label>
            </div>
          </Group>
          <Group title="Gearbox" open={false}>
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Selected ratio i_gear"><Num value={x.i_gear} min="0" step="0.1" onChange={e=>set("i_gear",e.target.value)}/></Field>
              <div className="flex items-end mb-3"><button onClick={()=>set("i_gear",isFinite(r.i_opt)?Math.round(r.i_opt*10)/10:x.i_gear)} className="text-xs bg-slate-200 hover:bg-slate-300 rounded px-2 py-1.5 w-full">use i_opt = {fmt(r.i_opt,1)}</button></div>
              <Field label="Rated output torque" hint="N·m"><Num value={x.M_gearbox_rated} min="0" step="50" onChange={e=>set("M_gearbox_rated",e.target.value)}/></Field>
              <Field label="Min service factor fB" hint="confirm"><Num value={x.fB_min} min="0" step="0.05" onChange={e=>set("fB_min",e.target.value)}/></Field>
            </div>
          </Group>
          <Group title="Brake & proof load" open={true}>
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Brake rated torque" hint="N·m"><Num value={x.M_brake_rated} min="0" step="5" onChange={e=>set("M_brake_rated",e.target.value)}/></Field>
              <div className="flex items-end mb-3"><button onClick={()=>set("M_brake_rated",Math.ceil(r.brakeReq))} className="text-xs bg-slate-200 hover:bg-slate-300 rounded px-2 py-1.5 w-full">use req = {fmt0(r.brakeReq)}</button></div>
              <Field label="Brake factor" hint="× motor rated (Siemens 2.0)"><Num value={x.brakeFactor} min="1" step="0.1" onChange={e=>set("brakeFactor",e.target.value)}/></Field>
              <Field label="Proof-load factor" hint="× rated (test, 1.25)"><Num value={x.proofFactor} min="1" step="0.05" onChange={e=>set("proofFactor",e.target.value)}/></Field>
              <Field label="Overload factor" hint="operational (1.10)"><Num value={x.overloadFactor} min="1" step="0.05" onChange={e=>set("overloadFactor",e.target.value)}/></Field>
            </div>
            <p className="text-xs text-slate-400">The holding brake must be fail-safe (spring-applied, released by power, applied automatically on power loss). EN 14492-2 / EN 13135.</p>
          </Group>
          <Group title="Duty cycle (for RMS / %ED)" open={false}>
            <div className="grid grid-cols-3 gap-x-3">
              <Field label="Hoist t" hint="s"><Num value={x.t_hoist} min="0" step="1" onChange={e=>set("t_hoist",e.target.value)}/></Field>
              <Field label="Lower t" hint="s"><Num value={x.t_lower} min="0" step="1" onChange={e=>set("t_lower",e.target.value)}/></Field>
              <Field label="Rest t" hint="s"><Num value={x.t_rest} min="0" step="1" onChange={e=>set("t_rest",e.target.value)}/></Field>
            </div>
            <div className="grid grid-cols-2 gap-x-4">
              <Field label="Standstill cooling k" hint="self-vent ≈0.33"><Num value={x.kCool} min="0" max="1" step="0.05" onChange={e=>set("kCool",e.target.value)}/></Field>
              <Field label="Stall margin factor" hint="≥1.3"><Num value={x.stallFactor} min="1" step="0.05" onChange={e=>set("stallFactor",e.target.value)}/></Field>
            </div>
          </Group>
        </div>

        {/* RESULTS */}
        <div className="space-y-5">
          <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:ACCENT,background:"#fffbeb"}}>
            <h2 className="font-bold text-slate-800 mb-2">Power &amp; torque <Badge>P=m·g·v/η</Badge></h2>
            <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
              <Row k="Total load (mL+mH)" unit="kg" v={fmt0(r.mLoad)}/>
              <Row k="Static power" unit="kW" v={fmt(r.P_static/1000,2)} strong/>
              <Row k="Dynamic power" unit="kW" v={fmt(r.P_dynamic/1000,2)}/>
              <Row k="Total power" unit="kW" v={fmt(r.P_total/1000,2)} strong/>
              <Row k="Regen power (lower)" unit="kW" v={fmt(r.P_regen/1000,2)}/>
              <Row k="Drum torque (total)" unit="N·m" v={fmt(r.M_drum_total,0)}/>
              <Row k="Static motor torque" unit="N·m" v={fmt(r.M_motor_static,1)}/>
              <Row k="Dynamic motor torque" unit="N·m" v={fmt(r.M_motor_dyn,1)}/>
              <Row k="Peak motor torque" unit="N·m" v={fmt(r.M_motor_peak,1)} strong/>
              <Row k="RMS motor torque" unit="N·m" v={fmt(r.M_rms,1)}/>
            </dl>
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
            <h2 className="font-bold text-slate-800 mb-2">Gearbox</h2>
            <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
              <Row k="Optimum ratio i_opt" unit=":1" v={fmt(r.i_opt,2)} badge={{t:"inertia match",tone:"def"}}/>
              <Row k="Selected ratio i_gear" unit=":1" v={fmt(x.i_gear,2)}/>
              <Row k="Motor speed at v" unit="rpm" v={fmt0(r.n_motor_rpm)}/>
              <Row k="Service factor fB" unit="" v={fmt(r.fB,2)} ok={r.fB_ok}/>
              <Row k="Rated output torque" unit="N·m" v={fmt0(x.M_gearbox_rated)} ok={r.gbTorque_ok}/>
            </dl>
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
            <h2 className="font-bold text-slate-800 mb-2">Motor selection</h2>
            <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
              <Row k="Duty-basis power" unit="kW" v={fmt(r.P_duty/1000,2)}/>
              <Row k="Thermal (RMS) power" unit="kW" v={fmt(r.M_rms*2*Math.PI*(x.n_motor_rated||0)/60/1000,2)}/>
              <Row k="Required power (governing)" unit="kW" v={fmt(r.P_motor_req/1000,2)} strong badge={{t:"no margin added",tone:""}}/>
              <Row k="Smallest standard motor ≥" unit="kW" v={r.P_motor_rec?fmt(r.P_motor_rec,1):"—"} strong badge={{t:"IEC",tone:"def"}}/>
              <Row k="↳ utilisation at that size" unit="%" v={r.P_motor_rec?fmt(100*r.P_motor_req/1000/r.P_motor_rec,0):"—"}/>
              <Row k="Motor rated power (entered)" unit="kW" v={fmt(r.motorRatedKW,2)} ok={r.power_ok}/>
              <Row k={"Stall margin (≥"+fmt(x.stallFactor,2)+")"} unit="×" v={fmt(r.stallMargin,2)} ok={r.stall_ok}/>
              <Row k="Thermal utilisation (RMS)" unit="%" v={fmt(r.thermalUtil*100,0)} ok={r.thermal_ok}/>
              <Row k={"Duty %ED (≤"+fmt0(x.motor_ED)+")"} unit="%" v={fmt(r.ED,0)} ok={r.ed_ok}/>
            </dl>
            <p className="text-xs text-slate-400 mt-2">Required power carries <b>no added margin</b> — it is the true demand (larger of duty and thermal-RMS). The standard size is just the <b>smallest IEC frame that meets it</b> (not deliberate oversizing); the utilisation shows the headroom. The PASS/FAIL above tests the motor <b>you enter</b> against the requirement, so you can fit an exact/special motor if it's more economical — anything ≥ the requirement passes.</p>
          </div>

          <div className="rounded-lg shadow-sm border-2 p-5 print-block" style={{borderColor:(r.brake_2x_ok&&r.brake_proof_ok&&r.brake_static_ok)?"#16a34a":"#dc2626",background:(r.brake_2x_ok&&r.brake_proof_ok&&r.brake_static_ok)?"#f0fdf4":"#fef2f2"}}>
            <div className="flex items-center justify-between mb-2">
              <h2 className="font-bold text-slate-800">Holding brake &amp; 125% proof load</h2>
              <Pill ok={r.brake_2x_ok&&r.brake_proof_ok&&r.brake_static_ok}>{(r.brake_2x_ok&&r.brake_proof_ok&&r.brake_static_ok)?"PASS":"FAIL"}</Pill>
            </div>
            <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
              <Row k="Static load torque (motor shaft)" unit="N·m" v={fmt(r.M_load_motor,1)} badge={{t:"gross, lossless",tone:""}}/>
              <Row k={"At "+fmt(x.proofFactor,2)+"× proof load"} unit="N·m" v={fmt(r.M_load_proof,1)}/>
              <Row k="Recommended brake torque" unit="N·m" v={fmt0(r.brakeReq)} strong/>
              <Row k="Brake rated torque" unit="N·m" v={fmt0(x.M_brake_rated)} strong/>
              <Row k={"≥ "+fmt(x.brakeFactor,1)+"× motor rated ("+fmt0(r.req_2x)+")"} unit="" v={""} ok={r.brake_2x_ok}/>
              <Row k={"holds "+fmt(x.proofFactor,2)+"× proof load ("+fmt0(r.req_proof)+")"} unit="" v={""} ok={r.brake_proof_ok}/>
              <Row k={"exceeds static load torque ("+fmt0(r.req_static)+")"} unit="" v={""} ok={r.brake_static_ok}/>
            </dl>
            <p className="text-xs text-slate-500 mt-2">Brake factor on motor torque (Siemens serial-hoist ≈2.0) and proof-load hold both checked; factor sized on the <b>static load torque</b>, computed lossless (gearbox friction only helps hold). The recommended brake torque is the worst case of all three requirements.</p>
          </div>

          <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-5 print-block">
            <h2 className="font-bold text-slate-800 mb-2">Overload / proof loads</h2>
            <dl className="grid grid-cols-2 gap-y-1.5 text-sm">
              <Row k="Rated load" unit="kg" v={fmt0(r.mLoad)}/>
              <Row k={fmt0(x.overloadFactor*100)+"% operational overload"} unit="kg" v={fmt0(r.load_over)}/>
              <Row k={fmt0(x.proofFactor*100)+"% proof (test) load"} unit="kg" v={fmt0(r.load_proof)} strong/>
            </dl>
            <p className="text-[11px] text-slate-400 mt-3 border-t border-slate-100 pt-2">
              g = 9.81 m/s². Physics is computed; factors (brake, proof, overload, service, %ED) are editable — confirm against
              EN 14492-2 / EN 13001 / EN 13135. Duty group → use the Hoist Duty Calculator. Verify the final motor / gearbox /
              brake / inverter against the supplier's selection data before order.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
